                    catSentences.forEach(sent => {
                        const isMem = APP_STATE.memorizedSentences && APP_STATE.memorizedSentences[sent.en];
                        html += '<div class="sentence-card" style="' + (isMem ? 'opacity: 0.6;' : '') + '"><div style="display: flex; gap: 8px;"><input type="checkbox" class="mem-checkbox" data-sentence="' + sent.en + '" ' + (isMem ? 'checked' : '') + ' style="margin-top: 4px; cursor: pointer; accent-color: var(--success);"> <div style="flex: 1;"><div class="sentence-en">' + sent.en + '</div><div class="sentence-ja">' + sent.ja + '</div></div></div></div>';
                    });
                    html += '</div>';
                }

                sentencesContent.innerHTML = html;
            }

            // Initial render without selection
            showSentenceCategory(null);

            // Category button click in 文章確認 tab (event delegation)
            document.addEventListener('click', function(e) {
                const btn = e.target.closest('.cat-select-btn');
                if (btn) {
                    showSentenceCategory(btn.dataset.cat);
                    return;
                }
            });

            // Checkbox change for memorization (event delegation)
            document.addEventListener('change', function(e) {
                if (e.target.classList.contains('mem-checkbox')) {
                    const sentence = e.target.dataset.sentence;
                    if (e.target.checked) {
                        APP_STATE.memorizedSentences[sentence] = true;
                    } else {
                        delete APP_STATE.memorizedSentences[sentence];
                    }
                    saveState();
                }
            });

            // Category click from 週間目標 → switch to 文章確認 and show that category
            document.addEventListener('click', function(e) {
                const item = e.target.closest('.category-item');
                if (!item) return;
                const cat = item.dataset.cat;
                const parent = item.closest('.tab-content');
                if (!parent) return;
                parent.querySelectorAll('.sub-tab').forEach(st => st.classList.remove('active'));
                parent.querySelectorAll('.sub-content').forEach(sc => sc.classList.remove('active'));
                parent.querySelector('[data-sub="mem-sentences"]').classList.add('active');
                document.getElementById('mem-sentences').classList.add('active');
                showSentenceCategory(cat);
                setTimeout(() => {
                    document.getElementById('mem-sentences').scrollTo(0, 0);
                }, 100);
            });

            // Stats tab
            const statsContent = document.getElementById('mem-stats');
            const totalMemorized = Object.keys(APP_STATE.memorizedSentences || {}).length;
            statsContent.innerHTML = '<div class="card"><div class="stat-box"><div class="stat-value">' + totalMemorized + '</div><div class="stat-label">暗記済み文数</div></div></div>';
        }

        // ====================================================================
        // WEAKNESS TAB
        // ====================================================================

        function renderWeaknessTab() {
            const paraphraseContent = document.getElementById('weak-paraphrase');
            paraphraseContent.innerHTML = '<div id="paraphraseContainer"></div><button class="btn btn-primary" id="nextSentence">次の文へ</button>';

            let currentSentenceIdx = 0;

            function showParaphraseSentence() {
                if (currentSentenceIdx >= sampleSentences.length) {
                    currentSentenceIdx = 0;
                }

                const sent = sampleSentences[currentSentenceIdx];
                const container = document.getElementById('paraphraseContainer');

                let hintsHtml = '';
                if (sent.hints) {
                    Object.entries(sent.hints).forEach(([hintType, items]) => {
                        if (Array.isArray(items)) {
                            hintsHtml += '<div style="margin: 8px 0; font-size: 13px;"><strong style="color: var(--accent);">' + hintType + ':</strong> ';
                            hintsHtml += items.join(', ');
                            hintsHtml += '</div>';
                        }
                    });
                }

                container.innerHTML = '<div class="card"><div style="color: #999; font-size: 12px; margin-bottom: 8px;">' + sent.cat + ' (' + (currentSentenceIdx + 1) + ' / ' + sampleSentences.length + ')</div><div class="sentence-en">"' + sent.en + '"</div><div class="sentence-ja">' + sent.ja + '</div><div style="margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border);"><div style="font-size: 12px; color: var(--primary); font-weight: 600; margin-bottom: 8px;">書き換えのヒント</div>' + hintsHtml + '</div><div style="margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border);"><div style="font-size: 12px; color: var(--success); font-weight: 600; margin-bottom: 8px;">あなたの書き換え</div><textarea id="paraphraseInput" placeholder="ヒントを参考に、元の文を書き換えてみましょう..." style="width: 100%; min-height: 80px; padding: 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; line-height: 1.6; resize: vertical; box-sizing: border-box;"></textarea><button class="btn btn-success" id="checkParaphrase" style="width: 100%; margin-top: 8px;">添削する</button><div id="paraphraseResult" style="margin-top: 12px;"></div></div></div>';

                // Add correction check listener
                document.getElementById('checkParaphrase').addEventListener('click', () => {
                    const userText = document.getElementById('paraphraseInput').value.trim();
                    const resultDiv = document.getElementById('paraphraseResult');
                    if (!userText) {
                        resultDiv.innerHTML = '<div style="padding: 10px; background: #fff3cd; border-radius: 6px; font-size: 13px; color: #856404;">書き換えた文を入力してください。</div>';
                        return;
                    }
                    const original = sent.en.toLowerCase().replace(/[^a-z\s]/g, '');
                    const user = userText.toLowerCase().replace(/[^a-z\s]/g, '');

                    // Check basic quality metrics
                    const origWords = original.split(/\s+/);
                    const userWords = user.split(/\s+/);
                    const sharedWords = userWords.filter(w => origWords.includes(w) && w.length > 3);
                    const changeRatio = 1 - (sharedWords.length / Math.max(userWords.length, 1));

                    // Check grammar basics
                    const issues = [];
                    if (userWords.length < 4) issues.push('文が短すぎます。もう少し詳しく書いてみましょう。');
                    if (!/^[A-Z]/.test(userText)) issues.push('文頭は大文字で始めましょう。');
                    if (!/[.!?]$/.test(userText)) issues.push('文末にピリオド（.）を付けましょう。');
                    if (changeRatio < 0.3) issues.push('元の文と似すぎています。もっと語彙や構造を変えてみましょう。');

                    // Build feedback
                    let feedbackHtml = '';
                    if (issues.length === 0) {
                        feedbackHtml = '<div style="padding: 12px; background: #d4edda; border-radius: 6px; margin-bottom: 8px;"><div style="font-weight: 600; color: #155724; margin-bottom: 4px;">Good job!</div><div style="font-size: 13px; color: #155724;">文法的な基本ルールはクリアしています。書き換え率: ' + Math.round(changeRatio * 100) + '%</div></div>';
                    } else {
                        feedbackHtml = '<div style="padding: 12px; background: #f8d7da; border-radius: 6px; margin-bottom: 8px;"><div style="font-weight: 600; color: #721c24; margin-bottom: 6px;">改善ポイント</div>';
                        issues.forEach(issue => {
                            feedbackHtml += '<div style="font-size: 13px; color: #721c24; margin: 4px 0;">・' + issue + '</div>';
                        });
                        feedbackHtml += '</div>';
                    }

                    // Show comparison
                    feedbackHtml += '<div style="padding: 12px; background: var(--light); border-radius: 6px; margin-top: 8px;"><div style="font-size: 12px; color: #666; margin-bottom: 4px;">元の文:</div><div style="font-size: 13px; margin-bottom: 8px;">' + sent.en + '</div><div style="font-size: 12px; color: #666; margin-bottom: 4px;">あなたの書き換え:</div><div style="font-size: 13px; font-weight: 600;">' + userText + '</div><div style="font-size: 12px; color: var(--primary); margin-top: 8px;">共通語数: ' + sharedWords.length + ' / ' + userWords.length + ' 語 (変化率: ' + Math.round(changeRatio * 100) + '%)</div></div>';

                    resultDiv.innerHTML = feedbackHtml;
                });
            }

            showParaphraseSentence();

            document.getElementById('nextSentence').addEventListener('click', () => {
                currentSentenceIdx++;
                showParaphraseSentence();
            });

            // Speed Reading
            const readingContent = document.getElementById('weak-reading');
            readingContent.innerHTML = '<div class="card"><label style="display: block; margin-bottom: 12px; font-weight: 600;">レベル選択</label><select id="readingLevel"><option value="easy">Easy</option><option value="medium">Medium</option><option value="hard">Hard</option></select><div id="readingTopics" style="margin-bottom: 12px;"></div><div id="readingTimer" style="text-align: center; margin-bottom: 16px; display: none; background: #1F4E79; color: white; padding: 16px; border-radius: 10px;"><div style="font-size: 11px; margin-bottom: 4px; opacity: 0.8;">経過時間</div><span id="timerValue" style="font-size: 36px; font-weight: 700; font-family: monospace; letter-spacing: 2px;">00:00</span></div><div id="readingControls" style="display: none; gap: 8px; margin-bottom: 14px;"><button class="btn btn-success" id="startTimer" style="flex: 1; padding: 12px; font-size: 16px; font-weight: 600;">⏱ タイマースタート</button><button class="btn btn-danger" id="finishReading" style="flex: 1; padding: 12px; font-size: 16px; font-weight: 600; display: none;">⏹ 読了</button></div><div id="readingContent"></div><div id="readingQuestions" style="margin-top: 16px;"></div><button class="btn btn-primary" id="submitReading" style="display: none;">採点</button><div id="readingWPM" style="text-align: center; margin-top: 12px; display: none;"></div></div>';

            let readingStartTime = null;
            let readingInterval = null;

            function populateTopics(level) {
                const topics = Object.keys(speedTexts[level] || {});
                const topicsSelect = document.getElementById('readingTopics');
                if (topics.length > 0) {
                    topicsSelect.innerHTML = '<select id="readingTopic"><option value="">トピック選択</option>' + topics.map(t => '<option value="' + t + '">' + t + '</option>').join('') + '</select>';
                    const firstTopic = topics[0];
                    document.getElementById('readingTopic').value = firstTopic;
                    document.getElementById('readingTopic').dispatchEvent(new Event('change', {bubbles: true}));
                }
            }

            document.getElementById('readingLevel').addEventListener('change', (e) => {
                const level = e.target.value;
                populateTopics(level);
            });

            document.addEventListener('change', function(e) {
                if (e.target.id === 'readingTopic') {
                    const level = document.getElementById('readingLevel').value;
                    const topic = e.target.value;
                    const data = speedTexts[level][topic];
                    if (data) {
                        document.getElementById('readingContent').innerHTML = '<div style="white-space: pre-wrap; line-height: 1.6; padding: 12px; background: var(--light); border-radius: 6px; font-size: 14px; margin-bottom: 12px;">' + data.text + '</div>';

                        let qsHtml = '';
                        data.qs.forEach((q, i) => {
                            qsHtml += '<div style="margin-bottom: 12px; padding: 12px; background: var(--light); border-radius: 6px;"><div style="font-weight: 600; margin-bottom: 8px; font-size: 14px;">Q' + (i+1) + ': ' + q.q + '</div><div>' + q.opts.map((opt, j) => '<label style="display: block; margin: 6px 0;"><input type="radio" name="comp' + i + '" value="' + j + '" style="margin-right: 6px;"> ' + opt + '</label>').join('') + '</div></div>';
                        });
                        document.getElementById('readingQuestions').innerHTML = qsHtml;
                        document.getElementById('submitReading').style.display = 'block';

                        // Show reading controls - reset timer state
                        document.getElementById('readingControls').style.display = 'flex';
                        document.getElementById('startTimer').style.display = 'block';
                        document.getElementById('finishReading').style.display = 'none';
                        document.getElementById('readingTimer').style.display = 'none';
                        document.getElementById('readingWPM').style.display = 'none';
                        if (readingInterval) clearInterval(readingInterval);
                        readingStartTime = null;
                    }
                }
            });

            document.addEventListener('click', function(e) {
                if (e.target.id === 'startTimer') {
                    readingStartTime = Date.now();
                    document.getElementById('readingTimer').style.display = 'block';
                    document.getElementById('startTimer').style.display = 'none';
                    document.getElementById('finishReading').style.display = 'block';
                    readingInterval = setInterval(() => {
                        const elapsed = Math.floor((Date.now() - readingStartTime) / 1000);
                        const minutes = Math.floor(elapsed / 60);
                        const seconds = elapsed % 60;
                        document.getElementById('timerValue').textContent = (minutes < 10 ? '0' : '') + minutes + ':' + (seconds < 10 ? '0' : '') + seconds;
                    }, 100);
                }
                if (e.target.id === 'finishReading') {
                    if (readingInterval) clearInterval(readingInterval);
                    const elapsed = (Date.now() - readingStartTime) / 60000;
                    const wordCount = document.getElementById('readingContent').textContent.match(/\b\w+\b/g).length;
                    const wpm = Math.round(wordCount / elapsed);
                    document.getElementById('readingWPM').innerHTML = '<div style="font-size: 16px; font-weight: 600; color: var(--primary);">読速: ' + wpm + ' WPM</div>';
                    document.getElementById('readingWPM').style.display = 'block';
                }
            });

            // Auto-trigger first level
            populateTopics('easy');

            // Writing
            const writingContent = document.getElementById('weak-writing');
            writingContent.innerHTML = '<div class="card"><label style="display: block; margin-bottom: 12px; font-weight: 600;">カテゴリ選択</label><select id="writingCategory"><option value="">カテゴリ選択</option>' + Object.keys(writeTopics).map(cat => '<option value="' + cat + '">' + cat + '</option>').join('') + '</select><div id="writingTopicSelect" style="margin-bottom: 12px; display: none;"><select id="writingTopic"><option value="">トピック選択</option></select></div><div id="writingPrompt" style="background: var(--light); padding: 12px; border-radius: 6px; margin-bottom: 12px; display: none;"></div><div style="margin-bottom: 12px; display: none;" id="writingHelper"><button class="btn btn-secondary" id="randomTopic" style="width: 100%;">ランダムトピック選択</button></div><textarea id="writingText" placeholder="ここにエッセイを入力してください..." style="display: none;"></textarea><div id="wordCount" style="text-align: right; font-size: 12px; color: #999; margin-bottom: 8px; display: none;"></div><button class="btn btn-primary" id="analyzeWriting" style="display: none;">添削</button><div id="writingFeedback"></div></div>';

            document.getElementById('writingCategory').addEventListener('change', (e) => {
                const cat = e.target.value;
                if (cat && writeTopics[cat]) {
                    const topics = writeTopics[cat];
                    const select = document.getElementById('writingTopic');
                    select.innerHTML = '<option value="">トピック選択</option>' + topics.map((t, i) => '<option value="' + i + '">' + t.substring(0, 60) + '...</option>').join('');
                    document.getElementById('writingTopicSelect').style.display = 'block';
                    document.getElementById('writingHelper').style.display = 'block';

                    document.getElementById('randomTopic').onclick = () => {
                        const randomIdx = Math.floor(Math.random() * topics.length);
                        select.value = randomIdx;
                        select.dispatchEvent(new Event('change', {bubbles: true}));
                    };

                    select.addEventListener('change', (e2) => {
                        const idx = e2.target.value;
                        if (idx !== '') {
                            document.getElementById('writingPrompt').innerHTML = '<strong style="color: var(--primary);">トピック:</strong><br>' + topics[idx];
                            document.getElementById('writingPrompt').style.display = 'block';
                            document.getElementById('writingText').style.display = 'block';
                            document.getElementById('analyzeWriting').style.display = 'block';
                            document.getElementById('wordCount').style.display = 'block';
                            document.getElementById('wordCount').textContent = '単語数: 0';
                        }
                    });
                }
            });

            // Word count tracking for writing
            document.addEventListener('input', function(e) {
                if (e.target.id === 'writingText') {
                    const words = e.target.value.match(/\b\w+\b/g) || [];
                    document.getElementById('wordCount').textContent = '単語数: ' + words.length;
                }
            });

            // English Correction
            const correctionContent = document.getElementById('weak-correction');
            correctionContent.innerHTML = '<div class="card"><p style="font-size: 13px; color: #999; margin-bottom: 12px;">英文を入力して、文法やボキャブラリーの改善提案を受け取ります</p><textarea id="correctionText" placeholder="英文を入力してください..."></textarea><button class="btn btn-primary" id="analyzeCorrection">添削</button><div id="correctionResult"></div></div>';

            document.getElementById('analyzeCorrection').addEventListener('click', () => {
                const text = document.getElementById('correctionText').value;
                if (!text.trim()) return;

                const feedback = analyzeEnglish(text);
                document.getElementById('correctionResult').innerHTML = feedback;
            });
        }

        function analyzeEnglish(text) {
            let feedback = '<div class="card" style="background: #E8F5E9; border-color: #81C784; margin-top: 12px;">';
            const words = text.toLowerCase().match(/\b\w+\b/g) || [];
            const sentences = text.match(/[^.!?]+[.!?]/g) || [];

            feedback += '<div class="stat-box" style="background: linear-gradient(135deg, #4CAF50, #45a049);"><div class="stat-value">' + words.length + '</div><div class="stat-label">単語数</div></div>';

            feedback += '<div style="font-size: 13px; color: #333; margin: 12px 0;"><strong>文の数:</strong> ' + sentences.length + '<br><strong>平均単語数/文:</strong> ' + (words.length / Math.max(sentences.length, 1)).toFixed(1) + '</div>';

            feedback += '<div style="margin-top: 12px; padding-top: 12px; border-top: 1px solid rgba(0,0,0,0.1); font-size: 13px;"><strong style="color: var(--primary);">改善のヒント:</strong><br>• 複合文や複雑な構造を使用してください<br>• アカデミックな語彙を取り入れましょう<br>• つなぎ言葉(connectors)を活用しましょう</div>';

            feedback += '</div>';
            return feedback;
        }

        // ====================================================================
        // STATS TAB
        // ====================================================================

        function renderStatsTab() {
            const container = document.getElementById('statsContent');

            const completedTasksCount = Object.values(APP_STATE.completedTasks).filter(v => v).length;
            const totalTasks = CALENDAR_DATA.reduce((sum, day) => {
                if (!day.isRest) {
                    return sum + day.tasks.reduce((s, tb) => s + tb.detail.split('\n').filter(l => l.trim()).length, 0);
                }
                return sum;
            }, 0);

            const completionRate = totalTasks > 0 ? Math.round((completedTasksCount / totalTasks) * 100) : 0;

            container.innerHTML = '<div class="stat-box"><div class="stat-value">' + completionRate + '%</div><div class="stat-label">全体進捗</div></div><div class="stat-box" style="background: linear-gradient(135deg, #FF9800, #F57C00);"><div class="stat-value">' + completedTasksCount + '</div><div class="stat-label">完了したタスク</div></div><div class="card"><div style="font-weight: 600; color: var(--primary); margin-bottom: 12px;">週間サマリー</div><div style="font-size: 13px; color: #666;"><div style="display: flex; justify-content: space-between; margin: 6px 0;"><span>カレンダー期間:</span><strong>' + CALENDAR_DATA[0].date + ' ~ ' + CALENDAR_DATA[CALENDAR_DATA.length-1].date + '</strong></div><div style="display: flex; justify-content: space-between; margin: 6px 0;"><span>総日数:</span><strong>67日</strong></div><div style="display: flex; justify-content: space-between; margin: 6px 0;"><span>休息日:</span><strong>' + CALENDAR_DATA.filter(d => d.isRest).length + '日</strong></div></div></div><div class="card"><div style="font-weight: 600; color: var(--primary); margin-bottom: 12px;">学習スケジュール</div><div style="font-size: 13px; color: #666; line-height: 1.6;">朝 6:30-7:00 / 通勤 8:00-8:20 / 午前・午後 / 夜 20:00-21:10 / 就寝前 22:00</div></div>';
        }

        // ====================================================================
        // SETTINGS TAB
        // ====================================================================

        function renderSettingsTab() {
            const container = document.getElementById('settingsContent');
            container.innerHTML = '<div class="card"><div style="font-weight: 600; color: var(--primary); margin-bottom: 12px;">データ管理</div><button class="btn btn-secondary" id="exportData">データをエクスポート</button><button class="btn btn-secondary" id="importData">データをインポート</button><button class="btn btn-danger" id="resetData">すべてリセット</button></div><div class="card"><div style="font-weight: 600; color: var(--primary); margin-bottom: 12px;">アプリ情報</div><div style="font-size: 13px; color: #666;"><div style="margin: 6px 0;"><strong>アプリ:</strong> IELTS 統合学習PWA</div><div style="margin: 6px 0;"><strong>バージョン:</strong> 1.0.0</div><div style="margin: 6px 0;"><strong>最終同期:</strong> ' + new Date(APP_STATE.lastSync).toLocaleString('ja-JP') + '</div><div style="margin: 6px 0;"><strong>ローカルストレージ:</strong> ' + (JSON.stringify(APP_STATE).length / 1024).toFixed(2) + ' KB</div></div></div>';

            document.getElementById('exportData').addEventListener('click', () => {
                const data = JSON.stringify(APP_STATE, null, 2);
                const blob = new Blob([data], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'ielts_data_' + new Date().toISOString().split('T')[0] + '.json';
                a.click();
                URL.revokeObjectURL(url);
            });

            document.getElementById('resetData').addEventListener('click', () => {
                if (confirm('すべてのデータをリセットしますか？')) {
                    APP_STATE.completedTasks = {};
                    APP_STATE.memorizedSentences = {};
                    APP_STATE.readingHistory = {};
                    APP_STATE.writingHistory = [];
                    APP_STATE.currentDateIndex = 0;
                    saveState();
                    renderTodayTab();
                    alert('リセット完了しました');
                }
            });
        }

        // ====================================================================
        // TAB NAVIGATION
        // ====================================================================

        function setupTabNavigation() {
            document.querySelectorAll('.nav-item').forEach(item => {
                item.addEventListener('click', (e) => {
                    const tabName = e.currentTarget.dataset.tab;

                    document.querySelectorAll('.tab-content').forEach(tab => {
                        tab.classList.remove('active');
                    });
                    document.getElementById(tabName).classList.add('active');

                    document.querySelectorAll('.nav-item').forEach(navItem => {
                        navItem.classList.remove('active');
                    });
                    e.currentTarget.classList.add('active');

                    if (tabName === 'today') {
                        renderTodayTab();
                    } else if (tabName === 'memorization') {
                        renderMemorizationTab();
                    } else if (tabName === 'weakness') {
                        renderWeaknessTab();
                    } else if (tabName === 'stats') {
                        renderStatsTab();
                    } else if (tabName === 'settings') {
                        renderSettingsTab();
                    }
                });
            });

            document.addEventListener('click', function(e) {
                const tab = e.target.closest('.sub-tab');
                if (!tab) return;
                const subName = tab.dataset.sub;
                if (!subName) return;

                const parent = tab.closest('.tab-content');
                if (!parent) return;
                parent.querySelectorAll('.sub-tab').forEach(st => st.classList.remove('active'));
                parent.querySelectorAll('.sub-content').forEach(sc => sc.classList.remove('active'));

                tab.classList.add('active');
                document.getElementById(subName).classList.add('active');

                // Re-trigger speed reading content load when switching to that sub-tab
                if (subName === 'weak-reading') {
                    const topicEl = document.getElementById('readingTopic');
                    if (topicEl && topicEl.value && !document.getElementById('readingContent').innerHTML.trim()) {
                        topicEl.dispatchEvent(new Event('change', {bubbles: true}));
                    }
                }
            });
        }

        // ====================================================================
        // INITIALIZATION
        // ====================================================================

        function init() {
            loadState();

            // 今日の日付をCALENDAR_DATAから自動検索してセット
            const now = new Date();
            const yyyy = now.getFullYear();
            const mm = String(now.getMonth() + 1).padStart(2, '0');
            const dd = String(now.getDate()).padStart(2, '0');
            const todayStr = yyyy + '-' + mm + '-' + dd;
            const todayIdx = CALENDAR_DATA.findIndex(d => d.date === todayStr);
            if (todayIdx >= 0) {
                APP_STATE.currentDateIndex = todayIdx;
            }

            setupTabNavigation();
            setupDayNavigation();
            renderTodayTab();
        }

        document.addEventListener('DOMContentLoaded', init);
        window.addEventListener('beforeunload', saveState);
    </script>
</body>
</html>
