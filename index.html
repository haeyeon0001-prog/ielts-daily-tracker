{q: "Which policy intervention is NOT mentioned for addressing inequality?", opts: ["Progressive taxation", "Conditional cash transfers", "Military expansion", "Educational investment"], ans: 2},
{q: "What emerging challenge is posed to inequality mitigation?", opts: ["Increased social programs", "Technological unemployment and wealth concentration", "Improved educational access", "Universal healthcare"], ans: 1}
]
},
{
text: "Demographic change, characterized by aging populations and declining birth rates in developed nations, presents complex societal challenges with far-reaching economic and social ramifications. Dependency ratios, measuring the proportion of non-working-age populations supported by the economically productive workforce, are rising substantially across developed nations, straining pension systems and healthcare infrastructure. Migration policies substantially influence demographic composition and labor force dynamics, yet often generate contentious political debates regarding cultural integration and national identity preservation. Feminist movements have advocated for expanded reproductive autonomy and educational opportunities for women, fundamentally altering family structures and workforce participation patterns across generations. Declining birth rates correlate strongly with female educational attainment and workforce participation, reflecting profound societal transformation. Intergenerational equity concerns arise as diminishing proportions of working-age individuals support expanding elderly populations, potentially necessitating pension system reforms and increased immigration. Policy responses encompassing natalist incentives, extended working years, and immigration liberalization represent different approaches toward addressing demographic challenges. The economic productivity implications of aging demographics create pressures toward technological innovation and labor-saving automation. Balancing demographic change with sustainable economic growth, equitable resource distribution, and quality of life across generations requires sophisticated policy frameworks and substantial intergenerational cooperation.",
ja: "高齢化人口と先進国における出生率の低下を特徴とする人口統計学的変化は、深く到達する経済的および社会的影響を伴う複雑な社会的課題を提示しています。経済生産的な労働力によって支援される非労働年齢の人口の割合を測定する扶養率は、先進国全体で大幅に上昇し、年金制度とヘルスケアインフラストラクチャを緊張させています。移民政策は人口統計学的構成と労働力ダイナミクスに実質的に影響を与えていますが、文化的統合と国家アイデンティティ保護に関する議論的な政治的議論を生成することがよくあります。フェミニスト運動は、女性の拡大された生殖的自律性と教育的機会を擁護し、世代全体を通じた家族構造と労働力参加パターンを根本的に変えています。出生率の低下は、女性の教育的達成と労働力参加と強く相関し、深い社会的変容を反映しています。世代間の公平性懸念は、働く年齢の個人の割合の減少が拡大する高齢者人口をサポートすると認識されるため、年金制度改革と増加した移民を必要とする可能性があります。出産主義的インセンティブ、拡張された労働年、および移民自由化を網羅するポリシー対応は、人口統計学的課題に対処するための異なるアプローチを表しています。高齢人口統計学の経済的生産性への影響は、技術的革新と労働節約の自動化に対する圧力を生成します。人口統計学的変化と持続可能な経済成長、公平なリソース分配、および世代全体を通じた生活の質のバランスを取るには、洗練されたポリシーフレームワークと実質的な世代間協力が必要です。",
qs: [

{q: "Which policy approach is mentioned for addressing demographic challenges?", opts: ["Forced immigration restrictions", "Natalist incentives and immigration liberalization", "Elimination of pension systems", "Prohibition of female workforce participation"], ans: 1}
]
},
{
text: "Technological advancement and digital transformation have fundamentally reshaped communication patterns, commercial practices, and social relationships within increasingly interconnected societies. Social media platforms have created unprecedented opportunities for grassroots mobilization and democratic participation, yet simultaneously enabled the rapid dissemination of misinformation and polarization of public discourse. The digital divide, characterized by disparities in internet access and digital literacy across socioeconomic strata, perpetuates existing inequalities and limits economic opportunity for disadvantaged populations. Algorithmic content curation has been demonstrated to create filter bubbles and echo chambers, reinforcing ideological preferences and potentially fragmenting shared understanding of objective reality. Cybersecurity vulnerabilities and data privacy concerns have emerged as critical challenges in an increasingly digitized society, requiring comprehensive regulatory frameworks and technological innovation. Artificial intelligence applications, while promising substantial productivity gains and problem-solving capabilities, raise profound concerns regarding algorithmic bias, employment displacement, and concentrated wealth accumulation. Platform economies characterized by gig work arrangements have disrupted traditional labor market structures, creating flexibility while simultaneously compromising worker protections and stable income assurance. Regulatory approaches balancing technological innovation with societal protection remain contested, with stakeholders advancing divergent interests regarding appropriate governance mechanisms. Navigating digital transformation requires sophisticated policy frameworks addressing inclusion, security, equity, and ethical technological development.",
ja: "技術的進歩とデジタル変換は、益々相互接続された社会内でのコミュニケーションパターン、商慣行、および社会的関係を根本的に形作っています。ソーシャルメディアプラットフォームは、草の根運動と民主的参加のための前例のない機会を作成しましたが、同時に誤った情報の急速な拡散と公開的談話の分極化を可能にしました。インターネットアクセスとデジタルリテラシーにおける社会経済的階層全体の格差を特徴とするデジタル格差は、既存の不平等を永続させ、恵まれていない人口の経済的機会を制限しています。アルゴリズムコンテンツキュレーションは、フィルターバブルとエコーチェンバーを作成することが示されており、イデオロギー的好みを強化し、目的の現実の共有理解を潜在的に分裂させています。サイバーセキュリティの脆弱性とデータプライバシーの懸念は、益々デジタル化した社会における重大な課題として浮上し、包括的な規制フレームワークと技術革新が必要です。人工知能アプリケーションは、実質的な生産性向上と問題解決能力を約束しながら、アルゴリズムバイアス、雇用の置き換え、および富の集中的な蓄積に関する深刻な懸念を提起します。ギグワーク取り決めを特徴とするプラットフォーム経済は、従来の労働市場構造を破壊し、柔軟性を作成しながら同時に労働者の保護と安定した所得保証を損なっています。技術革新と社会的保護のバランスを取る規制アプローチは議論の余地があり、利害関係者は適切なガバナンスメカニズムに関する相違する利益を推し進めています。デジタル変換をナビゲートするには、包含、セキュリティ、公平性、および倫理的技術開発に対処する洗練されたポリシーフレームワークが必要です。",
qs: [
{q: "What opportunity have social media platforms created?", opts: ["Increased government surveillance", "Grassroots mobilization and democratic participation", "Enhanced misinformation prevention", "Unified public discourse"], ans: 1},
{q: "What is the digital divide characterized by?", opts: ["Government regulation only", "Disparities in internet access and digital literacy", "Uniform technology distribution", "Equal educational outcomes"], ans: 1},
{q: "What concern is raised regarding artificial intelligence?", opts: ["Lack of innovation", "Algorithmic bias and employment displacement", "Insufficient computing power", "Inability to solve problems"], ans: 1}
]
},
{
text: "Political polarization has intensified substantially in numerous democracies, characterized by increasing ideological divergence, institutional gridlock, and erosion of civic trust. Partisan sorting, wherein individuals align their ideological, social, and moral positions with their political party affiliation, has generated unprecedented levels of political homogeneity within communities. Media fragmentation, enabled by technological advancement, allows individuals to selectively consume information confirming preexisting beliefs while avoiding alternative perspectives. Political efficacy, representing citizens' beliefs regarding their capacity to influence governmental processes, has declined significantly across multiple democracies, contributing to disengagement and apathy. Identity-based politics has increasingly superseded policy-focused discourse, with politicians and voters emphasizing cultural values and group membership rather than substantive governance platforms. Campaign financing mechanisms concentrating political influence among wealthy donors have generated concerns regarding unequal representation and policy capture by special interests. Democratic backsliding, characterized by restrictions on press freedom, electoral manipulation, and institutional weakening, has emerged in several previously stable democracies. Restoring civic discourse quality and institutional functionality requires renewed commitment to factual deliberation, cross-partisan dialogue, and strengthened democratic norms and accountability mechanisms. Addressing political polarization comprehensively demands cultural transformation fostering mutual respect and recognition of legitimate disagreement regarding complex societal challenges.",
ja: "政治的分極化は多くの民主主義で大幅に激化し、イデオロギー的分散の増加、制度的こう着、および市民信頼の浸食を特徴としています。個人がイデオロギー的、社会的、および道徳的立場を政治的党派関係と整列させるパルチザンソーティングは、コミュニティ内で前例のないレベルの政治的同質性を生成しています。技術的進歩によって可能になったメディアの断片化により、個人は既存の信念を確認する情報を選択的に消費しながら、代替的な視点を回避することができます。市民が政府プロセスに影響を与える能力に関する市民の信念を表す政治的有効性は、複数の民主主義全体で有意に低下し、無関心と無関心に寄与しています。アイデンティティベースの政治は、政治家と有権者が実質的なガバナンスプラットフォームではなく文化的価値とグループメンバーシップを強調して、ますます政策的焦点の談話に取って代わっています。政治的影響を裕福なドナーの間に集中させるキャンペーン資金メカニズムは、不平等な表現と特別な利益による政策キャプチャに関する懸念を生成しています。プレスの自由の制限、選挙操作、および機関の弱体化を特徴とする民主的後退は、いくつかの以前の安定した民主主義で浮上しています。市民的談話の品質と制度的機能を復元するには、事実的審議、クロスパルチザン対話、および強化された民主的規範と説明責任メカニズムへの更新された約束が必要です。政治的分極化に包括的に対処することは、相互の尊重と複雑な社会的課題に関する正当な意見相違の認識を促進する文化的変容を要求します。",
qs: [

{
text: "Global migration patterns reflect complex push and pull factors encompassing economic disparities, political instability, environmental degradation, and family reunification aspirations. Migration presents multifaceted societal implications, generating economic contributions through remittances and labor force participation while simultaneously creating integration challenges and resource allocation pressures. Host communities frequently experience xenophobic sentiments and political mobilization opposing migration, despite substantial empirical evidence demonstrating migrants' net positive economic contributions. Brain drain phenomena, whereby skilled individuals emigrate from developing nations, represent significant challenges for origin countries' development trajectories and capacity building. Diaspora communities maintain transnational connections facilitating knowledge transfer, investment flows, and cultural exchange between origin and destination countries. Immigration policy approaches vary substantially across nations, ranging from restrictive quotas to points-based systems assessing human capital credentials. Refugee populations, distinguished by forced displacement and legitimate persecution concerns, warrant distinct policy considerations emphasizing humanitarian protection and integration support. Remittance flows constitute substantial proportions of gross domestic product in numerous developing nations, demonstrating migrants' continued economic contributions to origin communities. Addressing migration comprehensively requires balancing humanitarian concerns, economic interests, security considerations, and recognition of migrants' contributions to cultural diversity and societal vitality.",
ja: "グローバル移住パターンは、経済的格差、政治的不安定性、環境悪化、および家族再会の願いを網羅する複雑なプッシュとプル要因を反映しています。移住は多面的な社会的影響を提示し、送金と労働力参加を通じた経済的寄与を生成しながら同時に統合課題とリソース割り当て圧力を作成します。ホストコミュニティは頻繁に外国人嫌悪的感情と移住に対抗する政治的動員を経験しますが、移民の純正の正の経済的寄与を示す実質的な経験的証拠があります。移民が発展途上国から移民する現象である頭脳流出は、起源国の開発軌跡と能力構築に対する重大な課題を表しています。ディアスポラコミュニティは、起源地と目的地の国の間での知識移転、投資フロー、および文化交換を促進する国家を超えた関係を維持しています。移民政策アプローチは国全体で大幅に異なり、制限的クォータから人的資本認証を評価するポイントベースのシステムまでの範囲です。難民人口は、強制的な変位と正当な迫害懸念によって区別され、人道的保護と統合支援を強調する異なるポリシーに関する考慮が必要です。送金フローは多くの発展途上国での国内総生産の実質的な割合を構成し、起源のコミュニティへの移民の継続的な経済的寄与を示しています。移住に包括的に対処するには、人道的懸念、経済的利益、セキュリティに関する考慮、および文化的多様性と社会的活力への移民の寄与の認識のバランスを取ることが必要です。",
qs: [
{q: "What are push factors in global migration patterns?", opts: ["Improved economic conditions", "Political stability and security", "Environmental degradation and economic disparities", "Reduced family connections"], ans: 2},
{q: "What concern is raised regarding brain drain?", opts: ["Insufficient migration quotas", "Limited economic contributions", "Reduced development capacity in origin countries", "Excessive cultural exchange"], ans: 2},
{q: "What distinguishes refugee populations?", opts: ["Economic motivation", "Forced displacement and persecution concerns", "Educational aspirations", "Voluntary relocation"], ans: 1}
]
},
{
text: "Gender dynamics have undergone substantial transformation through feminist advocacy, legislative reform, and evolving social attitudes toward gender roles and equality. Labor market participation among women has increased dramatically, particularly in professional and managerial positions, challenging historical patterns of occupational segregation. However, persistent wage gaps and occupational segregation in certain sectors demonstrate that gender inequality continues despite legal prohibitions on discrimination. Reproductive autonomy, encompassing contraceptive access and abortion rights, has become increasingly contested politically, with policy approaches varying substantially across jurisdictions. Caregiving responsibilities, including childcare and eldercare, remain disproportionately allocated to women, constraining career progression and contributing to lifetime earnings disparities. Gender-based violence and harassment continue to constitute serious social problems, with legal frameworks and institutional responses gradually strengthening but remaining insufficient. Intersectional analysis recognizes that gender inequality intersects with other forms of marginalization based on race, ethnicity, and socioeconomic status. Political representation of women has improved substantially in numerous democracies, though significant underrepresentation persists across most legislative bodies. Addressing gender inequality comprehensively requires ongoing legal reform, cultural transformation regarding gender expectations, economic policy supporting work-life balance, and institutional accountability for harassment and violence.",
ja: "フェミニスト的な提唱、立法改革、および性別の役割と平等に対する進化する社会的態度を通じて、性別ダイナミクスが実質的な変換を経ています。女性の労働市場参加は劇的に増加し、特に専門的でマネジリアルなポジションで、職業的分離の歴史的なパターンに挑戦しています。しかし、継続的な賃金格差と特定のセクターでの職業的分離は、差別の法的禁止にもかかわらず、性別の不平等が継続することを示しています。避妊薬アクセスと中絶権を含む生殖的自律性は、ますます政治的に争われるようになり、ポリシーアプローチは管轄全体で大幅に異なります。児童保育および高齢者ケアを含むケアの責任は、相変わらず女性に不均衡に割り当てられ、キャリアの進展を制約し、生涯所得の格差に寄与しています。ジェンダーベースの暴力と嫌がらせは、深刻な社会問題であり続け、法的枠組みと制度的対応が徐々に強化されていますが、依然として不十分です。交差分析は、性別の不平等が人種、民族性、および社会経済的地位に基づく他の形態の辺縁化と交差することを認識しています。多くの民主主義における女性の政治的代表は大幅に改善されていますが、大幅な過小代表は大多数の立法機関全体で継続しています。性別の不平等に包括的に対処することは、進行中の法的改革、性別の期待に関する文化的変容、ワークライフバランスをサポートする経済政策、およびハラスメントと暴力に対する制度的説明責任を必要とします。",

{q: "How does caregiving responsibility allocation affect women?", opts: ["Enhances career progression", "Constrains career advancement and earnings", "Improves social status", "Increases political representation"], ans: 1}

{
text: "Educational systems represent foundational institutions determining social mobility trajectories, economic competitiveness, and democratic participation capabilities across populations. Quality educational disparities between advantaged and disadvantaged communities perpetuate intergenerational poverty and limit meritocratic advancement opportunities for talented individuals from marginalized backgrounds. Curriculum design decisions reflect complex negotiations between traditional academic disciplines and emerging competency requirements encompassing critical thinking, collaboration, and technological literacy. Standardized testing approaches, implemented with intentions of ensuring educational quality and facilitating objective assessment, have been criticized for reducing educational experience to narrow metrics and disadvantaging culturally diverse learners. Teachers, as pivotal actors in educational processes, face increasing demands regarding curriculum delivery, student mental health support, and classroom management amid resource constraints. Digital transformation in education, accelerated by global health crises, has created unprecedented access to online learning platforms while simultaneously exposing digital divides limiting equitable participation. Higher education expansion has increased degree attainment rates, yet employment outcomes for graduates have become increasingly uncertain, with concerns regarding debt accumulation and credential inflation. Lifelong learning frameworks acknowledge that education extends beyond initial schooling, requiring systems supporting continuous skill development and professional adaptation throughout careers. Comprehensive educational reform encompasses equitable resource allocation, pedagogical innovation, teacher professional development, and integration of diverse perspectives within curricula.",
ja: "教育システムは、人口全体を通じた社会的流動性の軌跡、経済的競争力、および民主的参加能力を決定する基礎的な機関を表しています。恵まれた地域と恵まれていないコミュニティ間の質の教育的格差は、世代間貧困を永続させ、辺縁化された背景からの才能のある個人のためのメリットベースの進歩機会を制限しています。カリキュラム設計決定は、従来の学問的分野と批判的思考、協力、および技術的リテラシーを網羅する新興の能力要件間の複雑な交渉を反映しています。教育の質を確保し、客観的な評価を促進する意図で実装された標準化されたテスト方法は、教育経験を狭いメトリクスに低減し、文化的に多様な学習者を不利にすることで批判されています。教育プロセスにおけるピボタルな俳優である教師は、リソースの制約の中でのカリキュラム配信、生徒のメンタルヘルスサポート、および教室管理に関する増加する要求に直面しています。グローバルヘルス危機によって加速された教育のデジタル変換は、オンライン学習プラットフォームへの前例のないアクセスを作成しながら同時に公平な参加を制限するデジタル格差を露出させました。高等教育の拡大は学位修得率を増加させていますが、卒業生のための雇用転帰はますます不確実になり、債務蓄積と認証インフレに関する懸念があります。生涯学習フレームワークは、教育が初期の就学を超えて拡張することを認識し、キャリア全体を通じた継続的なスキル開発と専門家の適応をサポートするシステムが必要です。包括的な教育改革は、公平なリソース割り当て、教育的革新、教師の専門的開発、およびカリキュラム内の多様な視点の統合を含みます。",
qs: [
{q: "What do educational disparities perpetuate?", opts: ["Social mobility opportunities", "Intergenerational poverty and limited advancement", "Improved access to education", "Increased teacher salaries"], ans: 1},
{q: "What concern is raised regarding standardized testing?", opts: ["Insufficient assessment methods", "Reduction of education to narrow metrics and disadvantaging diverse learners", "Lack of objective evaluation", "Excessive resource allocation"], ans: 1},
{q: "What has digital transformation in education exposed?", opts: ["Improved educational quality", "Digital divides limiting equitable participation", "Reduced student enrollment", "Enhanced traditional methods"], ans: 1}
]

{
text: "Environmental sustainability represents an increasingly urgent societal imperative as ecological degradation, climate change, and resource depletion threaten ecosystem services and human wellbeing globally. Anthropogenic activities, particularly fossil fuel combustion and industrial agriculture, have fundamentally altered planetary biogeochemical cycles, precipitating climate disruption with cascading ecological and societal consequences. Transitioning toward renewable energy systems, implementing circular economy principles, and conserving biodiversity necessitate comprehensive policy frameworks, technological innovation, and substantial behavioral transformations across populations. Corporate accountability mechanisms, encompassing environmental impact assessment and sustainability reporting standards, represent attempts to internalize ecological externalities within market mechanisms. However, political resistance from fossil fuel interests and ideological opposition to environmental regulation have substantially hindered implementation of comprehensive climate policies. Just transition frameworks aim to manage economic disruptions accompanying sectoral transformation, ensuring that workers and communities dependent on carbon-intensive industries receive adequate support. Climate justice considerations acknowledge that vulnerable populations bear disproportionate burdens from environmental degradation despite contributing minimally to causation. International cooperation frameworks, including multilateral agreements and collaborative research initiatives, remain essential for addressing transnational environmental challenges. Achieving environmental sustainability requires fundamental system transformation encompassing energy systems, agricultural practices, consumption patterns, and economic models prioritizing long-term ecological health alongside human flourishing.",
ja: "環境持続可能性は、生態学的悪化、気候変動、およびリソース枯渇が世界的にエコシステムサービスと人間のウェルビーイングを脅かすため、ますます緊急の社会的強制を表しています。特に化石燃料燃焼と産業農業を含む人為的活動は、地球の生物地球化学的サイクルを根本的に変え、カスケード生態系および社会的結果を伴う気候の混乱を引き起こしました。再生可能エネルギーシステムへの移行、循環経済原則の実装、および生物多様性の保全には、人口全体を通じた包括的なポリシーフレームワーク、技術革新、および実質的な行動変換が必要です。環境影響評価と持続可能性報告基準を網羅する企業説明責任メカニズムは、市場メカニズム内で生態学的外部性を内部化する試みを表しています。しかし、化石燃料の利益からの政治的抵抗と環境規制に対するイデオロギー的反対は、包括的な気候政策の実装を大幅に妨げています。公正な移行フレームワークは、セクター変換に伴う経済的混乱を管理することを目的としており、炭素集約的な産業に依存する労働者とコミュニティが適切なサポートを受け取ることを確保しています。気候正義に関する考慮は、脆弱な人口が原因への最小限の寄与にもかかわらず、環境悪化から不均衡な負担を負うことを認識しています。多国間協定と共同研究イニシアティブを含む国際協力フレームワークは、国家を超えた環境課題に対処するために引き続き重要です。環境持続可能性を達成するには、エネルギーシステム、農業慣行、消費パターン、および長期的な生態学的健康を優先する経済モデルを網羅する基本的なシステム変革が必要です。",
qs: [
{q: "What human activities have altered planetary cycles?", opts: ["Renewable energy use", "Fossil fuel combustion and industrial agriculture", "Conservation efforts", "Sustainable farming practices"], ans: 1},
{q: "What do corporate accountability mechanisms attempt to address?", opts: ["Profit maximization", "Internalize ecological externalities within markets", "Reduce transparency", "Decrease sustainability reporting"], ans: 1},
{q: "What is a goal of just transition frameworks?", opts: ["Maximize economic disruption", "Ensure adequate support for workers in carbon-intensive industries", "Eliminate environmental regulation", "Prioritize fossil fuel interests"], ans: 1}
]
}
]
},
"level6":{
environment:[
    {
      text: "The concept of carbon sequestration has emerged as a pivotal strategy in mitigating anthropogenic climate change. Terrestrial ecosystems, particularly forests and wetlands, function as biological carbon sinks by absorbing CO2 through photosynthesis and storing it in biomass. However, contemporary deforestation practices have substantially diminished these natural reserves, releasing previously sequestered carbon back into the atmosphere. Recent scientific endeavours have explored technological interventions, including direct air capture and geological storage, to artificially remove carbon dioxide. Despite promising initial results, these approaches remain economically prohibitive for large-scale implementation. Consequently, protecting and restoring existing ecosystems presents a more pragmatic solution. The Amazon rainforest, often termed 'the planet's lungs,' exemplifies this principle, though political and economic pressures continue to jeopardise its preservation. International frameworks such as REDD+ initiatives attempt to incentivise conservation through financial mechanisms. Nevertheless, achieving meaningful emissions reductions necessitates multifaceted approaches encompassing renewable energy transition, industrial restructuring, and behavioural modification. The intersection of environmental science and policy remains fraught with complexity, requiring sustained commitment from governments, corporations, and individuals to effectuate substantive change.",
      ja: "炭素隔離の概念は、人為的気候変動の緩和における重要な戦略として浮上している。陸上生態系、特に森林と湿地は、光合成によるCO2吸収とバイオマスへの貯蔵を通じて、生物学的炭素吸収源として機能している。しかし、現代の森林破壊慣行はこれらの天然資源を大幅に減少させ、以前に隔離された炭素を大気中に放出している。最近の科学的取り組みは、直接空気回収と地質貯蔵を含む技術的介入を探索している。有望な初期結果にもかかわらず、これらのアプローチは大規模実装には経済的に実行不可能なままである。したがって、既存の生態系の保護と復元がより実用的な解決策を提示している。アマゾン熱帯雨林は、しばしば「地球の肺」と称されるが、政治的および経済的圧力がその保全を危険にさらし続けている。REDD+イニシアティブなどの国際的枠組みは、財政メカニズムを通じて保全を奨励しようと試みている。それでも、意味のある排出削減の達成には、再生可能エネルギー転換、産業再構成、および行動修正を包含する多面的アプローチが必要である。環境科学と政策の交差点は複雑さに満ちており、実質的変化をもたらすために政府、企業、および個人からの継続的なコミットメントが必要とされる。",
      qs: [
        {q: "What is the primary function of terrestrial ecosystems in relation to carbon?", opts: ["Releasing stored carbon into the atmosphere", "Absorbing CO2 and storing it in biomass", "Reducing atmospheric oxygen levels", "Converting methane to CO2"], ans: 1},
        {q: "According to the passage, why are technological carbon removal methods currently limited?", opts: ["They are environmentally harmful", "They are economically prohibitive for large-scale implementation", "They have not been proven scientifically", "They require government approval"], ans: 1},
        {q: "What does REDD+ attempt to achieve?", opts: ["Increase industrial carbon emissions", "Promote renewable energy technology", "Incentivise conservation through financial mechanisms", "Reduce global agricultural production"], ans: 2}
