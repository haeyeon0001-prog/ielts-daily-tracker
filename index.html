education:[
    {text:"School is important for children. Teachers help students learn. Learning helps you get good jobs later. You need to study hard and listen in class. Education is the key to success.", ja:"学校は子どもたちにとって重要です。教師は学生が学ぶのを助けます。学ぶことは後で良い仕事を得るのに役立ちます。授業で一生懸命勉強して聞く必要があります。教育は成功の鍵です。", qs:[{q:"Who helps students learn?", opts:["Parents only", "Teachers", "Friends", "TV"], ans:1}, {q:"What does learning help with?", opts:["Playing", "Getting good jobs", "Sleeping", "Eating"], ans:1}, {q:"What is the key to success?", opts:["Money", "Playing games", "Education", "Watching TV"], ans:2}]},
    {text:"Reading is very important. Books teach us about the world. We learn new words when we read. Reading helps us think and understand. Children who read do better in school.", ja:"読書は非常に重要です。本は私たちに世界について教えます。読むときに新しい言葉を学びます。読書は私たちが考えて理解するのを助けます。読む子どもたちは学校でよりうまくいきます。", qs:[{q:"What do books teach us?", opts:["How to play", "About the world", "How to run", "Nothing"], ans:1}, {q:"What do we learn when we read?", opts:["Sports only", "New words", "Games", "Nothing"], ans:1}, {q:"Do children who read do better in school?", opts:["No", "Sometimes", "Yes", "Never"], ans:2}]},
    {text:"Teachers work very hard. They plan lessons and teach every day. Good teachers care about their students. They help students when they have problems. Teachers make a big difference in children's lives.", ja:"教師は非常に一生懸命働きます。彼らは毎日レッスンを計画して教えます。良い教師は学生を気にします。彼らは問題があるときに学生を助けます。教師は子どもの人生に大きな違いを作ります。", qs:[{q:"What do teachers do every day?", opts:["Play games", "Plan lessons and teach", "Sleep", "Eat only"], ans:1}, {q:"What do good teachers care about?", opts:["Money", "Their students", "Vacation", "Nothing"], ans:1}, {q:"What do teachers make?", opts:["Houses", "Food", "A big difference in children's lives", "Cars"], ans:2}]},
    {text:"Mathematics is useful in daily life. We use math to count money and tell time. We use math in cooking and shopping. Learning math helps us solve problems. Numbers are everywhere.", ja:"数学は日常生活で有用です。お金を数えたり、時間を見たりするために数学を使います。調理や買い物で数学を使います。数学を学ぶことは問題を解くのに役立ちます。数字はどこにでもあります。", qs:[{q:"When do we use math?", opts:["Never", "In daily life", "Only at school", "Only in stores"], ans:1}, {q:"What do we use math for?", opts:["Playing", "Counting money and telling time", "Sleeping", "Running"], ans:1}, {q:"What is everywhere?", opts:["People", "Trees", "Numbers", "Houses"], ans:2}]},
    {text:"Science teaches us how things work. We learn about animals, plants, and space. Science is exciting and fun. Scientists make discoveries that help people. Everyone should study science.", ja:"科学は物がどのように機能するかを教えます。動物、植物、宇宙について学びます。科学は興奮的で楽しいです。科学者は人々を助ける発見をします。誰もが科学を勉強すべきです。", qs:[{q:"What does science teach?", opts:["Languages", "How things work", "Sports", "Art"], ans:1}, {q:"Is science exciting?", opts:["No", "Yes", "Sometimes", "Never"], ans:1}, {q:"What do scientists do?", opts:["Play games", "Make discoveries that help people", "Sleep", "Eat"], ans:1}]},
    {text:"Writing is an important skill. Good writing helps you communicate with others. You need writing for emails, messages, and work. Learning to write clearly is important. Practice makes writing better.", ja:"文章を書くことは重要なスキルです。良い文章はあなたが他の人と通信するのを助けます。メール、メッセージ、仕事のために文章が必要です。明確に書くことを学ぶことは重要です。練習は文章を上達させます。", qs:[{q:"Why is writing important?", opts:["It's not", "To communicate with others", "For fun only", "For nothing"], ans:1}, {q:"Where do you need writing?", opts:["Nowhere", "At home only", "Emails, messages, and work", "At school only"], ans:2}, {q:"What makes writing better?", opts:["Sleeping", "Practice", "Playing", "Watching TV"], ans:1}]},
    {text:"Computers are important tools for learning. Students use computers at school. Computers help us find information fast. We can watch videos and listen to lessons. Technology changes education.", ja:"コンピューターは学習の重要なツールです。学生は学校でコンピューターを使用します。コンピューターは私たちが情報を速く見つけるのを助けます。ビデオを見たり、レッスンを聞いたりできます。技術は教育を変えます。", qs:[{q:"Are computers important for learning?", opts:["No", "Yes", "Maybe", "Not at all"], ans:1}, {q:"What do computers help us do?", opts:["Sleep", "Find information fast", "Forget things", "Be lazy"], ans:1}, {q:"What does technology change?", opts:["Nothing", "Only games", "Education", "Food"], ans:2}]},
    {text:"English is a global language. Many people speak English around the world. Learning English helps you get jobs. You can travel and talk to new people. English opens many opportunities.", ja:"英語は国際言語です。世界中の多くの人々が英語を話します。英語を学ぶことは仕事を得るのに役立ちます。旅行して新しい人に話しかけることができます。英語は多くの機会を開きます。", qs:[{q:"How many people speak English?", opts:["A few", "Many people", "Nobody", "Only Americans"], ans:1}, {q:"What does learning English help with?", opts:["Playing games", "Getting jobs", "Sleeping", "Nothing"], ans:1}, {q:"What does English open?", opts:["Doors physically", "Many opportunities", "Schools", "Books only"], ans:1}]},
    {text:"Homework helps students learn more. Teachers give homework to practice lessons. Homework takes time but helps you understand. Students should do homework carefully. Hard work leads to success.", ja:"宿題は学生がもっと学ぶのを助けます。教師はレッスンを練習するために宿題を与えます。宿題は時間がかかりますが、理解するのに役立ちます。学生は注意深く宿題をすべきです。努力は成功につながります。", qs:[{q:"What does homework help with?", opts:["Playing", "Learning more", "Sleeping", "Eating"], ans:1}, {q:"Why do teachers give homework?", opts:["To be mean", "To practice lessons", "For fun", "For no reason"], ans:1}, {q:"What leads to success?", opts:["Laziness", "Hard work", "Playing games", "Sleeping only"], ans:1}]},
    {text:"Universities are places for higher education. Students go to university after school. At university, you learn special skills for your job. University is expensive but helps your career. Many people study at university.", ja:"大学は高等教育の場所です。学生は学校の後に大学に行きます。大学では、仕事のための特別なスキルを学びます。大学は高価ですが、キャリアに役立ちます。多くの人々が大学で勉強しています。", qs:[{q:"What do you do at university?", opts:["Play games", "Learn special skills for your job", "Sleep", "Work at farms"], ans:1}, {q:"Is university expensive?", opts:["No", "Yes", "Sometimes", "Never"], ans:1}, {q:"Does university help your career?", opts:["No", "Yes", "Maybe", "Not at all"], ans:1}]}
  ],
technology:[
    {text:"Smartphones are very popular. Most people have a smartphone now. We use phones to call, text, and take pictures. Phones help us stay connected with friends. Technology is always improving.", ja:"スマートフォンは非常に人気があります。ほとんどの人が今スマートフォンを持っています。電話を使って電話をかけたり、テキストを送ったり、写真を撮ったりします。電話は私たちが友人とつながっているのを助けます。技術は常に改善しています。", qs:[{q:"What do people use phones for?", opts:["Only calling", "Call, text, and take pictures", "Only texting", "Nothing"], ans:1}, {q:"Do most people have a smartphone?", opts:["No", "Yes", "Maybe", "Only some"], ans:1}, {q:"What does technology do?", opts:["Stay the same", "Break things", "Always improve", "Disappear"], ans:2}]},
    {text:"The internet connects people worldwide. We use internet for work, school, and fun. Internet helps us find information quickly. Without internet, life is very different. Internet is important for modern life.", ja:"インターネットは世界中の人々を接続します。仕事、学校、楽しみのためにインターネットを使用します。インターネットは私たちが情報を速く見つけるのを助けます。インターネットなしでは、人生は非常に異なります。インターネットは現代生活にとって重要です。", qs:[{q:"What does internet do?", opts:["Separates people", "Connects people worldwide", "Breaks phones", "Nothing"], ans:1}, {q:"Do we use internet for work?", opts:["No", "Yes", "Sometimes", "Never"], ans:1}, {q:"Is internet important for modern life?", opts:["No", "Yes", "Maybe", "Not at all"], ans:1}]},
    {text:"Laptops and computers are useful tools. People use computers for work and school. We type documents and send emails on computers. Games are also on computers. Computers help productivity increase.", ja:"ラップトップとコンピューターは便利なツールです。人々は仕事と学校のためにコンピューターを使用します。コンピューターで文書を入力したり、メールを送ったりします。ゲームもコンピューターにあります。コンピューターは生産性の向上に役立ちます。", qs:[{q:"What are computers used for?", opts:["Playing only", "Work and school", "Sleeping", "Eating"], ans:1}, {q:"What can you do on computers?", opts:["Type and send emails", "Only eat", "Only sleep", "Nothing"], ans:0}, {q:"Do computers help productivity?", opts:["No", "Yes", "Maybe", "Not at all"], ans:1}]},
    {text:"Social media helps people stay connected. Facebook, Instagram, and Twitter are popular. We share photos and talk with friends online. Social media is fast and easy. Many people use social media every day.", ja:"ソーシャルメディアは人々が接続し続けるのを助けます。Facebook、Instagram、Twitterは人気があります。オンラインで写真を共有したり、友人と話したりします。ソーシャルメディアは速くて簡単です。多くの人々が毎日ソーシャルメディアを使用しています。", qs:[{q:"What is social media for?", opts:["Sleeping", "Staying connected", "Eating", "Nothing"], ans:1}, {q:"Is social media fast and easy?", opts:["No", "Yes", "Sometimes", "Never"], ans:1}, {q:"What do people do on social media?", opts:["Sleep", "Eat only", "Share photos and talk", "Nothing"], ans:2}]},
    {text:"Video games are popular entertainment. Kids and adults play video games. Games are on consoles, computers, and phones. Gaming helps hand-eye coordination. People enjoy games because they are fun.", ja:"ビデオゲームは人気のあるエンターテイメントです。子どもと大人がビデオゲームをします。ゲームはコンソール、コンピューター、電話にあります。ゲームは手と目の協調性を助けます。人々はゲームが楽しいので楽しんでいます。", qs:[{q:"Who plays video games?", opts:["Only kids", "Kids and adults", "Only adults", "Nobody"], ans:1}, {q:"Where are games found?", opts:["Only on consoles", "Consoles, computers, and phones", "Only on phones", "Nowhere"], ans:1}, {q:"Why do people like games?", opts:["They are hard", "They are boring", "They are fun", "They are bad"], ans:2}]},
    {text:"Cameras take pictures and videos. Modern cameras are in phones. We can take pictures anywhere and anytime. Cameras help us remember good memories. Photography is a popular hobby.", ja:"カメラは写真とビデオを撮ります。最新のカメラは電話にあります。どこでもいつでも写真を撮ることができます。カメラは私たちが良い思い出を覚えるのを助けます。写真は人気のあるホビーです。", qs:[{q:"Where are modern cameras found?", opts:["Only on computers", "In phones", "Only on cameras", "Nowhere"], ans:1}, {q:"When can we take pictures?", opts:["Only daytime", "Anywhere and anytime", "Only nighttime", "Never"], ans:1}, {q:"What does photography help with?", opts:["Forgetting", "Sleeping", "Remembering good memories", "Eating"], ans:2}]},
    {text:"Email is fast communication. We send messages using email. Emails are quick and reliable. You can send emails to anyone in the world. Email is important for business.", ja:"メールは速い通信です。メールを使ってメッセージを送ります。メールは迅速で信頼性があります。世界中の誰にでもメールを送ることができます。メールはビジネスにとって重要です。", qs:[{q:"Is email fast?", opts:["No", "Yes", "Sometimes", "Never"], ans:1}, {q:"Can you send emails to anyone?", opts:["No", "Yes, anywhere in the world", "Only nearby people", "Only family"], ans:1}, {q:"Is email important for business?", opts:["No", "Yes", "Maybe", "Not at all"], ans:1}]},
    {text:"Robots are becoming more common. Robots help with hard jobs. Factories use robots to make products. Robots can work without stopping. The future will have more robots.", ja:"ロボットはより一般的になっています。ロボットは難しい仕事を助けます。工場はロボットを使って製品を作ります。ロボットは止まることなく働くことができます。未来はより多くのロボットを持つでしょう。", qs:[{q:"Are robots becoming more common?", opts:["No", "Yes", "Maybe", "Never"], ans:1}, {q:"What do robots help with?", opts:["Playing", "Hard jobs", "Sleeping", "Eating"], ans:1}, {q:"Can robots work without stopping?", opts:["No", "Yes", "Maybe", "Never"], ans:1}]},
    {text:"Artificial Intelligence is advancing fast. AI helps with many tasks. Self-driving cars use AI. Hospitals use AI to find diseases. AI will change our future.", ja:"人工知能は急速に進歩しています。AIは多くのタスクを助けます。自動運転車はAIを使用します。病院はAIを使って病気を見つけます。AIは私たちの未来を変えるでしょう。", qs:[{q:"Is AI advancing fast?", opts:["No", "Yes", "Slowly", "Never"], ans:1}, {q:"Do self-driving cars use AI?", opts:["No", "Yes", "Maybe", "Never"], ans:1}, {q:"What will AI do?", opts:["Nothing", "Change our future", "Stop", "Go away"], ans:1}]},
    {text:"Wireless technology is everywhere now. WiFi connects to the internet without wires. We use wireless for phones and computers. Wireless is fast and convenient. Technology keeps improving each year.", ja:"ワイヤレス技術は今どこにでもあります。WiFiはワイヤなしでインターネットに接続します。電話とコンピューターにワイヤレスを使用します。ワイヤレスは速くて便利です。技術は毎年改善し続けています。", qs:[{q:"Does WiFi need wires?", opts:["Yes", "No", "Maybe", "Sometimes"], ans:1}, {q:"What do we use wireless for?", opts:["Only phones", "Phones and computers", "Only computers", "Nothing"], ans:1}, {q:"Is wireless convenient?", opts:["No", "Yes", "Sometimes", "Never"], ans:1}]}
  ],
health:[
    {text:"Exercise is good for your health. You should exercise every day. Walking, running, and swimming are good. Exercise makes your heart strong. Healthy people are happy people.", ja:"運動は健康に良いです。毎日運動すべきです。歩く、走る、泳ぐことは良いです。運動はあなたの心を強くします。健康な人は幸せな人です。", qs:[{q:"Should you exercise every day?", opts:["No", "Yes", "Maybe", "Never"], ans:1}, {q:"What does exercise do?", opts:["Breaks your heart", "Makes your heart strong", "Does nothing", "Makes you sick"], ans:1}, {q:"Are healthy people happy?", opts:["No", "Yes", "Sometimes", "Never"], ans:1}]},
    {text:"Eating healthy food is important. We eat fruit, vegetables, and meat. Good food gives us energy. Bad food makes us sick. Children should eat healthy food.", ja:"健康的な食べ物を食べることは重要です。フルーツ、野菜、肉を食べます。良い食べ物は私たちにエネルギーを与えます。悪い食べ物は私たちを病気にします。子どもたちは健康的な食べ物を食べるべきです。", qs:[{q:"What should we eat?", opts:["Only bad food", "Fruit, vegetables, and meat", "Only candy", "Nothing"], ans:1}, {q:"What does good food do?", opts:["Harms us", "Gives us energy", "Makes us tired", "Does nothing"], ans:1}, {q:"Should children eat healthy food?", opts:["No", "Yes", "Maybe", "Never"], ans:1}]},
    {text:"Sleep is important for your body. You need eight hours of sleep every night. Good sleep helps you learn and think. Tired people make mistakes. Going to bed early is good.", ja:"睡眠はあなたの体にとって重要です。毎晩8時間の睡眠が必要です。良い睡眠はあなたが学んで考えるのを助けます。疲れた人はミスをします。早く寝ることは良いです。", qs:[{q:"How many hours of sleep do you need?", opts:["Four", "Eight", "Two", "None"], ans:1}, {q:"What does good sleep help?", opts:["Playing games", "Learning and thinking", "Eating", "Nothing"], ans:1}, {q:"What do tired people do?", opts:["Work well", "Make mistakes", "Think clearly", "Play sports"], ans:1}]},
    {text:"Drinking water is very important. Water keeps your body healthy. You should drink water every day. Thirsty people need water. Water has no calories and is free.", ja:"水を飲むことは非常に重要です。水はあなたの体を健康に保ちます。毎日水を飲むべきです。喉が渇いた人は水が必要です。水にはカロリーがなく、無料です。", qs:[{q:"Is drinking water important?", opts:["No", "Yes", "Maybe", "Never"], ans:1}, {q:"What does water keep?", opts:["Warm", "Your body healthy", "Nothing", "Tired"], ans:1}, {q:"Does water have calories?", opts:["Yes, many", "No", "Maybe", "Some"], ans:1}]},
    {text:"Doctors help sick people. Doctors know about diseases and medicine. You should see a doctor when you are sick. Hospitals have doctors and nurses. Regular check-ups keep you healthy.", ja:"医者は病気の人を助けます。医者は病気と薬について知っています。病気のときは医者に行くべきです。病院には医者と看護師がいます。定期的なチェックアップはあなたを健康に保ちます。", qs:[{q:"Who helps sick people?", opts:["Teachers", "Doctors", "Police", "Nothing"], ans:1}, {q:"When should you see a doctor?", opts:["Never", "When you are sick", "Only on Sundays", "Never"], ans:1}, {q:"What do regular check-ups do?", opts:["Make you sick", "Keep you healthy", "Do nothing", "Waste time"], ans:1}]},
    {text:"Mental health is as important as physical health. Stress and worry can make you sick. You should relax and take breaks. Talking to friends helps. Happy thoughts make you feel better.", ja:"メンタルヘルスは身体的健康と同じくらい重要です。ストレスと心配はあなたを病気にします。リラックスして休憩を取るべきです。友人と話すことは役立ちます。幸せな考えはあなたの気分を改善します。", qs:[{q:"Is mental health important?", opts:["No", "Yes", "Maybe", "Not really"], ans:1}, {q:"What can make you sick?", opts:["Exercise", "Stress and worry", "Good sleep", "Healthy food"], ans:1}, {q:"Does talking to friends help?", opts:["No", "Yes", "Maybe", "Never"], ans:1}]},
    {text:"Vaccines protect against diseases. Doctors give vaccines to children. Vaccines are safe and important. They help your body fight illness. Many serious diseases are prevented by vaccines.", ja:"ワクチンは病気から保護します。医者は子どもにワクチンを与えます。ワクチンは安全で重要です。彼らはあなたの体が病気と戦うのを助けます。多くの深刻な病気はワクチンで予防されます。", qs:[{q:"What do vaccines do?", opts:["Cause disease", "Protect against diseases", "Do nothing", "Make you sick"], ans:1}, {q:"Are vaccines safe?", opts:["No", "Yes", "Maybe", "Never"], ans:1}, {q:"What do vaccines prevent?", opts:["Nothing", "Growth", "Serious diseases", "Sleep"], ans:2}]},
    {text:"Your teeth are important. You should brush teeth twice a day. Clean teeth look nice and stay healthy. Dentists check your teeth. Sugar and bad food hurt your teeth.", ja:"あなたの歯は重要です。1日2回歯を磨くべきです。きれいな歯は良く見えて、健康です。歯科医はあなたの歯をチェックします。砂糖と悪い食べ物はあなたの歯を傷つけます。", qs:[{q:"How many times should you brush teeth?", opts:["Once", "Twice a day", "Never", "Five times"], ans:1}, {q:"What do clean teeth do?", opts:["Look bad", "Look nice and stay healthy", "Fall out", "Hurt"], ans:1}, {q:"What hurts your teeth?", opts:["Water", "Vegetables", "Sugar and bad food", "Exercise"], ans:2}]},
    {text:"Being active is important for health. Sports and activities help you stay fit. Playing games, dancing, and cycling are fun. Active children are healthier. Movement helps your whole body.", ja:"アクティブであることは健康にとって重要です。スポーツと活動はあなたが健康を保つのを助けます。ゲーム、ダンス、サイクリングは楽しいです。アクティブな子どもはより健康です。動きはあなたの全身を助けます。", qs:[{q:"Is being active important?", opts:["No", "Yes", "Maybe", "Never"], ans:1}, {q:"What are fun activities?", opts:["Sleeping", "Games, dancing, and cycling", "Working", "Eating"], ans:1}, {q:"Are active children healthier?", opts:["No", "Yes", "Sometimes", "Never"], ans:1}]},
    {text:"Vitamins are important for your body. Vitamins help you grow strong. Fruit and vegetables have vitamins. Milk has vitamins too. You need vitamins every day.", ja:"ビタミンはあなたの体にとって重要です。ビタミンはあなたが強く成長するのを助けます。果物と野菜にはビタミンがあります。牛乳にもビタミンがあります。毎日ビタミンが必要です。", qs:[{q:"Are vitamins important?", opts:["No", "Yes", "Maybe", "Never"], ans:1}, {q:"What do vitamins do?", opts:["Make you weak", "Help you grow strong", "Do nothing", "Make you sick"], ans:1}, {q:"Where are vitamins found?", opts:["Only in pills", "Fruit, vegetables, and milk", "Nowhere", "Only in meat"], ans:1}]}
  ],
society:[
    {text:"Family is very important. Family members love and care for each other. Parents teach children right from wrong. Brothers and sisters are your friends. Family time is special and valuable.", ja:"家族は非常に重要です。家族メンバーはお互いを愛して世話をします。親は子どもに善悪を教えます。兄弟姉妹はあなたの友人です。家族の時間は特別で価値があります。", qs:[{q:"Is family important?", opts:["No", "Yes", "Maybe", "Never"], ans:1}, {q:"What do family members do?", opts:["Fight", "Love and care for each other", "Ignore each other", "Nothing"], ans:1}, {q:"Are brothers and sisters your friends?", opts:["No", "Yes", "Maybe", "Never"], ans:1}]},
    {text:"Communities help people together. Neighbors help neighbors in a community. People share food and help in hard times. Communities have schools and parks. Working together makes communities strong.", ja:"コミュニティは人々を一緒に助けます。近所の人はコミュニティで互いに助けます。人々は食べ物を共有し、困難なときに助けます。コミュニティには学校と公園があります。一緒に働くことはコミュニティを強くします。", qs:[{q:"Do neighbors help in communities?", opts:["No", "Yes", "Maybe", "Never"], ans:1}, {q:"What does a community have?", opts:["Only houses", "Schools and parks", "Only stores", "Nothing"], ans:1}, {q:"What makes communities strong?", opts:["Nothing", "Working together", "Fighting", "Staying apart"], ans:1}]},
    {text:"Friendship is valuable. Good friends support you. Friends help in good and bad times. Friends listen and care. True friendship lasts forever.", ja:"友情は価値があります。良い友人はあなたをサポートします。友人は良い時と悪い時に助けます。友人は聞いて気にします。真実の友情は永遠に続きます。", qs:[{q:"Is friendship valuable?", opts:["No", "Yes", "Maybe", "Never"], ans:1}, {q:"When do friends help?", opts:["Only in good times", "Only in bad times", "In good and bad times", "Never"], ans:2}, {q:"How long does true friendship last?", opts:["A day", "A month", "Forever", "Never"], ans:2}]},
    {text:"Respect is important in society. We should respect our parents and teachers. Respect means being polite and kind. Respecting others makes you a good person. Everyone deserves respect.", ja:"尊重は社会で重要です。親と教師を尊重すべきです。尊重とは丁寧で親切であることを意味します。他の人を尊重することはあなたを良い人にします。誰もが尊重に値します。", qs:[{q:"Is respect important?", opts:["No", "Yes", "Maybe", "Never"], ans:1}, {q:"What does respect mean?", opts:["Being rude", "Being polite and kind", "Being angry", "Nothing"], ans:1}, {q:"Does everyone deserve respect?", opts:["No", "Yes", "Some people", "Nobody"], ans:1}]},
    {text:"Helping others is good. We should help people in need. Volunteering helps the community. Giving to others makes you happy. Kind people make the world better.", ja:"他の人を助けることは良いです。困っている人を助けるべきです。ボランティアはコミュニティを助けます。他の人に与えることはあなたを幸せにします。親切な人は世界をより良くします。", qs:[{q:"Should we help people in need?", opts:["No", "Yes", "Maybe", "Never"], ans:1}, {q:"What does volunteering do?", opts:["Harms people", "Helps the community", "Does nothing", "Hurts society"], ans:1}, {q:"Do kind people make the world better?", opts:["No", "Yes", "Maybe", "Never"], ans:1}]},
    {text:"Communication is important in relationships. People should listen to each other. Talking helps solve problems. Good communication builds trust. Understanding others is important.", ja:"コミュニケーションは関係に重要です。人々はお互いに耳を傾けるべきです。話すことは問題を解くのに役立ちます。良いコミュニケーションは信頼を築きます。他の人を理解することは重要です。", qs:[{q:"Is communication important?", opts:["No", "Yes", "Maybe", "Never"], ans:1}, {q:"What does talking do?", opts:["Cause problems", "Solve problems", "Nothing", "Hurt"], ans:1}, {q:"What does good communication build?", opts:["Houses", "Trust", "Roads", "Nothing"], ans:1}]},
    {text:"Rules help society work well. Rules keep people safe. Schools and homes have rules. Following rules shows responsibility. Everyone should follow rules.", ja:"ルールは社会がうまく機能するのに役立ちます。ルールは人々を安全に保ちます。学校と家にはルールがあります。ルールに従うことは責任を示します。誰もがルールに従うべきです。", qs:[{q:"Do rules help society?", opts:["No", "Yes", "Maybe", "Never"], ans:1}, {q:"What do rules do?", opts:["Hurt people", "Keep people safe", "Do nothing", "Make things worse"], ans:1}, {q:"Should everyone follow rules?", opts:["No", "Yes", "Maybe", "Never"], ans:1}]},
    {text:"Culture is the way people live. Every country has different culture. Culture includes food, clothing, and traditions. Understanding cultures is important. Different cultures are interesting.", ja:"文化は人々が生きる方法です。すべての国は異なる文化を持っています。文化には食べ物、衣料品、伝統が含まれます。文化を理解することは重要です。異なる文化は興味深いです。", qs:[{q:"What is culture?", opts:["Only food", "The way people live", "Only clothing", "Nothing"], ans:1}, {q:"Does every country have different culture?", opts:["No", "Yes", "Maybe", "Never"], ans:1}, {q:"Are different cultures interesting?", opts:["No", "Yes", "Maybe", "Never"], ans:1}]},
    {text:"Work is important for adults. People work to earn money. Work helps support families. Having a job is important. Different people do different jobs.", ja:"仕事は大人にとって重要です。人々はお金を稼ぐために働きます。仕事は家族をサポートするのに役立ちます。仕事を持つことは重要です。異なる人は異なる仕事をします。", qs:[{q:"Why do people work?", opts:["For fun", "To earn money", "For nothing", "To sleep"], ans:1}, {q:"Is having a job important?", opts:["No", "Yes", "Maybe", "Never"], ans:1}, {q:"Do different people do different jobs?", opts:["No", "Yes", "Maybe", "Never"], ans:1}]},
    {text:"Traditions are important in societies. Families celebrate special days together. Holidays bring people together. Traditions teach values to children. Cultural traditions are meaningful and special.", ja:"伝統は社会で重要です。家族は特別な日を一緒に祝います。休日は人々を一緒に連れてきます。伝統は子どもに価値を教えます。文化的伝統は意味のある特別なものです。", qs:[{q:"Are traditions important?", opts:["No", "Yes", "Maybe", "Never"], ans:1}, {q:"Do holidays bring people together?", opts:["No", "Yes", "Maybe", "Never"], ans:1}, {q:"What do traditions teach?", opts:["Bad things", "Values", "Nothing", "Trouble"], ans:1}]}
  ]
},
"level2":{
environment:[
    {text:"Global warming is a serious environmental issue affecting our planet. Scientists observe rising temperatures every decade. Burning fossil fuels like coal and oil increases carbon dioxide in the atmosphere. This creates a greenhouse effect that traps heat. We must reduce our carbon footprint by using renewable energy sources.", ja:"地球温暖化は私たちの惑星に影響を与える深刻な環境問題です。科学者は毎年上昇する気温を観察しています。石炭や石油などの化石燃料を燃やすと、大気中の二酸化炭素が増加します。これは熱を閉じ込める温室効果を生み出します。再生可能エネルギー源を使用することで、私たちは炭素足跡を減らす必要があります。", qs:[{q:"What is a serious environmental issue?", opts:["Water pollution only", "Global warming", "Air pollution only", "None of these"], ans:1}, {q:"What gas increases in the atmosphere?", opts:["Nitrogen", "Hydrogen", "Carbon dioxide", "Oxygen"], ans:2}, {q:"How can we reduce carbon footprint?", opts:["Burn more coal", "Use renewable energy", "Drive more cars", "Cut more trees"], ans:1}]},
    {text:"Deforestation destroys natural habitats and causes species extinction. When forests are cleared for agriculture or development, countless animals lose their homes. Trees also absorb carbon dioxide from the air. Fewer trees mean more greenhouse gases remain in the atmosphere. Protecting forests helps both wildlife and climate change prevention.", ja:"森林破壊は自然の生息地を破壊し、種の絶滅を引き起こします。農業や開発のために森林が伐採されるとき、数え切れないほどの動物が家を失います。木はまた空気から二酸化炭素を吸収します。木が少ないほど、より多くの温室効果ガスが大気に残ります。森を保護することは、野生動物と気候変動防止の両方に役立ちます。", qs:[{q:"What does deforestation cause?", opts:["Plant growth", "Species extinction", "Clean air", "More oxygen"], ans:1}, {q:"Why do trees matter for climate?", opts:["They produce oxygen only", "They absorb carbon dioxide", "They give shade", "They produce fruit"], ans:1}, {q:"Who benefits from protecting forests?", opts:["Only humans", "Wildlife and climate", "Only animals", "Nobody"], ans:1}]},
    {text:"Ocean pollution affects marine ecosystems severely. Plastic waste breaks into microplastics that fish consume. Chemical pollution from factories contaminates water. Overfishing depletes fish populations dangerously. Coral reefs die from warming oceans and pollution. We need international laws to protect our oceans from further damage.", ja:"海洋汚染は海の生態系に深刻な影響を与えます。プラスチック廃棄物は魚が消費するマイクロプラスチックに分解されます。工場からの化学汚染は水を汚染します。過度の漁業は危険なほど魚の個体数を枯渇させます。温かい海と汚染からサンゴ礁が死にます。私たちはさらなる被害から海洋を保護するための国際法が必要です。", qs:[{q:"How does plastic affect marine life?", opts:["Helps them grow", "Fish consume microplastics", "No effect", "Makes them stronger"], ans:1}, {q:"What depletes fish populations?", opts:["Conservation efforts", "Ocean currents", "Overfishing", "Marine protection"], ans:2}, {q:"Why do coral reefs die?", opts:["Too much food", "Warming oceans and pollution", "Too much oxygen", "Growth"], ans:1}]},
    {text:"Renewable energy sources like wind and solar power provide sustainable solutions. Wind turbines convert wind into electricity without pollution. Solar panels capture sunlight and transform it to usable energy. These sources never deplete unlike fossil fuels. Investing in renewable energy reduces environmental damage and long-term costs.", ja:"風や太陽光などの再生可能エネルギー源は持続可能な解決策を提供します。風力タービンは汚染なしで風を電気に変換します。ソーラーパネルは日光をキャプチャして使用可能なエネルギーに変換します。これらの供給源は化石燃料とは異なり、枯渇しません。再生可能エネルギーへの投資は環境被害と長期的なコストを減らします。", qs:[{q:"What is a renewable energy source?", opts:["Coal", "Solar power", "Natural gas", "Oil"], ans:1}, {q:"What do wind turbines do?", opts:["Produce pollution", "Convert wind to electricity", "Heat water", "Clean air"], ans:1}, {q:"What is an advantage of renewable energy?", opts:["They deplete quickly", "They never run out", "They pollute", "They are expensive"], ans:1}]},
    {text:"Water scarcity affects millions of people worldwide. Many regions experience droughts lasting months or years. Rivers dry up, and groundwater decreases. Climate change worsens water availability in many areas. Communities must implement water conservation strategies and develop new water sources like desalination technology.", ja:"水不足は世界中の何百万人にも影響を与えます。多くの地域は数ヶ月または数年続く干ばつを経験します。川は乾き、地下水が減少します。気候変動は多くの地域の水の利用可能性を悪化させます。コミュニティは節水戦略を実装し、淡水化技術などの新しい水源を開発する必要があります。", qs:[{q:"What is a global problem?", opts:["Too much water", "Water scarcity", "Clean water", "Rainfall"], ans:1}, {q:"What causes water availability issues?", opts:["Population growth only", "Climate change", "Trees", "Ocean"], ans:1}, {q:"What can solve water scarcity?", opts:["Ignore it", "Desalination technology", "Burn fuel", "Cut trees"], ans:1}]},
    {text:"Biodiversity loss threatens ecosystem balance. Species disappear due to habitat destruction and climate change. When species vanish, ecosystems become unstable and less resilient. Pollinators like bees are critical for food production. Protected areas and conservation programs help maintain biodiversity. Countries must commit to preserving endangered species.", ja:"生物多様性の喪失は生態系のバランスを脅かします。種は生息地の破壊と気候変動により消えます。種が消えるとき、生態系は不安定になり、回復力が低下します。ミツバチなどの受粉者は食糧生産に不可欠です。保護区と保全プログラムは生物多様性の維持に役立ちます。国は絶滅危惧種の保護に取り組む必要があります。", qs:[{q:"What threatens ecosystem balance?", opts:["More animals", "Biodiversity loss", "More plants", "Rain"], ans:1}, {q:"Why are pollinators important?", opts:["For beauty", "Food production", "Air cleaning", "Nothing"], ans:1}, {q:"How can we preserve biodiversity?", opts:["Cut forests", "Protected areas and conservation", "Pollution", "Development"], ans:1}]},
    {text:"Soil degradation reduces agricultural productivity. Poor farming practices, overgrazing, and chemical use damage soil quality. Erosion washes away fertile topsoil. Without healthy soil, crops grow poorly. Sustainable agriculture practices like crop rotation and minimal tillage protect soil health. Soil conservation is essential for food security.", ja:"土壌劣化は農業生産性を低下させます。貧弱な農業慣行、過度な放牧、および化学物質の使用は土壌の品質を傷つけます。侵食は肥沃な表土を洗い去ります。健康な土壌がなければ、作物の成長は悪くなります。輪作と最小限の耕うんなどの持続可能な農業慣行は土壌の健全性を保護します。土壌の保全は食糧安全保障に不可欠です。", qs:[{q:"What causes soil degradation?", opts:["Rain", "Poor farming practices", "Sunshine", "Water"], ans:1}, {q:"What is the result of erosion?", opts:["Soil creation", "Topsoil loss", "Soil hardening", "Soil improvement"], ans:1}, {q:"What protects soil health?", opts:["Overgrazing", "Chemical pollution", "Sustainable agriculture", "Development"], ans:2}]},
    {text:"Air quality impacts human health significantly. Industrial emissions, vehicle exhaust, and burning fuels create smog and toxic particles. Breathing polluted air causes respiratory diseases and premature death. Children in polluted areas develop health problems. Cities implement emission controls and promote clean transportation. Better air quality improves public health outcomes dramatically.", ja:"空気の質は人間の健康に大きな影響を与えます。産業排出、自動車排気、燃料燃焼はスモッグと有毒粒子を生み出します。汚れた空気を吸うことは呼吸器疾患と早死をもたらします。汚れた地域の子どもたちは健康問題を発症します。都市は排出物規制を実装し、きれいな運輸を促進します。より良い空気の質は公衆衛生の成果を劇的に改善します。", qs:[{q:"What creates smog?", opts:["Trees", "Rain", "Industrial emissions and vehicle exhaust", "Sun"], ans:2}, {q:"What disease does air pollution cause?", opts:["Happiness", "Respiratory diseases", "Good health", "Growth"], ans:1}, {q:"How can cities improve air quality?", opts:["Ignore it", "Emit controls and clean transport", "Build factories", "Increase cars"], ans:1}]},
    {text:"Wetlands provide crucial ecosystem services. These areas store water, filter pollutants, and provide habitats. Wetlands reduce flooding by absorbing excess water. They also support diverse plant and animal species. Unfortunately, wetlands are drained for development. Protecting wetlands preserves water quality and biodiversity while reducing natural disaster risks.", ja:"湿地は重要な生態系サービスを提供します。これらの地域は水を貯蔵し、汚染物質をろ過し、生息地を提供します。湿地は余分な水を吸収することで洪水を減らします。彼らはまた多様な植物と動物の種をサポートします。残念ながら、湿地は開発のために排出されます。湿地を保護することは、水の品質と生物多様性を保存し、自然災害のリスクを減らします。", qs:[{q:"What do wetlands provide?", opts:["Only water", "Ecosystem services", "Pollution only", "Nothing"], ans:1}, {q:"How do wetlands reduce flooding?", opts:["They evaporate water", "Absorb excess water", "They block rain", "Nothing"], ans:1}, {q:"Why should we protect wetlands?", opts:["They harm animals", "Preserve water quality and biodiversity", "They cause floods", "Nothing matters"], ans:1}]},
    {text:"Waste management challenges increase as populations grow. Landfills accumulate garbage, creating methane emissions. Illegal dumping pollutes land and water. Recycling programs reduce waste volume but require infrastructure. Developing countries struggle with waste management due to limited resources. Circular economy principles minimize waste by reusing and repurposing materials.", ja:"人口が増加するにつれて、廃棄物管理の課題が増加します。埋め立て地はゴミを蓄積し、メタン排出を生成します。違法投棄は土地と水を汚染します。リサイクルプログラムは廃棄物量を減らしますが、インフラが必要です。発展途上国は限られたリソースのため廃棄物管理に苦労しています。サーキュラーエコノミーの原則は、材料を再利用して目的を変えることで廃棄物を最小化します。", qs:[{q:"What is created by landfills?", opts:["Clean air", "Methane emissions", "Good things", "Water"], ans:1}, {q:"What helps reduce waste?", opts:["More production", "Recycling and circular economy", "Burning", "Nothing"], ans:1}, {q:"Who struggles with waste management?", opts:["Rich countries", "Developed nations", "Developing countries", "Nobody"], ans:2}]}
  ],
education:[
    {text:"Quality education transforms lives and opens opportunities. Students with good education earn higher incomes and contribute more to society. Educational institutions must provide quality teachers, modern facilities, and relevant curriculum. Education reduces poverty and improves social mobility. Investing in education benefits entire nations through economic development and reduced inequality.", ja:"質の高い教育は人生を変え、機会を開きます。良い教育を受けた学生はより高い収入を得て、社会により多く貢献します。教育機関は質の高い教師、現代的な施設、関連するカリキュラムを提供する必要があります。教育は貧困を減らし、社会的流動性を改善します。教育への投資は経済発展と不平等の削減を通じて国全体に利益をもたらします。", qs:[{q:"What does quality education do?", opts:["Nothing important", "Transforms lives and opens opportunities", "Harms society", "Decreases income"], ans:1}, {q:"What should educational institutions provide?", opts:["Only buildings", "Quality teachers and facilities", "Nothing", "Entertainment only"], ans:1}, {q:"Does education benefit nations?", opts:["No", "Yes, through economic development", "Maybe", "Never"], ans:1}]},
    {text:"Critical thinking skills are essential in modern education. Students must analyze information, evaluate sources, and question assumptions. These skills prepare them for complex problem-solving in careers. Traditional education focused on memorization, but modern approaches emphasize understanding. Developing critical thinking helps students become independent learners who adapt to changing job markets.", ja:"批判的思考スキルは現代教育に不可欠です。学生は情報を分析し、情報源を評価し、仮定に疑問を呈する必要があります。これらのスキルは彼らを職業における複雑な問題解決のために準備します。従来の教育はメモリに焦点を当てていますが、現代的なアプローチは理解を強調しています。批判的思考を開発することは、学生が変化する労働市場に適応する独立した学習者になるのに役立ちます。", qs:[{q:"What are essential skills?", opts:["Memorization only", "Critical thinking skills", "Spelling only", "Sports only"], ans:1}, {q:"What do critical thinking skills help with?", opts:["Nothing", "Complex problem-solving", "Forgetting things", "Confusion"], ans:1}, {q:"Should modern education emphasize understanding?", opts:["No", "Yes", "Maybe", "Never"], ans:1}]},
    {text:"Online education has expanded learning opportunities dramatically. Students access quality courses from anywhere using internet. Flexible schedules allow working adults to study. Online platforms offer affordable alternatives to traditional universities. However, online learning requires self-discipline and motivation. Blended learning combining online and traditional methods shows excellent results.", ja:"オンライン教育は学習機会を劇的に拡大しました。学生はインターネットを使用してどこからでも質の高いコースにアクセスできます。柔軟なスケジュールは働く大人が勉強することを可能にします。オンラインプラットフォームは従来の大学に手頃な代替手段を提供します。しかし、オンライン学習は自己規律と動機付けが必要です。オンラインと従来の方法を組み合わせたブレンド学習は優れた結果を示しています。", qs:[{q:"What advantage does online education offer?", opts:["None", "Flexible schedules and accessibility", "High costs", "Less learning"], ans:1}, {q:"What does online learning require?", opts:["Nothing special", "Self-discipline and motivation", "Money only", "College"], ans:1}, {q:"What shows excellent results?", opts:["Only traditional learning", "Blended learning methods", "Only online learning", "No learning"], ans:1}]},
    {text:"STEM education prepares students for future careers. Science, Technology, Engineering, and Mathematics skills are highly demanded. Countries investing in STEM produce innovative solutions and competitive workforces. Girls should receive equal encouragement in STEM fields to increase female participation. STEM education develops problem-solving abilities and creative thinking.", ja:"STEM教育は学生を将来のキャリアに準備させます。科学、技術、工学、数学のスキルは非常に需要があります。STEM に投資している国は革新的なソリューションと競争力のある労働力を生産します。女性のSTEM分野への参加を増やすために、女の子は等しい励ましを受けるべきです。STEM教育は問題解決能力と創造的思考を開発します。", qs:[{q:"What does STEM include?", opts:["Only science", "Science, technology, engineering, math", "Only arts", "Only language"], ans:1}, {q:"Are STEM skills in demand?", opts:["No", "Yes, highly demanded", "Maybe", "Never"], ans:1}, {q:"Should girls study STEM?", opts:["No", "Yes, with equal encouragement", "Maybe", "Only boys"], ans:1}]},
    {text:"Teacher training and development are crucial for educational quality. Well-trained teachers create engaging classrooms and improve student outcomes. Professional development helps teachers stay updated with new teaching methods. Teachers deserve competitive salaries and respect from society. Investing in teacher quality is as important as building school infrastructure.", ja:"教師の訓練と発展は教育の質に不可欠です。よく訓練された教師は魅力的な教室を作成し、学生の成果を改善します。継続教育は教師が新しい教育方法で最新の状態を保つのに役立ちます。教師は社会から競争力のある給与と尊重に値します。教師の質への投資は学校のインフラを構築することと同じくらい重要です。", qs:[{q:"Why is teacher training important?", opts:["It's not", "For educational quality", "For nothing", "For wasting money"], ans:1}, {q:"What do well-trained teachers do?", opts:["Fail students", "Improve student outcomes", "Teach nothing", "Hurt children"], ans:1}, {q:"Are competitive salaries important for teachers?", opts:["No", "Yes, teachers deserve respect", "Maybe", "Never"], ans:1}]},
    {text:"Inclusive education ensures all children receive quality learning. Students with disabilities require appropriate support and accommodations. Inclusive classrooms benefit all students through diverse perspectives. Teachers need training to support diverse learning needs. Accessibility in physical spaces and curriculum materials is essential for inclusion.", ja:"包括的教育はすべての子どもが質の高い学習を受けることを保証します。障害のある学生は適切なサポートと配慮が必要です。包括的な教室は多様な視点を通じてすべての学生に利益をもたらします。教師は多様な学習ニーズをサポートするための訓練が必要です。物理的スペースとカリキュラム資料のアクセス可能性は包括性に不可欠です。", qs:[{q:"What does inclusive education ensure?", opts:["Exclusion", "All children receive quality learning", "Discrimination", "Nothing"], ans:1}, {q:"What do inclusive classrooms provide?", opts:["Same perspectives", "Diverse perspectives", "Nothing", "Barriers"], ans:1}, {q:"Is teacher training needed?", opts:["No", "Yes, for diverse learning needs", "Maybe", "Never"], ans:1}]},
    {text:"Curriculum design should balance traditional and modern approaches. Students need foundational knowledge in core subjects. Contemporary education must integrate technology and digital literacy. Project-based learning helps students apply knowledge practically. Curriculum should develop both academic and social-emotional skills for well-rounded development.", ja:"カリキュラム設計は従来的および現代的なアプローチのバランスをとるべきです。学生は主要科目の基礎知識が必要です。現代教育は技術とデジタルリテラシーを統合する必要があります。プロジェクトベースの学習は学生が実際に知識を適用するのに役立ちます。カリキュラムはバランスの取れた発展のための学力と社会感情的スキルの両方を開発する必要があります。", qs:[{q:"What should curriculum include?", opts:["Only technology", "Traditional and modern approaches", "Only old methods", "Nothing"], ans:1}, {q:"What does project-based learning help?", opts:["Memorization", "Practical application of knowledge", "Confusion", "Nothing"], ans:1}, {q:"Should education develop social-emotional skills?", opts:["No", "Yes, for well-rounded development", "Maybe", "Never"], ans:1}]},
    {text:"Assessment methods significantly impact learning outcomes. Traditional standardized tests measure only specific knowledge. Modern assessment includes formative assessment, portfolios, and peer evaluation. Regular feedback helps students understand progress and improve. Assessment should measure critical thinking and creativity alongside academic knowledge. Fair assessment practices reduce educational inequality.", ja:"評価方法は学習成果に大きな影響を与えます。従来の標準化テストは特定の知識のみを測定します。現代的な評価には、形成的評価、ポートフォリオ、ピア評価が含まれます。定期的なフィードバックは学生が進歩を理解し、改善するのに役立ちます。評価は学力と並んで批判的思考と創意工夫を測定する必要があります。公正な評価慣行は教育の不平等を減らします。", qs:[{q:"What do traditional tests measure?", opts:["Everything", "Only specific knowledge", "Creativity", "Nothing"], ans:1}, {q:"What does regular feedback help?", opts:["Confusion", "Understanding progress", "Failure", "Nothing"], ans:1}, {q:"Do assessment methods affect inequality?", opts:["No", "Yes, fair practices reduce inequality", "Maybe", "Never"], ans:1}]},
    {text:"Parental involvement strengthens educational outcomes significantly. Parents who engage in children's learning improve academic performance. Family support at home complements classroom instruction. Parent-teacher communication identifies challenges early. Different family structures all benefit from involvement in education. Schools should create welcoming environments for all families.", ja:"親の関与は教育の成果を大幅に強化します。子どもの学習に関与する親は学業成績を向上させます。家庭での家族のサポートは教室内の指導を補完します。親と教師のコミュニケーションは課題を早期に特定します。異なる家族構成はすべて教育への関与から利益を得ます。学校はすべての家族のための招待環境を作成する必要があります。", qs:[{q:"Does parental involvement help?", opts:["No", "Yes, significantly", "Maybe", "Never"], ans:1}, {q:"What does family support do?", opts:["Harms learning", "Complements classroom instruction", "Nothing", "Causes problems"], ans:1}, {q:"Should schools welcome all families?", opts:["No", "Yes", "Maybe", "Never"], ans:1}]},
    {text:"Lifelong learning keeps people competitive and engaged. Education doesn't end after school or university. Rapid technological change requires continuous skill development. Adults benefit from professional development and continuing education. Learning opportunities improve mental health and quality of life. Societies should support lifelong learning through accessible programs.", ja:"生涯学習は人々を競争力のあるものにします。教育は学校や大学の後で終わりません。急速な技術的変化は継続的なスキル開発を必要とします。大人は継続教育と継続教育から利益を得ます。学習機会はメンタルヘルスと生活の質を向上させます。社会はアクセス可能なプログラムを通じて生涯学習をサポートする必要があります。", qs:[{q:"When does education end?", opts:["After school", "Never, it's lifelong", "At college", "At age 30"], ans:1}, {q:"Why is continuous learning needed?", opts:["It's not", "Technological change requires it", "For fun", "Nothing"], ans:1}, {q:"Does learning improve quality of life?", opts:["No", "Yes", "Maybe", "Never"], ans:1}]}
  ],
technology:[
    {text:"Artificial Intelligence revolutionizes industries and daily life. Machine learning algorithms improve by processing vast data. AI powers recommendation systems, autonomous vehicles, and medical diagnostics. Concerns about job displacement and ethics require careful regulation. Developing responsible AI ensures benefits reach society while minimizing risks. AI training requires significant computational resources.", ja:"人工知能は産業と日常生活に革命を起こします。機械学習アルゴリズムは膨大なデータを処理することで改善されます。AIは推奨システム、自動運転車、医療診断を強化します。仕事の置き換えと倫理に関する懸念は慎重な規制を必要とします。責任ある AI の開発は、リスクを最小化しながら利益が社会に達することを保証します。AI トレーニングには大きな計算リソースが必要です。", qs:[{q:"What does AI power?", opts:["Nothing useful", "Autonomous vehicles and medical diagnostics", "Only games", "Toys"], ans:1}, {q:"What concerns exist about AI?", opts:["Nothing", "Job displacement and ethics", "Only costs", "Speed"], ans:1}, {q:"What is important for responsible AI?", opts:["No regulation", "Careful regulation", "Ignoring ethics", "Speed only"], ans:1}]},
    {text:"Cybersecurity threats increase as digital dependence grows. Hackers steal personal data, financial information, and intellectual property. Ransomware attacks paralyze businesses and governments. Strong passwords, two-factor authentication, and regular updates protect systems. Organizations must implement comprehensive security strategies. Individuals should develop cyber awareness habits to protect themselves online.", ja:"デジタル依存が増加するにつれて、サイバーセキュリティの脅威が増加します。ハッカーは個人データ、財務情報、知的財産を盗みます。ランサムウェア攻撃はビジネスと政府を麻痺させます。強力なパスワード、二要素認証、定期的な更新はシステムを保護します。組織は包括的なセキュリティ戦略を実装する必要があります。個人はオンラインで自分自身を保護するためにサイバー認識習慣を開発する必要があります。", qs:[{q:"What do hackers steal?", opts:["Nothing", "Personal data and financial information", "Only emails", "Time"], ans:1}, {q:"What protects systems?", opts:["Weak passwords", "Strong passwords and authentication", "Nothing", "No updates"], ans:1}, {q:"Should individuals develop cyber awareness?", opts:["No", "Yes, to protect online", "Maybe", "Never"], ans:1}]},
    {text:"Cloud computing transforms data storage and processing. Organizations move data to cloud servers instead of local storage. Cloud services offer scalability, flexibility, and cost efficiency. Users access files and applications from anywhere. Data security and privacy concerns require robust cloud infrastructure. Cloud computing enables businesses to scale rapidly without massive infrastructure investments.", ja:"クラウドコンピューティングはデータストレージと処理を変換します。組織はローカルストレージの代わりにクラウドサーバーにデータを移動します。クラウドサービスはスケーラビリティ、柔軟性、コスト効率を提供します。ユーザーはどこからでもファイルとアプリケーションにアクセスできます。データセキュリティとプライバシーの懸念は堅牢なクラウドインフラが必要です。クラウドコンピューティングは企業が大規模なインフラ投資なしで迅速に拡大することを可能にします。", qs:[{q:"What does cloud computing provide?", opts:["Only problems", "Scalability and flexibility", "Nothing", "Slow services"], ans:1}, {q:"Where can users access cloud files?", opts:["Only at office", "Anywhere with internet", "Nowhere", "Only at home"], ans:1}, {q:"What concern exists about cloud?", opts:["Nothing", "Data security and privacy", "Speed", "Cost only"], ans:1}]},
    {text:"5G technology enables faster internet connectivity. Speeds reach gigabytes per second compared to 4G megabytes. Ultra-low latency improves real-time applications. 5G supports Internet of Things devices. Smart cities, telemedicine, and autonomous vehicles rely on 5G infrastructure. Rollout continues globally despite infrastructure challenges.", ja:"5G テクノロジーはより高速なインターネット接続を有効にします。速度は4Gメガバイトと比較して毎秒ギガバイトに達します。超低遅延は リアルタイムアプリケーションを改善します。5G はモノのインターネットデバイスをサポートします。スマートシティ、遠隔医療、自動運転車は 5G インフラに依存しています。インフラの課題にもかかわらず、展開は世界中で続いています。", qs:[{q:"What speeds does 5G reach?", opts:["Megabytes", "Kilobytes", "Gigabytes per second", "Bytes"], ans:2}, {q:"What does 5G improve?", opts:["Nothing", "Real-time applications", "Slow speeds", "Old networks"], ans:1}, {q:"What relies on 5G?", opts:["Old phones", "Smart cities and telemedicine", "Nothing", "Dinosaurs"], ans:1}]},
    {text:"Biotechnology combines biology and technology for innovation. Gene editing with CRISPR enables disease treatment. Synthetic biology creates new organisms for specific purposes. Biofuels provide sustainable energy alternatives. Personalized medicine uses genetic information for treatment. Ethical guidelines regulate biotechnology research and applications. Public understanding and acceptance are crucial for biotechnology advancement.", ja:"バイオテクノロジーは生物学と技術を組み合わせて革新します。CRISPR による遺伝子編集は病気治療を可能にします。合成生物学は特定の目的のために新しい生物を作成します。バイオ燃料は持続可能なエネルギー代替を提供します。個別化医学は治療に遺伝情報を使用します。倫理的なガイドラインはバイオテクノロジー研究とアプリケーションを規制します。公開理解と受け入れはバイオテクノロジーの進歩に不可欠です。", qs:[{q:"What enables gene editing?", opts:["Surgery", "CRISPR technology", "Medicine", "Chemicals"], ans:1}, {q:"What does personalized medicine use?", opts:["Only symptoms", "Genetic information", "Guessing", "Nothing"], ans:1}, {q:"What is important for biotechnology?", opts:["Secrecy", "Public understanding and acceptance", "Ignoring ethics", "Speed"], ans:1}]},
    {text:"Virtual Reality immerses users in digital environments. VR headsets create realistic experiences for training and entertainment. Applications include medical training, architectural design, and gaming. VR reduces physical travel for meetings and events. Cost of equipment remains high for widespread adoption. Future VR will feature improved graphics and haptic feedback.", ja:"バーチャルリアリティはユーザーをデジタル環境に没入させます。VR ヘッドセットは訓練とエンターテイメント用の現実的な経験を作成します。アプリケーションには医療訓練、建築設計、ゲームが含まれます。VR は会議とイベントの物理的な移動を削減します。機器のコストは広範な採用のために高いままです。将来の VR はグラフィックスとハプティックフィードバックが改善されます。", qs:[{q:"What does VR create?", opts:["Nothing real", "Realistic digital experiences", "Only problems", "Fake things"], ans:1}, {q:"What are VR applications?", opts:["Nothing", "Medical training and design", "Only games", "Sleeping"], ans:1}, {q:"What reduces travel with VR?", opts:["Nothing", "Meetings and events", "Only entertainment", "Shopping"], ans:1}]},
    {text:"Quantum computing promises exponential computational power. Quantum bits enable simultaneous processing of multiple states. Quantum computers solve complex problems conventional computers cannot. Drug discovery, optimization, and cryptography benefit from quantum computing. Practical quantum computers remain expensive and experimental. Global investment in quantum research accelerates development.", ja:"量子コンピューティングは指数関数的な計算能力を約束します。量子ビットは複数の状態の同時処理を可能にします。量子コンピューターは従来のコンピューターが解決できない複雑な問題を解きます。創薬、最適化、暗号化は量子コンピューティングから利益を得ます。実用的な量子コンピューターは高価で実験的のままです。量子研究への世界的投資は開発を加速させます。", qs:[{q:"What do quantum bits enable?", opts:["Nothing", "Simultaneous processing", "Slow work", "Only one thing"], ans:1}, {q:"What problems do quantum computers solve?", opts:["Nothing", "Complex problems", "Simple only", "Nothing complex"], ans:1}, {q:"Are quantum computers practical now?", opts:["Yes, widespread", "No, expensive and experimental", "Maybe", "Always were"], ans:1}]},
    {text:"Blockchain technology creates decentralized and secure systems. Cryptocurrency uses blockchain for transparent transactions. Smart contracts execute agreements automatically on blockchain. Blockchain applications extend beyond finance to supply chain and identity verification. Scalability and energy consumption remain challenges. Blockchain adoption grows in various industries seeking transparency.", ja:"ブロックチェーン技術は分散化され、安全なシステムを作成します。暗号通貨はブロックチェーンを使用して透明な取引を行います。スマートコントラクトはブロックチェーン上の契約を自動的に実行します。ブロックチェーンアプリケーションは金融を超えてサプライチェーンと身分確認に拡張されます。スケーラビリティとエネルギー消費は課題のままです。ブロックチェーン採用は透明性を求めるさまざまな産業で増加しています。", qs:[{q:"What does blockchain enable?", opts:["Nothing secure", "Decentralized systems", "Insecurity", "Lies"], ans:1}, {q:"What do smart contracts do?", opts:["Nothing", "Execute agreements automatically", "Break contracts", "Confuse"], ans:1}, {q:"What remains a challenge?", opts:["Nothing", "Scalability and energy", "Making money", "Simplicity"], ans:1}]},
    {text:"Augmented Reality overlays digital information on physical world. AR applications improve navigation, education, and shopping. Mobile AR requires minimal equipment compared to VR. Smartphones already support AR through various applications. AR enhances real-world experiences with digital content. Widespread AR adoption transforms how people interact with environments.", ja:"拡張現実は物理的世界にデジタル情報をオーバーレイします。AR アプリケーションはナビゲーション、教育、買い物を改善します。モバイル AR は VR と比較して最小限の機器を必要とします。スマートフォンは既に様々なアプリケーションを通じて AR をサポートしています。AR は デジタルコンテンツを使用して現実世界の経験を強化します。広範な AR 採用は人々が環境と相互作用する方法を変えます。", qs:[{q:"What does AR overlay?", opts:["Nothing", "Digital information on physical world", "Only games", "Fake things"], ans:1}, {q:"What does AR enhance?", opts:["Nothing", "Real-world experiences with digital content", "Only entertainment", "Problems"], ans:1}, {q:"Does AR require special equipment?", opts:["Yes, always", "Minimal, smartphones work", "Expensive VR", "Never"], ans:1}]},
    {text:"Internet of Things connects devices for data collection. Smart homes control lighting, temperature, and security automatically. Wearable devices monitor health metrics continuously. Industrial IoT improves manufacturing efficiency. IoT generates massive data requiring robust storage solutions. Security vulnerabilities in IoT devices pose privacy risks. Connected ecosystem development continues rapidly.", ja:"モノのインターネットはデータ収集のためにデバイスを接続します。スマートホームは照明、温度、セキュリティを自動的に制御します。ウェアラブルデバイスは健康メトリクスを継続的に監視します。産業用 IoT は製造効率を向上させます。IoT は堅牢なストレージソリューションを必要とする大規模なデータを生成します。IoT デバイスのセキュリティの脆弱性はプライバシーリスクをもたらします。接続されたエコシステムの開発は急速に進み続けています。", qs:[{q:"What do smart homes control?", opts:["Nothing", "Lighting, temperature, security", "Only doors", "Weather"], ans:1}, {q:"What do wearables monitor?", opts:["Nothing", "Health metrics continuously", "Only time", "Temperature"], ans:1}, {q:"What is an IoT concern?", opts:["Benefits only", "Security and privacy risks", "Speed only", "Nothing matters"], ans:1}]}
  ],
health:[
    {text:"Mental health awareness reduces stigma and improves outcomes. Anxiety, depression, and stress affect millions globally. Therapy and counseling provide effective treatments. Workplace mental health programs support employee wellbeing. Physical exercise, sleep, and social connections improve mental health. Mental health deserves equal priority with physical health. Seeking help is a sign of strength, not weakness.", ja:"メンタルヘルスの認識は汚名を減らし、成果を改善します。不安、うつ病、ストレスは世界中の何百万人にも影響を与えます。セラピーとカウンセリングは効果的な治療を提供します。職場のメンタルヘルスプログラムは従業員の幸福をサポートします。身体運動、睡眠、社会的つながりはメンタルヘルスを改善します。メンタルヘルスは身体的健康と同等の優先度に値します。助けを求めることは弱さではなく、強さの表れです。", qs:[{q:"What does mental health awareness do?", opts:["Increases stigma", "Reduces stigma and improves outcomes", "Nothing", "Harms people"], ans:1}, {q:"What improves mental health?", opts:["Stress", "Exercise, sleep, social connections", "Isolation", "Worry"], ans:1}, {q:"Is seeking help a sign of weakness?", opts:["Yes", "No, it's strength", "Maybe", "Always"], ans:1}]},
    {text:"Preventive medicine reduces disease burden and healthcare costs. Regular screenings detect diseases early. Vaccinations protect against infectious diseases. Lifestyle modifications prevent chronic conditions. Doctors emphasize prevention rather than only treating diseases. Healthy habits like exercise and balanced diet prevent illness. Public health campaigns promote preventive approaches to disease.", ja:"予防医学は病気の負担と医療コストを削減します。定期的なスクリーニングは早期に病気を検出します。ワクチン接種は伝染病から保護します。生活様式の修正は慢性疾患を防ぎます。医者は病気を治療するだけでなく、予防を強調しています。運動とバランスの取れた食事などの健康的な習慣は病気を防ぎます。公衆衛生キャンペーンは病気への予防的アプローチを促進します。", qs:[{q:"What does preventive medicine reduce?", opts:["Health", "Disease burden and costs", "Life expectancy", "Nothing"], ans:1}, {q:"What do vaccinations do?", opts:["Cause disease", "Protect against infectious diseases", "Do nothing", "Harm immune system"], ans:1}, {q:"What prevents chronic conditions?", opts:["Smoking", "Lifestyle modifications", "Stress", "Sitting"], ans:1}]},
    {text:"Nutrition significantly impacts overall health and disease prevention. Balanced diets contain proteins, carbohydrates, fats, and micronutrients. Processed foods high in sugar and salt harm health. Nutritionists help create personalized meal plans. Proper nutrition supports immune function and energy. Childhood nutrition influences lifetime health outcomes. Governments implement nutrition policies to improve public health.", ja:"栄養は全体的な健康と病気予防に大きな影響を与えます。バランスの取れた食事にはタンパク質、炭水化物、脂肪、微量栄養素が含まれます。砂糖と塩が高い加工食品は健康を傷つけます。栄養士はパーソナライズされた食事計画を作成するのに役立ちます。適切な栄養は免疫機能とエネルギーをサポートします。小児期の栄養は生涯の健康成果に影響を与えます。政府は公衆衛生を改善するための栄養政策を実装します。", qs:[{q:"What does nutrition impact?", opts:["Nothing", "Overall health and disease prevention", "Only energy", "Only weight"], ans:1}, {q:"What harm health?", opts:["Vegetables", "Processed foods high in sugar and salt", "Fruits", "Water"], ans:1}, {q:"Does childhood nutrition matter?", opts:["No", "Yes, influences lifetime health", "Maybe", "Never"], ans:1}]},
    {text:"Pandemic preparedness saves lives and reduces healthcare system strain. Early detection systems identify disease outbreaks quickly. Vaccine development infrastructure accelerates response capabilities. Supply chains for medical equipment must remain resilient. Global coordination improves pandemic management effectiveness. Public education increases compliance with health measures. Investment in pandemic preparedness provides long-term benefits.", ja:"パンデミック対策は命を救い、医療システムの負担を減らします。早期検出システムは病気の発生を迅速に特定します。ワクチン開発インフラはよす能力を加速させます。医療機器のサプライチェーンは弾力的である必要があります。世界的な調整はパンデミック管理の有効性を改善します。公開教育は健康対策への準拠を増加させます。パンデミック対策への投資は長期的な利益を提供します。", qs:[{q:"What does pandemic preparedness do?", opts:["Nothing", "Saves lives and reduces strain", "Harms people", "Causes pandemics"], ans:1}, {q:"What identifies outbreaks?", opts:["Nothing", "Early detection systems", "Ignoring symptoms", "Luck"], ans:1}, {q:"Does pandemic preparedness help?", opts:["No", "Yes, provides long-term benefits", "Maybe", "Never"], ans:1}]},
    {text:"Chronic disease management improves quality of life. Diabetes, hypertension, and asthma require ongoing management. Patient education helps people control symptoms. Regular monitoring tracks disease progression. Medications and lifestyle changes work together. Multidisciplinary healthcare teams support comprehensive care. Technology enables remote monitoring and telemedicine consultations.", ja:"慢性疾患管理は生活の質を改善します。糖尿病、高血圧、喘息は継続的な管理が必要です。患者教育は人々が症状を制御するのに役立ちます。定期的な監視は病気の進行を追跡します。薬と生活様式の変化が一緒に機能します。 多学科医療チームは包括的なケアをサポートします。技術は遠隔監視とテレメディシン相談を可能にします。", qs:[{q:"What conditions require management?", opts:["None", "Diabetes, hypertension, asthma", "Only cold", "Nothing serious"], ans:1}, {q:"What helps control symptoms?", opts:["Ignoring disease", "Patient education", "Nothing", "Stress"], ans:1}, {q:"Can technology help?", opts:["No", "Yes, remote monitoring", "Maybe", "Never"], ans:1}]},
    {text:"Healthcare equity ensures all people receive quality care. Marginalized communities face barriers to healthcare access. Socioeconomic status affects health outcomes. Cultural competency in healthcare improves treatment effectiveness. Addressing healthcare disparities requires systemic changes. Investment in underserved communities strengthens entire health systems. Health equity is a human right and social justice issue.", ja:"ヘルスケア公平性はすべての人が質の高いケアを受けることを保証します。疎外されたコミュニティはヘルスケアアクセスへの障壁に直面しています。社会経済的地位は健康成果に影響を与えます。医療における文化的能力は治療の有効性を改善します。医療格差に対処するには、システム的な変化が必要です。未サービス地域への投資は医療システム全体を強化します。ヘルスケア公平性は人権と社会正義の問題です。", qs:[{q:"Who faces healthcare barriers?", opts:["Nobody", "Marginalized communities", "Rich people", "Doctors"], ans:1}, {q:"What affects health outcomes?", opts:["Nothing", "Socioeconomic status", "Age only", "Luck"], ans:1}, {q:"Is health equity a right?", opts:["No", "Yes, a human right", "Maybe", "Never"], ans:1}]},
    {text:"Reproductive health includes contraception, pregnancy care, and fertility treatment. Comprehensive sexual education reduces risks. Access to reproductive healthcare is fundamental. Safe pregnancy care reduces maternal mortality. Contraception allows family planning choices. Reproductive rights support women's autonomy and economic participation. Healthcare systems must provide accessible reproductive services.", ja:"生殖保健には避妊、妊娠ケア、不妊治療が含まれます。包括的な性教育はリスクを減らします。生殖保健へのアクセスは基本的です。安全な妊娠ケアは妊産婦死亡率を低下させます。避妊は家族計画の選択肢を可能にします。生殖権は女性の自律性と経済参加をサポートします。医療システムはアクセス可能な生殖サービスを提供する必要があります。", qs:[{q:"What does reproductive health include?", opts:["Nothing", "Contraception and pregnancy care", "Only exercise", "Only diet"], ans:1}, {q:"Does contraception help?", opts:["No", "Yes, allows family planning", "Maybe", "Harms"], ans:1}, {q:"Does safe pregnancy care reduce mortality?", opts:["No", "Yes, reduces maternal mortality", "Maybe", "Never"], ans:1}]},
    {text:"Substance abuse disorder is a treatable medical condition. Addiction affects brain chemistry and behavior. Treatment includes therapy, medications, and support groups. Rehabilitation programs improve recovery outcomes. Stigma prevents people from seeking treatment. Public health approach treats addiction as health issue. Prevention programs reduce substance abuse risk.", ja:"物質乱用障害は治療可能な医学的状態です。中毒は脳化学と行動に影響を与えます。治療にはセラピー、薬物、サポートグループが含まれます。リハビリプログラムは回復成果を改善します。汚名は人々が治療を求めるのを防ぎます。公衆衛生アプローチは中毒を健康問題として扱います。予防プログラムは物質乱用リスクを減らします。", qs:[{q:"Is addiction treatable?", opts:["No", "Yes, it's a medical condition", "Maybe", "Never"], ans:1}, {q:"What helps treatment?", opts:["Nothing", "Therapy, medication, support groups", "Ignoring it", "Punishment"], ans:1}, {q:"What prevents treatment-seeking?", opts:["Nothing", "Stigma", "Doctors", "Medicine"], ans:1}]},
    {text:"Aging populations require specialized healthcare approaches. Elderly people face multiple chronic conditions. Fall prevention and bone health are critical. Cognitive decline requires early detection and support. Social connections prevent isolation and depression. Long-term care facilities need proper staffing and resources. Healthcare systems must adapt to aging demographics.", ja:"高齢化する人口は特殊なヘルスケアアプローチを必要とします。高齢者は複数の慢性疾患に直面しています。転倒予防と骨の健康は重要です。認知低下には早期検出とサポートが必要です。社会的つながりは孤立と抑うつを防ぎます。長期ケア施設は適切な人員配置とリソースが必要です。医療システムは高齢化の人口統計に適応する必要があります。", qs:[{q:"What do elderly people face?", opts:["Nothing", "Multiple chronic conditions", "Only happiness", "Youth"], ans:1}, {q:"What is critical for elderly?", opts:["Ignoring", "Fall prevention and bone health", "Only exercise", "Nothing"], ans:1}, {q:"What prevents elderly isolation?", opts:["Nothing", "Social connections", "Loneliness", "Being alone"], ans:1}]},
    {text:"Public health surveillance monitors disease patterns and outbreaks. Data collection enables rapid response to health threats. Epidemiologists track disease spread using statistics. Early intervention prevents epidemic escalation. Transparency in health data builds public trust. International cooperation improves disease control capabilities. Surveillance respects privacy while protecting populations.", ja:"公衆衛生監視は病気のパターンと発生を監視します。データ収集は健康上の脅威への迅速な対応を可能にします。疫学者は統計を使用して病気の広がりを追跡します。早期介入は流行の拡大を防ぎます。健康データの透明性は公開信頼を構築します。国際協力は病気制御能力を改善します。監視はプライバシーを尊重しながら人口を保護します。", qs:[{q:"What does public health surveillance do?", opts:["Nothing", "Monitors disease patterns", "Causes disease", "Only counts people"], ans:1}, {q:"What does early intervention do?", opts:["Spreads disease", "Prevents epidemic escalation", "Nothing", "Harms health"], ans:1}, {q:"Does surveillance protect privacy?", opts:["No", "Yes, while protecting populations", "Maybe", "Never"], ans:1}]}
  ],
society:[
    {text:"Social responsibility encourages businesses to benefit society. Corporate social responsibility programs support communities. Ethical business practices build customer trust and loyalty. Companies reduce environmental impact through sustainability initiatives. Employee welfare and fair wages improve productivity. Responsible businesses outperform competitors long-term. Social responsibility is good for business and society.", ja:"社会的責任は企業が社会に利益をもたらすことを奨励します。企業の社会的責任プログラムはコミュニティをサポートします。倫理的なビジネス慣行は顧客の信頼と忠誠心を構築します。企業は持続可能性イニシアチブを通じて環境への影響を削減します。従業員福祉と公正な賃金は生産性を改善します。責任あるビジネスは長期的に競合他社よりも優れています。社会的責任はビジネスと社会に良いです。", qs:[{q:"What do CSR programs support?", opts:["Only profits", "Communities", "Nothing", "Enemies"], ans:1}, {q:"Do ethical practices help?", opts:["No", "Yes, build customer trust", "Maybe", "Hurt business"], ans:1}, {q:"Do responsible businesses succeed?", opts:["No", "Yes, outperform long-term", "Maybe", "Always fail"], ans:1}]},
    {text:"Gender equality remains a global priority despite progress. Women face wage gaps and underrepresentation in leadership. Education access has improved but disparities persist. Reproductive rights and safety from violence are essential. Empowering women strengthens economies and communities. Legal reforms protect women's rights comprehensively. Gender equality benefits everyone through diverse perspectives.", ja:"ジェンダー平等は進展にもかかわらず世界的な優先事項のままです。女性は賃金格差とリーダーシップでの過少表現に直面しています。教育へのアクセスは改善されていますが、格差は残ります。生殖権と暴力からの安全は不可欠です。女性を権限化することは経済とコミュニティを強化します。法的改革は女性の権利を包括的に保護します。ジェンダー平等は多様な視点を通じて誰もが利益を得ます。", qs:[{q:"What do women face?", opts:["Nothing", "Wage gaps and underrepresentation", "Only benefits", "Success"], ans:1}, {q:"What strengthens economies?", opts:["Discrimination", "Empowering women", "Inequality", "Nothing"], ans:1}, {q:"Does gender equality benefit everyone?", opts:["No", "Yes, through diversity", "Maybe", "Never"], ans:1}]},
    {text:"Social cohesion strengthens communities through trust and cooperation. Diverse societies benefit from inclusive policies. Integration of immigrants enriches cultural diversity. Reducing social inequality improves overall wellbeing. Community programs foster positive relationships. Strong social bonds prevent crime and mental health issues. Societies investing in cohesion experience stability.", ja:"社会的結束は信頼と協力を通じてコミュニティを強化します。多様な社会は包括的なポリシーから利益を得ます。移民の統合は文化的多様性を豊かにします。社会的不平等を減らすことは全体的な幸福を改善します。コミュニティプログラムは肯定的な関係を育みます。強い社会的結束は犯罪とメンタルヘルスの問題を防ぎます。結束に投資する社会は安定を経験します。", qs:[{q:"What strengthens communities?", opts:["Division", "Trust and cooperation", "Conflict", "Nothing"], ans:1}, {q:"Do immigrants enrich societies?", opts:["No", "Yes, cultural diversity", "Maybe", "Harm"], ans:1}, {q:"What do strong bonds prevent?", opts:["Nothing", "Crime and mental health issues", "Growth", "Good things"], ans:1}]},
    {text:"Human rights protection requires legal frameworks and enforcement. Freedom of speech, assembly, and religion are fundamental. Vulnerable populations need special protections. International conventions establish human rights standards. Violations must face accountability. Civil society organizations monitor and advocate for rights. Human rights education builds respect for dignity.", ja:"人権保護は法的枠組みと実施が必要です。言論、集会、宗教の自由は基本的です。脆弱な人口は特別な保護が必要です。国際条約は人権基準を確立しています。違反は説明責任に直面する必要があります。市民社会組織は権利を監視して提唱しています。人権教育は尊厳への尊重を構築します。", qs:[{q:"What are fundamental freedoms?", opts:["Only speech", "Speech, assembly, religion", "Only work", "Nothing"], ans:1}, {q:"Who needs special protections?", opts:["Nobody", "Vulnerable populations", "Only rich people", "Everyone equally"], ans:1}, {q:"What builds respect for rights?", opts:["Ignorance", "Human rights education", "Violations", "Secrecy"], ans:1}]},
    {text:"Political participation strengthens democracy through citizen engagement. Voting gives people power to shape government. Youth participation ensures future interests are represented. Women's political involvement improves policy outcomes. Marginalized groups amplify voices through activism. Transparency in governance builds public trust. Democratic processes require active participation.", ja:"政治参加は市民の関与を通じて民主主義を強化します。投票は人々に政府を形作る力を与えます。青年の参加は将来の利益が代表されることを保証します。女性の政治参加はポリシー成果を改善します。疎外されたグループは活動を通じて声を増幅します。ガバナンスの透明性は公開信頼を構築します。民主的プロセスは積極的な参加が必要です。", qs:[{q:"What does voting give?", opts:["Nothing", "Power to shape government", "Only responsibility", "Burden"], ans:1}, {q:"What does youth participation ensure?", opts:["Nothing", "Future interests represented", "Old ideas", "Conflict"], ans:1}, {q:"What builds trust?", opts:["Secrecy", "Transparency in governance", "Corruption", "Nothing"], ans:1}]},
    {text:"Intergenerational justice ensures resources for future generations. Climate action protects planetary health. Education investment builds human capital. Environmental conservation preserves biodiversity. Sustainable development balances present needs with future wellbeing. Intergenerational equity requires long-term thinking. Present actions shape future possibilities profoundly.", ja:"世代間正義は将来の世代のためのリソースを保証します。気候行動は惑星の健全性を保護します。教育投資は人的資本を構築します。環境保全は生物多様性を保存します。持続可能な開発は現在のニーズと将来の幸福のバランスを取ります。世代間公平性は長期的な思考が必要です。現在の行動は将来の可能性を深く形作ります。", qs:[{q:"What does intergenerational justice ensure?", opts:["Nothing", "Resources for future generations", "Only present", "Waste"], ans:1}, {q:"What protects planetary health?", opts:["Pollution", "Climate action", "Destruction", "Nothing"], ans:1}, {q:"What requires long-term thinking?", opts:["Quick profits", "Intergenerational equity", "Immediate results", "Nothing"], ans:1}]},
    {text:"Migration brings both opportunities and challenges. Migrants contribute economically and culturally to host communities. Integration policies help newcomers succeed. Language support and employment programs facilitate adjustment. Social cohesion requires inclusive practices. Xenophobia and discrimination harm social fabric. Humane migration policies balance security and compassion.", ja:"移行は機会と課題の両方をもたらします。移民は経済的および文化的にホストコミュニティに貢献しています。統合政策は新規参入者の成功に役立ちます。言語サポートと雇用プログラムは調整を促進します。社会的結束は包括的な慣行が必要です。外国人嫌悪と差別は社会的構造に害を与えます。人道的移行ポリシーはセキュリティと思いやりのバランスを取ります。", qs:[{q:"What do migrants contribute?", opts:["Nothing", "Economic and cultural", "Only problems", "Crime"], ans:1}, {q:"What helps integration?", opts:["Discrimination", "Language support and employment", "Rejection", "Xenophobia"], ans:1}, {q:"What harms social fabric?", opts:["Diversity", "Discrimination", "Cooperation", "Understanding"], ans:1}]},
    {text:"Poverty reduction requires multifaceted approaches addressing root causes. Education enables economic mobility. Microfinance helps entrepreneurs escape poverty. Healthcare access prevents poverty traps. Land rights and property ownership build wealth. Corruption and poor governance perpetuate poverty cycles. International aid supplements local development efforts. Sustainable poverty reduction empowers people.", ja:"貧困削減は根本原因に対処する多面的なアプローチが必要です。教育は経済的流動性を可能にします。マイクロファイナンスは起業家が貧困を逃げるのに役立ちます。ヘルスケアアクセスは貧困の罠を防ぎます。土地権と財産所有は富を構築します。腐敗と悪い統治は貧困の悪循環を永続させます。国際援助はローカル開発の取り組みを補完します。持続可能な貧困削減は人々を権限化します。", qs:[{q:"What enables mobility?", opts:["Nothing", "Education", "Poverty", "Corruption"], ans:1}, {q:"What prevents poverty traps?", opts:["Poor health", "Healthcare access", "Ignorance", "Disease"], ans:1}, {q:"What perpetuates poverty?", opts:["Good governance", "Corruption and poor governance", "Education", "Investment"], ans:1}]},
    {text:"Cultural preservation maintains heritage and identity. Traditional practices transmit values and knowledge. Globalization threatens endangered languages and customs. Museums and archives preserve cultural heritage. Indigenous rights protection supports cultural continuity. Cultural diversity enriches human experience globally. Balancing tradition and modernization is essential.", ja:"文化的保存は遺産とアイデンティティを維持します。伝統的な慣行は価値と知識を伝えます。グローバル化は絶滅危惧言語と習慣を脅かします。美術館とアーカイブは文化遺産を保存します。先住民族の権利保護は文化的継続性をサポートします。文化的多様性は人間の経験をグローバルに豊かにします。伝統と近代化のバランスを取ることは不可欠です。", qs:[{q:"What does cultural preservation do?", opts:["Nothing", "Maintains heritage and identity", "Harms progress", "Stops change"], ans:1}, {q:"What threatens cultures?", opts:["Change", "Globalization", "Growth", "Learning"], ans:1}, {q:"Does diversity enrich?", opts:["No", "Yes, human experience", "Maybe", "Never"], ans:1}]},
    {text:"Conflict resolution through dialogue prevents violence and promotes peace. Mediation helps parties understand each other's concerns. Post-conflict reconciliation builds sustainable peace. Justice mechanisms address historical injustices. Education about conflict reduces prejudice and promotes tolerance. International peacekeeping supports stability. Addressing root causes prevents conflict recurrence.", ja:"対話を通じた紛争解決は暴力を防ぎ、平和を促進します。調停は当事者が互いの懸念を理解するのを助けます。紛争後の和解は持続可能な平和を構築します。正義メカニズムは歴史的不正を是正します。紛争に関する教育は偏見を減らし、寛容を促進します。国際平和維持活動は安定性をサポートします。根本原因に対処することは紛争の再発を防ぎます。", qs:[{q:"What prevents violence?", opts:["More conflict", "Dialogue and mediation", "Weapons", "Hate"], ans:1}, {q:"What builds sustainable peace?", opts:["More war", "Post-conflict reconciliation", "Vengeance", "Prejudice"], ans:1}, {q:"What prevents conflict recurrence?", opts:["Ignoring it", "Addressing root causes", "Forgetting", "Weapons"], ans:1}]}
  ]

environment:[
    {
      text: "Plastic pollution is one of the biggest environmental challenges of our time. Every year, millions of tons of plastic waste enter our oceans, harming marine life and ecosystems. Fish and birds often mistake plastic pieces for food, which can lead to serious health problems or death. Many countries are now implementing stricter regulations on single-use plastics. People are encouraged to reduce, reuse, and recycle their plastic products. Some companies have started developing biodegradable alternatives to traditional plastics. Education and awareness campaigns are crucial in helping communities understand the importance of reducing plastic consumption.",
      ja: "プラスチック汚染は現在の最大の環境問題の一つです。毎年、何百万トンものプラスチック廃棄物が海に流入し、海洋生物と生態系に害を及ぼします。魚や鳥はプラスチック片を食べ物と間違え、深刻な健康問題や死亡につながる可能性があります。多くの国が一回限りのプラスチック製品に対する厳しい規制を実施しています。人々はプラスチック製品の削減、再利用、リサイクルを奨励されています。一部の企業は従来のプラスチックの生分解性代替品の開発を開始しています。教育と啓発キャンペーンは、コミュニティがプラスチック消費を減らすことの重要性を理解するのに重要です。",

          q: "What type of plastics are some companies developing?",

    {
      text: "Deforestation is rapidly destroying forests around the world. Trees are cut down for timber, agricultural expansion, and urban development. When forests disappear, the animals that live there lose their habitats and may become extinct. Additionally, forests play a vital role in absorbing carbon dioxide from the atmosphere, helping to combat climate change. Many environmental organizations are working to protect remaining forests through conservation projects. Governments are being urged to establish protected forest areas and enforce stricter penalties for illegal logging. Reforestation initiatives, where new trees are planted to replace lost ones, are also becoming more common.",
      ja: "森林破壊は世界中の森を急速に破壊しています。木は木材、農業拡大、都市開発のために伐採されます。森がなくなると、そこに住む動物は生息地を失い、絶滅する可能性があります。さらに、森は大気から二酸化炭素を吸収する重要な役割を果たし、気候変動に対抗するのに役立ちます。多くの環境団体は保全プロジェクトを通じて残存する森を保護するために取り組んでいます。政府は保護森林区域を確立し、違法伐採に対するより厳しい罰則を実施するよう促されています。失われた木を置き換えるために新しい木を植える再植林イニシアチブもより一般的になっています。",
      qs: [
        {
          q: "What are the main reasons for deforestation mentioned?",

          ans: 1

          ans: 1

        {
          q: "What is a reforestation initiative?",
          opts: ["Cutting down trees", "Planting new trees to replace lost ones", "Building national parks", "Creating wildlife sanctuaries"],
          ans: 1

      ]
    },
    {
      text: "Water scarcity is affecting billions of people worldwide, particularly in developing countries. Pollution, drought, and excessive consumption are reducing the availability of clean drinking water. Many communities lack access to safe water sources, leading to serious health issues and poverty. Industries also consume vast amounts of water for production purposes. To address this crisis, governments and organizations are implementing water conservation strategies. These include building water treatment facilities, promoting efficient irrigation methods, and educating communities about water-saving practices. Investing in clean water infrastructure is essential for sustainable development and improving public health.",
      ja: "水不足は世界中の数十億人に影響を与えており、特に発展途上国で深刻です。汚染、干ばつ、過剰消費が清潔な飲料水の入手可能性を減らしています。多くのコミュニティは安全な水源へのアクセスを持たず、深刻な健康問題と貧困につながります。産業も生産目的のために大量の水を消費します。この危機に対処するために、政府と組織は水保護戦略を実施しています。これには水処理施設の構築、効率的な灌漑方法の推進、および水節約実践についてのコミュニティ教育が含まれます。清潔な水インフラへの投資は持続可能な開発と公衆衛生の改善に不可欠です。",
      qs: [

    {
      text: "Renewable energy sources like solar and wind power are becoming increasingly important in reducing our dependence on fossil fuels. Solar panels convert sunlight into electricity, while wind turbines generate power from wind movements. These clean energy sources produce no harmful emissions and help reduce carbon footprints. Many countries are investing heavily in renewable energy infrastructure to combat climate change. However, the initial cost of installing solar panels and wind turbines can be expensive. Government subsidies and incentives are helping make these technologies more affordable for households and businesses. As technology improves and costs decrease, renewable energy is expected to become the dominant energy source.",
      ja: "太陽光と風力などの再生可能エネルギー源は、化石燃料への依存を減らすのに益々重要になっています。ソーラーパネルは太陽光を電気に変え、風力タービンは風の動きから電力を生成します。これらのクリーンエネルギー源は有害な排出物を生産しず、炭素足跡を減らすのに役立ちます。多くの国が気候変動に対抗するために再生可能エネルギーインフラに多額投資しています。しかし、ソーラーパネルと風力タービンの設置の初期費用は高額になる可能性があります。政府の補助金とインセンティブはこれらの技術をより手頃な価格にするのに役立っています。技術が改善され、コストが低下するにつれて、再生可能エネルギーは支配的なエネルギー源になると予想されています。",
      qs: [

    {
      text: "Climate change is causing significant changes to weather patterns and ecosystems worldwide. Rising global temperatures are leading to more frequent and severe weather events, including droughts, floods, and hurricanes. Coral reefs are bleaching due to warmer ocean temperatures, threatening marine biodiversity. Glaciers and polar ice sheets are melting at alarming rates, causing sea levels to rise. These changes affect agriculture, water resources, and human settlements in coastal areas. Scientists emphasize the need for immediate action to reduce greenhouse gas emissions. International agreements like the Paris Climate Accord aim to limit global warming to 1.5 degrees Celsius, but more ambitious efforts are needed.",
      ja: "気候変動は世界中の気象パターンと生態系に大きな変化をもたらしています。上昇する地球温度は、干ばつ、洪水、ハリケーンを含むより頻繁でより深刻な気象イベントにつながっています。サンゴ礁は温かい海水温度のために白化しており、海洋生物多様性を脅かしています。氷河と極地の氷床は警報音を出す速度で溶けており、海面上昇を引き起こしています。これらの変化は農業、水資源、および沿岸地域の人間の集落に影響します。科学者は温室効果ガスの排出を減らすための即座の行動の必要性を強調しています。パリ気候協定のような国際協定は地球温暖化を1.5度セルシウスに制限することを目指していますが、より野心的な取り組みが必要です。",
      qs: [

          ans: 1
        },
        {

          ans: 1
        },
        {

          opts: ["To increase emissions", "To limit global warming to 1.5 degrees Celsius", "To ban all energy", "To eliminate industries"],
          ans: 1

      ]

text: "Coral reefs are underwater ecosystems that support thousands of marine species. These colorful structures are built by tiny animals called coral polyps, which work together to create homes for fish and other sea creatures. However, rising ocean temperatures due to climate change threaten coral reefs worldwide. When water becomes too warm, corals expel the colorful algae that live inside them, causing them to turn white in a process called bleaching. Scientists estimate that half of the world's coral reefs have already been damaged by bleaching events. Conservation efforts, including marine protected areas and temperature monitoring systems, aim to preserve these vital ecosystems for future generations. Without immediate action, many coral reefs may disappear within the next few decades.",

text: "Deforestation is the large-scale removal of forests, often to make space for agriculture or urban development. In tropical regions, forests are home to countless plant and animal species, many of which are found nowhere else on Earth. When trees are cut down rapidly, these species lose their habitats and face extinction. Additionally, forests play a crucial role in absorbing carbon dioxide from the atmosphere, helping to regulate global temperatures. The Amazon rainforest, which covers an area larger than Western Europe, has lost approximately 17% of its forest cover in recent decades. Organizations working to combat deforestation use various strategies, including establishing protected forests, promoting sustainable farming practices, and encouraging governments to enforce stricter environmental laws. Without these efforts, ecosystems will collapse.",

text: "Plastic pollution has become one of the most pressing environmental challenges of our time. Every year, millions of tons of plastic waste end up in our oceans, where it breaks down into smaller particles called microplastics. These tiny fragments are consumed by marine animals, which then enter the food chain and eventually reach human tables. The production of single-use plastics, such as shopping bags and plastic bottles, contributes significantly to this problem. Many countries are now implementing plastic bans and encouraging the use of reusable alternatives. Some innovative solutions include developing biodegradable plastics and creating cleanup technologies that can remove existing pollution from oceans. Nevertheless, preventing new plastic from entering the environment remains the most effective long-term solution.",
