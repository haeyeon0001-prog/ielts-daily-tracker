    {
      text: "The burgeoning field of psychoneuroimmunology elucidates the intricate bidirectional communication between psychological states and immune function, challenging the historical dichotomization of mental and physical health. Longitudinal epidemiological studies have conclusively demonstrated that chronic psychological stress precipitates measurable immunosuppression, manifesting as elevated susceptibility to infectious diseases and malignancy. The mechanistic pathways involve dysregulation of hypothalamic-pituitary-adrenal axis signaling, sustained elevation of glucocorticoid hormones, and consequent impairment of lymphocyte proliferation and immunoglobulin production. Conversely, positive psychological interventions including mindfulness meditation, cognitive-behavioral therapy, and social connectedness have demonstrated remarkable capacity to augment immune-mediated defenses. Neuroimaging investigations utilizing positron emission tomography have revealed that meditation-induced neural plasticity encompasses modifications in prefrontal cortex activation patterns, correlating with enhanced natural killer cell activity. Furthermore, social isolation constitutes an independent predictor of immunocompromise, suggesting that psychological constructs fundamentally influence biological disease susceptibility. These discoveries necessitate paradigmatic reconceptualization of clinical medicine, integrating psychological assessment and intervention as integral components of comprehensive therapeutic protocols. Healthcare systems must therefore establish multidisciplinary frameworks encompassing mental health specialists, immunologists, and primary care practitioners, facilitating holistic approaches that acknowledge the inextricable interdependence of psychological and immunological homeostasis.",
      ja: "精神神経免疫学の急成長分野は、心理状態と免疫機能の間の複雑な双方向コミュニケーションを明らかにし、精神的および身体的健康の歴史的な二分化に挑戦しています。縦断的疫学研究は、慢性心理的ストレスが測定可能な免疫抑制を引き起こし、感染症と悪性腫瘍への感受性の上昇として現れることを決定的に実証しています。機械的経路には、視床下部-下垂体-副腎軸シグナル伝達の調整障害、糖質コルチコイドホルモンの持続的な上昇、およびリンパ球増殖と免疫グロブリン産生の後続の障害が関与しています。逆に、マインドフルネス瞑想、認知行動療法、および社会的つながりを含む肯定的な心理的介入は、免疫仲介防御を増加させるための注目すべき能力を示しています。陽電子放出トモグラフィーを利用した神経画像検査は、瞑想誘発ニューラルプラスティシティが前頭前皮質活性化パターンの修正を包含し、ナチュラルキラー細胞活性の増加と相関していることを明らかにしています。さらに、社会的孤立は免疫障害の独立した予測因子を構成し、心理学的構成が生物学的疾患感受性に根本的に影響することを示唆しています。これらの発見は臨床医学のパラダイム的な再概念化を必要とし、心理的評価と介入を包括的な治療プロトコルの不可欠な要素として統合しています。ヘルスケアシステムは、したがって、精神保健専門家、免疫学者、および初級医療開業医を含む学際的フレームワークを確立する必要があり、心理的および免疫学的恒常性の切り離せない相互依存を認める全体的なアプローチを促進しています。",

    {
      text: "The phenomenon of healthcare disparities represents a persistent and multifactorial challenge afflicting modern medical systems, exemplified by substantial variations in disease incidence, treatment access, and health outcomes across sociodemographic strata. Systematic investigations have elucidated that these inequities transcend individual behavioral factors, reflecting instead structural impediments encompassing healthcare infrastructure limitations, insurance coverage asymmetries, and institutionalized discrimination within medical institutions. Racial and ethnic minorities frequently encounter diagnostic delays, suboptimal therapeutic regimens, and diminished preventive care engagement, culminating in demonstrably inferior health trajectories compared to privileged populations. Furthermore, language barriers and cultural incongruencies between healthcare providers and patients perpetuate communication failures, exacerbating diagnostic uncertainty and reducing therapeutic adherence. Socioeconomic disadvantage compounds these challenges through restricted access to nutrition, environmental pollutants, and chronic psychological stressors, collectively attenuating physiological resilience. Innovative interventions addressing these structural determinants include community health worker programs, culturally adapted interventions, and systematic provider bias training. Nevertheless, ameliorating healthcare disparities necessitates comprehensive policy reforms encompassing equitable resource distribution, anti-discrimination legislation, and institutional accountability mechanisms. The ethical imperative for healthcare equity demands that medical professionals transcend individualistic therapeutic paradigms, embracing sociological understanding of population-level determinants. Ultimately, eliminating healthcare disparities constitutes not merely a clinical objective but a fundamental societal commitment to justice and human dignity.",
      ja: "ヘルスケアの不平等現象は、現代の医療システムを悩ませている永続的で多因子的な課題を表しており、社会人口統計層全体の疾患罹患率、治療へのアクセス、および健康転帰の実質的な変動によって例証されています。系統的な調査は、これらの不公正が個々の行動要因を超えて、ヘルスケアインフラストラクチャの制限、保険適用の非対称性、および医療機関内の制度的差別を包含する構造的障壁を反映していることを明らかにしています。人種的および民族的マイノリティはしばしば診断遅延、不十分な治療レジメン、および低下した予防的ケア関与に直面し、恵まれた人口と比較して実証可能に劣った健康軌跡をもたらします。さらに、言語障壁とヘルスケアプロバイダーと患者間の文化的不一致は、コミュニケーション障害を永続させ、診断の不確実性を悪化させ、治療的順応を減らします。社会経済的不利は、栄養、環境汚染物質、および慢性心理的ストレッサーへのアクセスの制限を通じてこれらの課題を悪化させ、生理学的回復力を集合的に減衰させます。これらの構造的決定因子に対処するための革新的な介入には、地域保健労働者プログラム、文化的に適応した介入、および体系的なプロバイダーバイアストレーニングが含まれます。それにもかかわらず、ヘルスケアの不平等を改善するには、公平なリソース分配、反差別法、および機関的説明責任メカニズムを包含する包括的な政策改革が必要です。ヘルスケアの公平性に対する倫理的命令は、医療専門家が個人主義的な治療パラダイムを超越し、集団レベルの決定因子の社会学的理解を受け入れることを要求しています。最終的に、ヘルスケアの不平等を排除することは、単なる臨床的目標ではなく、正義と人間の尊厳に対する基本的な社会的コミットメントを構成しています。",

    {
      text: "Metabolic syndrome represents a constellation of interconnected physiological abnormalities characterized by central obesity, insulin resistance, dyslipidemia, and hypertension, collectively conferring substantially elevated cardiovascular and metabolic disease risk. The underlying pathophysiology involves dysregulation of adipose tissue endocrine function, perpetuating systemic chronic inflammation and progressive hepatic steatosis. Contemporary epidemiological data demonstrate alarming prevalence increases across developing nations, attributable to dietary patterns emphasizing processed carbohydrates, sedentary occupational structures, and urban environmental designs facilitating physical inactivity. The interplay between genetic predisposition and environmental determinants underscores the necessity for comprehensive intervention strategies transcending pharmacological management alone. Nutritional interventions emphasizing whole grains, polyunsaturated fatty acids, and plant-derived polyphenols have demonstrated capacity to reverse metabolic dysfunction and ameliorate insulin sensitivity. Simultaneously, structured aerobic exercise combined with resistance training substantially attenuates visceral adiposity and restores hepatic insulin responsiveness. Emerging evidence suggests that behavioral interventions leveraging motivational interviewing and habit formation techniques augment long-term adherence compared to didactic health education approaches. Furthermore, circadian rhythm optimization through strategic timing of nutrient consumption and physical activity synchronization with endogenous biological cycles enhances metabolic efficacy. Nevertheless, individualized comprehensive assessment incorporating genetic predisposition, psychological factors, and socioeconomic constraints remains paramount for designing efficacious interventions tailored to heterogeneous populations.",
      ja: "代謝症候群は、中央肥満、インスリン抵抗性、脂質異常症、および高血圧によって特徴付けられる相互に関連する生理学的異常の集合を表し、集合的に実質的に上昇した心血管および代謝疾患のリスクをもたらします。根本的な病態生理は、脂肪組織内分泌機能の調整障害を含み、全身性慢性炎症と進行性肝脂肪症を永続させます。現代の疫学データは、発展途上国全体での有病率増加が警告的であることを示しており、処理済み炭水化物を強調する食事パターン、座りがちな職業構造、および身体不活動を促進する都市環境設計に起因しています。遺伝的素因と環境決定因子の相互作用は、薬理学的管理のみを超える包括的な介入戦略の必要性を強調しています。全粒穀物、多価不飽和脂肪酸、および植物由来のポリフェノールを強調する栄養介入は、代謝機能不全を逆転させ、インスリン感受性を改善する能力を示しています。同時に、構造化された有酸素運動と抵抗トレーニングは、内臓脂肪を実質的に減衰させ、肝インスリン応答性を回復させます。新しい証拠は、動機付けインタビューと習慣形成技術を活用した行動介入が、説教的な健康教育アプローチと比較して長期順応を増加させることを示唆しています。さらに、栄養摂取の戦略的なタイミングと内因性生物学的サイクルとの身体活動同期を通じた概日リズム最適化は、代謝効果を高めます。それにもかかわらず、遺伝的素因、心理的要因、および社会経済的制約を含む個別化された包括的評価は、異質な集団に合わせた有効な介入を設計するために最優先なままです。",

      text: "The rising incidence of neurodegenerative diseases, particularly Alzheimer's dementia and Parkinson's disease, constitutes a formidable public health challenge increasingly prevalent in aging populations. Molecular pathology investigations have identified accumulation of pathological proteins including amyloid-beta and tau as fundamental mechanisms precipitating neuronal dysfunction and subsequent cognitive decline. However, recent evidence demonstrates that neuropathology alone insufficiently explains clinical symptomatology, suggesting contributions from neuroinflammatory processes, mitochondrial dysfunction, and disrupted proteostatic mechanisms. Neuroimaging biomarkers including positron emission tomography and advanced magnetic resonance imaging modalities enable preclinical detection of pathological alterations preceding symptomatic manifestations by decades, facilitating preventive intervention opportunities. Lifestyle modifications encompassing cognitive engagement, aerobic exercise, Mediterranean dietary patterns, and adequate sleep duration demonstrate remarkable capacity to modify disease trajectories independent of amyloid-targeting interventions. Notably, polypharmacological approaches targeting multiple pathological pathways simultaneously demonstrate superior efficacy compared to single-mechanism interventions. Recent monoclonal antibody therapies targeting amyloid-beta have demonstrated modest cognitive benefits in early-stage disease, though limitations regarding amyloid-related imaging abnormalities necessitate judicious patient selection. Furthermore, emerging evidence suggests that psychosocial interventions addressing social isolation and cognitive reserve enhancement substantially ameliorate disease progression. Comprehensive dementia prevention strategies must therefore integrate biological, behavioral, psychological, and social dimensions within coordinated multidisciplinary frameworks.",

      text: "The emerging discipline of environmental health explores the profound interconnections between ecological systems and human physiological wellbeing, elucidating mechanisms whereby environmental stressors precipitate disease pathogenesis. Air pollution exposure, characterized by particulate matter and volatile organic compounds, demonstrates causative associations with cardiovascular dysfunction, respiratory disease exacerbation, and neurodevelopmental impairment in vulnerable populations. Mechanistically, inhaled particulates translocate beyond pulmonary barriers, accessing systemic circulation and perpetuating oxidative stress and inflammatory cascades. Epidemiological investigations across diverse geographic regions reveal robust dose-response relationships between pollution exposure and respiratory disease, myocardial infarction incidence, and premature mortality. Conversely, green space accessibility demonstrates protective associations through multiple pathways including microbiome diversification, psychological restoration, and enhanced physical activity engagement. Urban environmental interventions incorporating expanded vegetation, reduced vehicular emissions, and improved air filtration systems demonstrate measurable health benefits through longitudinal follow-up investigations. Furthermore, climate change-induced environmental perturbations including temperature extremes, altered precipitation patterns, and vector-borne disease expansion necessitate anticipatory public health adaptations. The ecological determinants framework conceptualizes health as emerging from complex interactions among biological, social, economic, and environmental systems, transcending reductionist disease-focused paradigms. Healthcare practitioners must therefore develop competency in environmental health literacy, enabling informed advocacy for policy interventions addressing upstream determinants of population health.",

      text: "Antimicrobial resistance represents an increasingly formidable threat to global public health, characterized by the evolutionary acquisition of virulence mechanisms enabling pathogens to circumvent therapeutic interventions. Extensive antibiotic prescribing practices, encompassing both clinical misuse and agricultural applications, have substantially accelerated selective pressures favouring resistance-conferring mutations. The mechanistic pathways underlying resistance development include enzymatic drug degradation, efflux pump upregulation, and chromosomal alterations modifying antibiotic binding sites. Epidemiological surveillance across international healthcare systems documents alarming dissemination of multidrug-resistant organisms, particularly gram-negative bacteria producing extended-spectrum beta-lactamases. The clinical consequences are profound: therapeutic failures in previously manageable infections, necessitating escalation to last-resort antimicrobial agents with diminished efficacy and enhanced toxicity profiles. Conversely, judicious antimicrobial stewardship encompassing diagnostic optimization, restricted prophylactic prescribing, and duration-limiting protocols demonstrates capacity to attenuate resistance emergence without compromising patient outcomes. Innovative diagnostic technologies including rapid nucleic acid amplification and matrix-assisted laser desorption ionization mass spectrometry enable expeditious pathogen identification, facilitating targeted therapy and reducing unnecessary broad-spectrum antibiotic exposure. Furthermore, development of novel antimicrobial agents and alternative therapeutic modalities including bacteriophage therapy and antimicrobial peptides represent promising investigational approaches. Nevertheless, implementing comprehensive resistance mitigation strategies necessitates coordinated engagement among clinicians, microbiologists, agricultural stakeholders, and international regulatory authorities.",

      text: "The acceleration of urbanization across developing nations precipitates profound societal transformations encompassing demographic consolidation, infrastructural strain, and emergent challenges regarding equitable service provision. Contemporary metropolitan areas increasingly manifest characteristics of megacities, concentrating populations exceeding ten million inhabitants within spatially circumscribed geographic territories. This unprecedented urbanization trajectory generates substantial pressures upon existing infrastructural systems, encompassing water distribution networks, sanitation facilities, transportation modalities, and electrical grids. Consequently, marginalized populations inhabiting informal settlements experience pronounced deficiencies in fundamental services, perpetuating cycles of poverty and limiting socioeconomic mobility. Urban planners must therefore devise innovative strategies facilitating inclusive growth, encompassing vertical architectural development, distributed renewable energy systems, and participatory governance mechanisms enabling community engagement in municipal decision-making. Furthermore, implementing transit-oriented development paradigms reduces vehicular dependency whilst augmenting accessibility to employment opportunities and educational institutions. Digital technologies enabling real-time infrastructure monitoring and resource optimization demonstrate potential to ameliorate systemic inefficiencies. Nevertheless, realizing equitable urbanization necessitates political commitment to redistributive policies, ensuring that economic benefits accrue to disadvantaged populations rather than perpetuating inequality. The transformation of metropolitan spaces into inclusive, sustainable, and resilient communities requires integrated multidisciplinary approaches combining engineering expertise, social science insights, and community participatory processes.",

    {
      text: "The transformation of contemporary employment landscapes through technological automation and artificial intelligence proliferation necessitates recalibration of workforce development strategies and social safety net provisions. Sectoral analysis demonstrates pronounced disparities in automation susceptibility: routine cognitive and manual tasks face highest displacement risks, whilst creative, interpersonal, and complex problem-solving competencies demonstrate enhanced resilience. Consequentially, workers in manufacturing, clerical, and transportation sectors confront disproportionate technological disruption, precipitating geographic concentrations of unemployment and economic stagnation in historically industrial regions. Educational institutions face mounting imperative to restructure curricula emphasizing adaptability, metacognitive skills, and continuous learning capacities rather than discipline-specific technical knowledge. Furthermore, occupational retraining initiatives demonstrate enhanced efficacy when incorporating psychological support, financial assistance, and peer-based mentoring alongside conventional skills instruction. The emergence of gig economy configurations fragmenting traditional employment relationships challenges conventional social insurance mechanisms predicated upon stable employer-employee relationships. Progressive policy interventions encompass portable social benefits transcending individual employers, universal basic income considerations, and redistributive mechanisms ensuring technological productivity gains accrue equitably across populations. Nevertheless, transitional period instability necessitates temporally extended financial support mechanisms protecting vulnerable populations from precipitous income disruption. Ultimately, managing technological transitions equitably demands integrated frameworks combining educational innovation, adaptive social protections, and mechanisms ensuring technological advancement       text: "The phenomenon of linguistic diversity erosion represents a multidimensional sociocultural challenge, with approximately 40% of the world's estimated 7,000 languages approaching extinction within the forthcoming century. Globalization processes, educational standardization emphasizing dominant languages, and economic incentives favoring linguistic consolidation precipitate systematic marginalization of indigenous and minority linguistic communities. Each language extinction forecloses distinctive epistemological frameworks, cultural knowledge systems, and accumulated ecological understanding developed through generations of human experience. Linguistic anthropologists document that endangered languages frequently encode sophisticated ecological taxonomies, traditional ecological knowledge, and cultural values reflecting human adaptations to particular environments. Contemporary technological developments including machine translation and artificial intelligence applications facilitate unprecedented documentation and preservation possibilities, enabling linguists to archive linguistic data with unprecedented comprehensiveness. Nevertheless, documentation alone proves insufficient: language revitalization necessitates intergenerational transmission through community-embedded educational processes, family-centered language maintenance, and institutional recognition through official status conferral. Indigenous communities spearheading revitalization initiatives demonstrate remarkable success through culturally-integrated educational pedagogies emphasizing oral tradition integration and community agency. Furthermore, recognition of linguistic human rights as fundamental societal commitments empowers marginalized communities asserting self-determination regarding language preservation. Ultimately, addressing linguistic diversity erosion demands societal commitment transcending sentimentality, acknowledging that linguistic pluralism represents invaluable sociocultural heritage and epistemic resource deserving systematic institutional protection and resource investment.",

      text: "The phenomenon of urban cultural gentrification exemplifies complex intersections between economic restructuring, demographic transformation, and cultural authenticity erosion within metropolitan spaces. Gentrification processes typically commence with neighborhood disinvestment, wherein working-class communities experience infrastructural neglect and economic marginalization, subsequently attracting real estate speculators and capital-intensive redevelopment ventures. Paradoxically, these neighborhoods frequently possess distinctive cultural vibrancy, historical significance, and artistic communities that constitute valuable sociocultural resources. Capital influx precipitates escalating property valuations, rental increases, and displacement pressures upon established resident populations, fragmenting social networks and cultural communities. Simultaneously, the cultural authenticity of neighborhoods becomes commodified, with artistic expression and ethnic traditions repackaged for consumption by affluent newcomers, thereby decontextualizing and sanitizing cultural practices. Furthermore, gentrification manifests pronounced disparities across racial and ethnic lines, with communities of color experiencing disproportionate displacement compared to majority populations. Scholars identify multiple mechanisms perpetuating racialized gentrification: discriminatory lending practices, zoning regulations facilitating luxury development, and insufficient protective legislation safeguarding tenant rights. Community-based resistance strategies encompassing community land trusts, participatory planning processes, and tenant protection legislation demonstrate potential to mitigate displacement impacts whilst preserving cultural authenticity. Nevertheless, comprehensive solutions necessitate structural interventions addressing underlying economic inequality and capital concentration patterns. Ultimately, equitable urban development demands frameworks balancing neighborhood revitalization with community preservation and equitable distribution of economic benefits.",

      text: "The emergence of digital surveillance infrastructure represents a transformative phenomenon reshaping individual privacy, democratic governance, and social trust mechanisms. Technological proliferation encompassing ubiquitous data collection through smartphones, facial recognition systems, and internet-of-things devices generates unprecedented quantities of behavioral, locational, and communicative data. Surveillance apparatus concentration within governmental and corporate entities engenders asymmetrical power relationships wherein individuals lack meaningful transparency regarding data collection methodologies, utilization purposes, or algorithmic decision-making processes. Governmental surveillance systems, ostensibly designed for security objectives, demonstrate proneness to scope creep whereby counterterrorism infrastructure subsequently facilitates political dissent suppression and marginalized population targeting. Historical precedent documents systematic surveillance weaponization against civil rights movements, labor activism, and indigenous sovereignty initiatives. Concurrently, corporate surveillance systems harvesting behavioral data enable manipulative marketing practices, psychological profiling, and market-based discrimination mechanisms affecting consumer autonomy. Privacy erosion extends beyond individual consequences, precipitating societal effects including chilling effects upon political participation, attenuated democratic deliberation, and systematic trust diminishment. Civil society organizations advocate comprehensive data protection legislation establishing algorithmic transparency requirements, consent mechanisms, and individual rights regarding data access and deletion. Furthermore, decentralized technological architectures and privacy-preserving computational methodologies represent emerging alternatives to centralized surveillance paradigms. Nevertheless, addressing surveillance normalization necessitates cultural transformation emphasizing privacy dignity, political mobilization demanding regulatory accountability, and technological innovation prioritizing individual autonomy.",

    {
      text: "The phenomenon of voluntourism, wherein affluent individuals from developed nations undertake temporary volunteer engagements within developing regions, exemplifies complexities surrounding cross-cultural charitable engagement and developmental efficacy. Voluntourism initiatives frequently generate substantial revenue through participant fees, ostensibly supporting local communities and charitable objectives. However, critical ethnographic investigations document that voluntourism models frequently perpetuate problematic dynamics including extractive relationships, dependency perpetuation, and insufficient community agency regarding developmental priorities. Unskilled volunteer labor often displaces professional employment opportunities, undermining local economic sustainability whilst providing affluent participants with commodified humanitarian experiences. Furthermore, voluntourism projects frequently reflect volunteer preferences rather than community-identified needs, resulting in misaligned resource allocation and minimal sustainable impact. Authentic community-centered development demands prolonged engagement, capacity-building emphasis, and power-sharing arrangements wherein local communities determine developmental trajectories. Ethical developmental frameworks emphasize reciprocal relationships, transparency regarding resource utilization, and systemic institutional strengthening rather than individual charity provision. Alternative engagement models encompassing volunteer specialization in gap-filling services, community-directed research collaborations, and advocacy supporting local organizations demonstrate enhanced developmental efficacy. Furthermore, addressing power asymmetries characterizing North-South relationships necessitates honest examination of how voluntary service replicates colonial hierarchies and extractive economic relationships. Ultimately, meaningful cross-cultural engagement demands moving beyond voluntourist models toward sustained partnerships based upon mutual respect, equity, and commitment to community self-determination.",

, realizing educational equity constitutes fundamental prerequisite for just societies acknowledging that educational opportunity distributions reflect systemic injustice rather than individual capacity differences.",

        const APP_STATE = {
            currentDateIndex: 0,
            completedTasks: {},
            memorizedSentences: {},
            readingHistory: {},
            writingHistory: [],
            lastSync: new Date().toISOString(),
        };

        // ====================================================================
        // UTILITY FUNCTIONS
        // ====================================================================

        function getCurrentDate() {
            return CALENDAR_DATA[APP_STATE.currentDateIndex].date;
        }

        function getCurrentDayData() {
            return CALENDAR_DATA[APP_STATE.currentDateIndex];
        }

        function loadState() {
            const saved = localStorage.getItem('ielts_unified_v1');
            if (saved) {
                try {
                    Object.assign(APP_STATE, JSON.parse(saved));
                } catch (e) {
                    console.error('Failed to load state:', e);
                }
            }
        }

        function saveState() {
            APP_STATE.lastSync = new Date().toISOString();
            localStorage.setItem('ielts_unified_v1', JSON.stringify(APP_STATE));
        }

        // ====================================================================
        // TODAY TAB - Daily Tracker
        // ====================================================================

        function renderTodayTab() {
            const dayData = getCurrentDayData();
            const dateStr = dayData.dateDisplay;
            const dayName = dayData.dayName;

            document.getElementById('todayTitle').textContent = dateStr + ' (' + dayName + ')';

            const container = document.getElementById('tasksContainer');
            container.innerHTML = '';

            if (dayData.isRest) {
                container.innerHTML = '<div class="card rest"><h3>本日は休息日です</h3><p>しっかり休んで、明日に備えましょう！</p></div>';
                return;
            }

            let completedCount = 0;
            let totalCount = 0;

            dayData.tasks.forEach((timeBlock, idx) => {
                const blockHtml = '<div class="time-block"><div class="time-block-time">' + timeBlock.time + '</div><div id="block-' + idx + '"></div></div>';
                container.innerHTML += blockHtml;

                const blockContainer = document.getElementById('block-' + idx);
                const taskLines = timeBlock.detail.split('\n');

                taskLines.forEach((line, lineIdx) => {
                    if (line.trim()) {
                        const taskKey = getCurrentDate() + '-block-' + idx + '-line-' + lineIdx;
                        const isCompleted = APP_STATE.completedTasks[taskKey] || false;
                        const completed = isCompleted ? 'completed' : '';

                        const taskHtml = '<div class="task-item ' + completed + '"><input type="checkbox" class="task-checkbox" data-key="' + taskKey + '" ' + (isCompleted ? 'checked' : '') + '><div class="task-text">' + line + '</div></div>';
                        blockContainer.innerHTML += taskHtml;
                        totalCount++;
                        if (isCompleted) completedCount++;
                    }
                });
            });

            // Update progress
            const percent = totalCount > 0 ? Math.round((completedCount / totalCount) * 100) : 0;
            document.getElementById('progressPercent').textContent = percent + '%';
            document.getElementById('progressFill').style.width = percent + '%';

            // Add event listeners
            document.querySelectorAll('.task-checkbox').forEach(checkbox => {
                checkbox.addEventListener('change', (e) => {
                    const key = e.target.dataset.key;
                    APP_STATE.completedTasks[key] = e.target.checked;
                    saveState();
                    renderTodayTab();
                });
            });
        }

        function setupDayNavigation() {
            document.getElementById('prevDay').addEventListener('click', () => {
                if (APP_STATE.currentDateIndex > 0) {
                    APP_STATE.currentDateIndex--;
                    saveState();
                    renderTodayTab();
                }
            });

            document.getElementById('nextDay').addEventListener('click', () => {
                if (APP_STATE.currentDateIndex < CALENDAR_DATA.length - 1) {
                    APP_STATE.currentDateIndex++;
                    saveState();
                    renderTodayTab();
                }
            });
        }

        // ====================================================================
        // MEMORIZATION TAB
        // ====================================================================

        function renderMemorizationTab() {
            const startDate = new Date(CALENDAR_DATA[0].date + 'T00:00:00');
            const elapsedDays = Math.floor((new Date() - startDate) / (1000 * 60 * 60 * 24));
            const currentWeek = Math.max(1, Math.floor(elapsedDays / 7) + 1);

            const weekContent = document.getElementById('mem-week');
            weekContent.innerHTML = '<div class="card"><div style="font-size: 16px; font-weight: 600; color: var(--primary); margin-bottom: 12px;">現在: Week ' + Math.min(currentWeek, 52) + '</div><div class="progress-container"><div class="progress-label"><span>累積暗記文数</span><span id="totalSentences">0 / 300</span></div><div class="progress-bar"><div class="progress-fill" style="width: 0%"></div></div></div></div><div class="card"><h3 style="color: var(--primary); margin-bottom: 12px;">カテゴリ別進捗</h3><div id="categoryBreakdown"></div></div>';

            // Populate category breakdown with 10 categories
            const categoryTargets = {
                'opinion': 30,
                'agree': 30,
                'compare': 30,
                'cause': 30,
                'example': 30,
                'data': 30,
                'conclusion': 30,
                'condition': 30,
                'concession': 30,
                'suggestion': 30
            };

            const categoryNames = {
                'opinion': '意見表明',
                'agree': '賛成・反対',
                'compare': '比較・対比',
                'cause': '因果関係',
                'example': '描写・説明',
                'data': '数値・変化',
                'conclusion': '議論・展開',
                'condition': '仮説・推論',
                'concession': '日常会話',
                'suggestion': '学術表現'
            };

            let categoryHtml = '';
            Object.entries(categoryTargets).forEach(([key, target]) => {
                const memorized = Object.keys(APP_STATE.memorizedSentences || {}).filter(id => {
                    const sent = sampleSentences.find(s => s.en === id);
                    return sent && sent.cat === key;
                }).length;
                const percent = Math.round((memorized / target) * 100);
                categoryHtml += '<div style="margin-bottom: 12px; padding: 12px; background: var(--light); border-radius: 6px; cursor: pointer;" class="category-item" data-cat="' + key + '">';
                categoryHtml += '<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;"><strong style="color: var(--primary);">' + categoryNames[key] + '</strong><span style="font-size: 12px; color: #666;">' + memorized + ' / ' + target + '</span></div>';
                categoryHtml += '<div class="progress-bar"><div class="progress-fill" style="width: ' + Math.min(percent, 100) + '%; background: linear-gradient(90deg, var(--accent), var(--primary));"></div></div>';
                categoryHtml += '</div>';
            });
            document.getElementById('categoryBreakdown').innerHTML = categoryHtml;

            // Populate sentences list - show category selector first, then sentences on click
            const sentencesContent = document.getElementById('mem-sentences');

            function showSentenceCategory(selectedCat) {
                let html = '<p style="font-size: 13px; color: #999; margin-bottom: 12px;">カテゴリを選んで文章を確認・復習します</p>';
                // Category selector buttons
                html += '<div style="display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px;">';
                Object.entries(categoryNames).forEach(([catKey, catName]) => {
                    const count = sampleSentences.filter(s => s.cat === catKey).length;
                    const memorized = Object.keys(APP_STATE.memorizedSentences || {}).filter(id => {
                        const sent = sampleSentences.find(s => s.en === id);
                        return sent && sent.cat === catKey;
                    }).length;
                    const isActive = selectedCat === catKey;
                    html += '<button class="cat-select-btn" data-cat="' + catKey + '" style="padding: 8px 12px; border-radius: 8px; border: 2px solid ' + (isActive ? 'var(--primary)' : 'var(--border)') + '; background: ' + (isActive ? 'var(--primary)' : 'white') + '; color: ' + (isActive ? 'white' : 'var(--text)') + '; font-size: 12px; font-weight: 600; cursor: pointer;">' + catName + '<br><span style="font-weight: 400; font-size: 11px;">' + memorized + '/' + count + '</span></button>';
                });
                html += '</div>';

                // Show sentences for selected category
                if (selectedCat) {
                    const catSentences = sampleSentences.filter(s => s.cat === selectedCat);
                    const catName = categoryNames[selectedCat];
                    html += '<div class="card"><div class="cat-header" data-cat="' + selectedCat + '" style="font-weight: 600; color: var(--primary); margin-bottom: 12px; padding: 8px; background: var(--light); border-radius: 4px; font-size: 16px;">' + catName + ' (' + catSentences.length + '文)</div>';
                    catSentences.forEach(sent => {
                        const isMem = APP_STATE.memorizedSentences && APP_STATE.memorizedSentences[sent.en];
                        html += '<div class="sentence-card" style="' + (isMem ? 'opacity: 0.6;' : '') + '"><div style="display: flex; gap: 8px;"><input type="checkbox" class="mem-checkbox" data-sentence="' + sent.en + '" ' + (isMem ? 'checked' : '') + ' style="margin-top: 4px; cursor: pointer; accent-color: var(--success);"> <div style="flex: 1;"><div class="sentence-en">' + sent.en + '</div><div class="sentence-ja">' + sent.ja + '</div></div></div></div>';
                    });
                    html += '</div>';
                }

                sentencesContent.innerHTML = html;
            }

            // Initial render without selection
            showSentenceCategory(null);

            // Category button click in 文章確認 tab (event delegation)
            document.addEventListener('click', function(e) {
                const btn = e.target.closest('.cat-select-btn');
                if (btn) {
                    showSentenceCategory(btn.dataset.cat);
                    return;
                }
            });

            // Checkbox change for memorization (event delegation)
            document.addEventListener('change', function(e) {
                if (e.target.classList.contains('mem-checkbox')) {
                    const sentence = e.target.dataset.sentence;
                    if (e.target.checked) {
                        APP_STATE.memorizedSentences[sentence] = true;
                    } else {
                        delete APP_STATE.memorizedSentences[sentence];
                    }
                    saveState();
                }
            });

            // Category click from 週間目標 → switch to 文章確認 and show that category
            document.addEventListener('click', function(e) {
                const item = e.target.closest('.category-item');
                if (!item) return;
                const cat = item.dataset.cat;
                const parent = item.closest('.tab-content');
                if (!parent) return;
                parent.querySelectorAll('.sub-tab').forEach(st => st.classList.remove('active'));
                parent.querySelectorAll('.sub-content').forEach(sc => sc.classList.remove('active'));
                parent.querySelector('[data-sub="mem-sentences"]').classList.add('active');
                document.getElementById('mem-sentences').classList.add('active');
                showSentenceCategory(cat);
                setTimeout(() => {
                    document.getElementById('mem-sentences').scrollTo(0, 0);
                }, 100);
            });

            // Stats tab
            const statsContent = document.getElementById('mem-stats');
            const totalMemorized = Object.keys(APP_STATE.memorizedSentences || {}).length;
            statsContent.innerHTML = '<div class="card"><div class="stat-box"><div class="stat-value">' + totalMemorized + '</div><div class="stat-label">暗記済み文数</div></div></div>';
        }

        // ====================================================================
        // WEAKNESS TAB
        // ====================================================================

        function renderWeaknessTab() {
            const paraphraseContent = document.getElementById('weak-paraphrase');
            paraphraseContent.innerHTML = '<div id="paraphraseContainer"></div><button class="btn btn-primary" id="nextSentence">次の文へ</button>';

            let currentSentenceIdx = 0;

            function showParaphraseSentence() {
                if (currentSentenceIdx >= sampleSentences.length) {
                    currentSentenceIdx = 0;
                }

                const sent = sampleSentences[currentSentenceIdx];
                const container = document.getElementById('paraphraseContainer');

                let hintsHtml = '';
                if (sent.hints) {
                    Object.entries(sent.hints).forEach(([hintType, items]) => {
                        if (Array.isArray(items)) {
                            hintsHtml += '<div style="margin: 8px 0; font-size: 13px;"><strong style="color: var(--accent);">' + hintType + ':</strong> ';
                            hintsHtml += items.join(', ');
                            hintsHtml += '</div>';
                        }
                    });
                }

                container.innerHTML = '<div class="card"><div style="color: #999; font-size: 12px; margin-bottom: 8px;">' + sent.cat + ' (' + (currentSentenceIdx + 1) + ' / ' + sampleSentences.length + ')</div><div class="sentence-en">"' + sent.en + '"</div><div class="sentence-ja">' + sent.ja + '</div><div style="margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border);"><div style="font-size: 12px; color: var(--primary); font-weight: 600; margin-bottom: 8px;">書き換えのヒント</div>' + hintsHtml + '</div><div style="margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border);"><div style="font-size: 12px; color: var(--success); font-weight: 600; margin-bottom: 8px;">あなたの書き換え</div><textarea id="paraphraseInput" placeholder="ヒントを参考に、元の文を書き換えてみましょう..." style="width: 100%; min-height: 80px; padding: 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; line-height: 1.6; resize: vertical; box-sizing: border-box;"></textarea><button class="btn btn-success" id="checkParaphrase" style="width: 100%; margin-top: 8px;">添削する</button><div id="paraphraseResult" style="margin-top: 12px;"></div></div></div>';

                // Add correction check listener
                document.getElementById('checkParaphrase').addEventListener('click', () => {
                    const userText = document.getElementById('paraphraseInput').value.trim();
                    const resultDiv = document.getElementById('paraphraseResult');
                    if (!userText) {
                        resultDiv.innerHTML = '<div style="padding: 10px; background: #fff3cd; border-radius: 6px; font-size: 13px; color: #856404;">書き換えた文を入力してください。</div>';
                        return;
                    }
                    const original = sent.en.toLowerCase().replace(/[^a-z\s]/g, '');
                    const user = userText.toLowerCase().replace(/[^a-z\s]/g, '');

                    // Check basic quality metrics
                    const origWords = original.split(/\s+/);
                    const userWords = user.split(/\s+/);
                    const sharedWords = userWords.filter(w => origWords.includes(w) && w.length > 3);
                    const changeRatio = 1 - (sharedWords.length / Math.max(userWords.length, 1));

                    // Check grammar basics
                    const issues = [];
                    if (userWords.length < 4) issues.push('文が短すぎます。もう少し詳しく書いてみましょう。');
                    if (!/^[A-Z]/.test(userText)) issues.push('文頭は大文字で始めましょう。');
                    if (!/[.!?]$/.test(userText)) issues.push('文末にピリオド（.）を付けましょう。');
                    if (changeRatio < 0.3) issues.push('元の文と似すぎています。もっと語彙や構造を変えてみましょう。');

                    // Build feedback
                    let feedbackHtml = '';
                    if (issues.length === 0) {
                        feedbackHtml = '<div style="padding: 12px; background: #d4edda; border-radius: 6px; margin-bottom: 8px;"><div style="font-weight: 600; color: #155724; margin-bottom: 4px;">Good job!</div><div style="font-size: 13px; color: #155724;">文法的な基本ルールはクリアしています。書き換え率: ' + Math.round(changeRatio * 100) + '%</div></div>';
                    } else {
                        feedbackHtml = '<div style="padding: 12px; background: #f8d7da; border-radius: 6px; margin-bottom: 8px;"><div style="font-weight: 600; color: #721c24; margin-bottom: 6px;">改善ポイント</div>';
                        issues.forEach(issue => {
                            feedbackHtml += '<div style="font-size: 13px; color: #721c24; margin: 4px 0;">・' + issue + '</div>';
                        });
                        feedbackHtml += '</div>';
                    }

                    // Show comparison
                    feedbackHtml += '<div style="padding: 12px; background: var(--light); border-radius: 6px; margin-top: 8px;"><div style="font-size: 12px; color: #666; margin-bottom: 4px;">元の文:</div><div style="font-size: 13px; margin-bottom: 8px;">' + sent.en + '</div><div style="font-size: 12px; color: #666; margin-bottom: 4px;">あなたの書き換え:</div><div style="font-size: 13px; font-weight: 600;">' + userText + '</div><div style="font-size: 12px; color: var(--primary); margin-top: 8px;">共通語数: ' + sharedWords.length + ' / ' + userWords.length + ' 語 (変化率: ' + Math.round(changeRatio * 100) + '%)</div></div>';

                    resultDiv.innerHTML = feedbackHtml;
                });
            }

            showParaphraseSentence();

            document.getElementById('nextSentence').addEventListener('click', () => {
                currentSentenceIdx++;
                showParaphraseSentence();
            });

            // Speed Reading
            const readingContent = document.getElementById('weak-reading');
            readingContent.innerHTML = '<div class="card"><label style="display: block; margin-bottom: 12px; font-weight: 600;">レベル選択</label><select id="readingLevel"><option value="level1">Lv.1 入門 (IELTS 4.0-4.5)</option><option value="level2">Lv.2 初級 (IELTS 4.5-5.0)</option><option value="level3">Lv.3 中級 (IELTS 5.0-5.5)</option><option value="level4">Lv.4 中上級 (IELTS 5.5-6.0)</option><option value="level5">Lv.5 上級 (IELTS 6.0-6.5)</option><option value="level6">Lv.6 専門 (IELTS 6.5-7.0)</option></select><div id="readingTopics" style="margin-bottom: 12px;"></div><div id="readingTimer" style="text-align: center; margin-bottom: 16px; display: none; background: #1F4E79; color: white; padding: 16px; border-radius: 10px;"><div style="font-size: 11px; margin-bottom: 4px; opacity: 0.8;">経過時間</div><span id="timerValue" style="font-size: 36px; font-weight: 700; font-family: monospace; letter-spacing: 2px;">00:00</span></div><div id="passageNav" style="display: none; align-items: center; gap: 8px; margin-bottom: 12px;"></div><div id="readingControls" style="display: none; gap: 8px; margin-bottom: 14px;"><button class="btn btn-success" id="startTimer" style="flex: 1; padding: 12px; font-size: 16px; font-weight: 600;">⏱ タイマースタート</button><button class="btn btn-danger" id="finishReading" style="flex: 1; padding: 12px; font-size: 16px; font-weight: 600; display: none;">⏹ 読了</button></div><div id="readingContent"></div><div id="readingQuestions" style="margin-top: 16px;"></div><div id="submitReadingWrap" style="display: none; position: sticky; bottom: 0; padding: 10px 0; background: white; z-index: 10;"><button class="btn btn-primary" id="submitReading" style="width: 100%; padding: 14px; font-size: 16px; font-weight: 600;">📝 採点する</button></div><div id="readingWPM" style="text-align: center; margin-top: 12px; display: none;"></div></div>';

            let readingStartTime = null;
            let readingInterval = null;
            let currentPassageIdx = 0;
            let currentPassages = null;

            const topicNamesJa = {environment:'環境',education:'教育',technology:'テクノロジー',health:'健康',society:'社会'};

            function populateTopics(level) {
                const topics = Object.keys(speedTexts[level] || {});
                const topicsSelect = document.getElementById('readingTopics');
                if (topics.length > 0) {
                    topicsSelect.innerHTML = '<select id="readingTopic"><option value="">トピック選択</option>' + topics.map(t => '<option value="' + t + '">' + (topicNamesJa[t] || t) + ' (' + (Array.isArray(speedTexts[level][t]) ? speedTexts[level][t].length : 1) + '篇)</option>').join('') + '</select>';

                    document.getElementById('readingTopic').value = firstTopic;
                    document.getElementById('readingTopic').dispatchEvent(new Event('change', {bubbles: true}));

            function loadPassage(data) {
                if (!data) return;
                document.getElementById('readingContent').innerHTML = '<div style="white-space: pre-wrap; line-height: 1.6; padding: 12px; background: var(--light); border-radius: 6px; font-size: 14px; margin-bottom: 12px;">' + data.text + '</div>' + (data.ja ? '<details style="margin-bottom: 12px;"><summary style="cursor: pointer; color: var(--accent); font-weight: 600; font-size: 13px; padding: 8px 0;">日本語訳を表示</summary><div style="white-space: pre-wrap; line-height: 1.6; padding: 12px; background: #FFF8E1; border-radius: 6px; font-size: 13px; color: #555;">' + data.ja + '</div></details>' : '');

                let qsHtml = '';

                        qsHtml += '<div style="margin-bottom: 12px; padding: 12px; background: var(--light); border-radius: 6px;"><div style="font-weight: 600; margin-bottom: 8px; font-size: 14px;">Q' + (i+1) + ': ' + q.q + '</div><div>' + q.opts.map((opt, j) => '<label style="display: block; margin: 6px 0;"><input type="radio" name="comp' + i + '" value="' + j + '" style="margin-right: 6px;"> ' + opt + '</label>').join('') + '</div></div>';

                document.getElementById('readingQuestions').innerHTML = qsHtml;
                document.getElementById('submitReadingWrap').style.display = (data.qs && data.qs.length > 0) ? 'block' : 'none';

                // Show reading controls - reset timer state
                document.getElementById('readingControls').style.display = 'flex';
                document.getElementById('startTimer').style.display = 'block';
                document.getElementById('finishReading').style.display = 'none';
                document.getElementById('readingTimer').style.display = 'none';
                document.getElementById('readingWPM').style.display = 'none';
                if (readingInterval) clearInterval(readingInterval);
                readingStartTime = null;

                // Update passage navigation
                updatePassageNav();
            }

            function updatePassageNav() {
                const navEl = document.getElementById('passageNav');
                if (!navEl) return;
                if (!currentPassages || currentPassages.length <= 1) {
                    navEl.style.display = 'none';
                    return;
                }
                navEl.style.display = 'flex';
                navEl.innerHTML = '<button id="prevPassage" class="btn btn-secondary" style="padding: 8px 16px; font-size: 14px;"' + (currentPassageIdx <= 0 ? ' disabled' : '') + '>← 前</button><span style="flex: 1; text-align: center; font-weight: 600; color: var(--primary); line-height: 36px;">' + (currentPassageIdx + 1) + ' / ' + currentPassages.length + '</span><button id="nextPassage" class="btn btn-secondary" style="padding: 8px 16px; font-size: 14px;"' + (currentPassageIdx >= currentPassages.length - 1 ? ' disabled' : '') + '>次 →</button>';
            }

            document.getElementById('readingLevel').addEventListener('change', (e) => {
                const level = e.target.value;
                populateTopics(level);
            });

            document.addEventListener('change', function(e) {
                if (e.target.id === 'readingTopic') {
                    const level = document.getElementById('readingLevel').value;
                    const topic = e.target.value;
                    const rawData = speedTexts[level] && speedTexts[level][topic];
                    if (!rawData) return;

                    // Handle both array and single object formats
                    if (Array.isArray(rawData)) {
                        currentPassages = rawData;
                        currentPassageIdx = 0;
                        loadPassage(rawData[0]);
                    } else {
                        currentPassages = [rawData];
                        currentPassageIdx = 0;
                        loadPassage(rawData);
                    }
                }
            });

            document.addEventListener('click', function(e) {
                if (e.target.id === 'startTimer') {
                    readingStartTime = Date.now();
                    document.getElementById('readingTimer').style.display = 'block';
                    document.getElementById('startTimer').style.display = 'none';
                    document.getElementById('finishReading').style.display = 'block';
                    readingInterval = setInterval(() => {
                        const elapsed = Math.floor((Date.now() - readingStartTime) / 1000);
                        const minutes = Math.floor(elapsed / 60);
                        const seconds = elapsed % 60;
                        document.getElementById('timerValue').textContent = (minutes < 10 ? '0' : '') + minutes + ':' + (seconds < 10 ? '0' : '') + seconds;
                    }, 100);
                }
                if (e.target.id === 'finishReading') {
                    if (readingInterval) clearInterval(readingInterval);
                    const elapsed = (Date.now() - readingStartTime) / 60000;
                    const wordCount = document.getElementById('readingContent').textContent.match(/\b\w+\b/g).length;
                    const wpm = Math.round(wordCount / elapsed);
                    const wpmColor = wpm >= 250 ? '#28A745' : wpm >= 200 ? '#2E75B6' : wpm >= 150 ? '#FFC107' : '#DC3545';
                    const wpmLabel = wpm >= 250 ? '🎯 Band 7+ レベル！' : wpm >= 200 ? '👍 あと少しでBand 7!' : wpm >= 150 ? '📈 平均的 - もう少し速く!' : '🔰 ゆっくり - 練習を続けよう';
                    let wpmHtml = '<div style="padding: 16px; background: white; border-radius: 10px; border: 2px solid ' + wpmColor + ';">';
                    wpmHtml += '<div style="font-size: 14px; color: #666; text-align: center;">あなたの読速</div>';
                    wpmHtml += '<div style="font-size: 40px; font-weight: 700; color: ' + wpmColor + '; text-align: center;">' + wpm + ' <span style="font-size: 16px;">WPM</span></div>';
                    wpmHtml += '<div style="font-size: 13px; text-align: center; margin-bottom: 12px;">' + wpmLabel + '</div>';
                    // WPM gauge bar
                    wpmHtml += '<div style="position: relative; height: 24px; background: linear-gradient(to right, #DC3545 0%, #FFC107 37%, #2E75B6 50%, #28A745 62%, #28A745 100%); border-radius: 12px; margin-bottom: 6px;">';
                    const markerPos = Math.min(Math.max((wpm / 400) * 100, 2), 98);
                    wpmHtml += '<div style="position: absolute; left: ' + markerPos + '%; top: -4px; transform: translateX(-50%); width: 4px; height: 32px; background: #333; border-radius: 2px;"></div>';
                    wpmHtml += '</div>';
                    wpmHtml += '<div style="display: flex; justify-content: space-between; font-size: 10px; color: #999;">';
                    wpmHtml += '<span>0</span><span style="color: #DC3545;">150</span><span style="color: #FFC107;">200</span><span style="color: #28A745; font-weight: 600;">250 (Band7)</span><span>400</span>';
                    wpmHtml += '</div>';
                    wpmHtml += '<div style="margin-top: 10px; font-size: 11px; color: #888; text-align: center;">🎯 Band 7目標: 200〜300 WPM ｜ 語数: ' + wordCount + '語</div>';
                    wpmHtml += '</div>';
                    document.getElementById('readingWPM').innerHTML = wpmHtml;
                    document.getElementById('readingWPM').style.display = 'block';
                }
                if (e.target.id === 'prevPassage' || e.target.id === 'nextPassage') {
                    if (e.target.id === 'prevPassage' && currentPassageIdx > 0) {
                        currentPassageIdx--;
                        loadPassage(currentPassages[currentPassageIdx]);
                    } else if (e.target.id === 'nextPassage' && currentPassages && currentPassageIdx < currentPassages.length - 1) {
                        currentPassageIdx++;
                        loadPassage(currentPassages[currentPassageIdx]);
                    }
                }
                if (e.target.id === 'submitReading') {
                    const data = currentPassages && currentPassages[currentPassageIdx];
                    if (!data || !data.qs) return;
                    let correct = 0;
                    let total = data.qs.length;
                    let resultHtml = '';
                    data.qs.forEach((q, i) => {
                        const selected = document.querySelector('input[name="comp' + i + '"]:checked');
                        const userAns = selected ? parseInt(selected.value) : -1;
                        const isCorrect = userAns === q.ans;
                        if (isCorrect) correct++;
                        resultHtml += '<div style="padding: 10px; margin-bottom: 8px; border-radius: 6px; background:' + (isCorrect ? '#d4edda' : '#f8d7da') + '; border: 1px solid ' + (isCorrect ? '#c3e6cb' : '#f5c6cb') + ';">';
                        resultHtml += '<div style="font-weight: 600; font-size: 13px;">Q' + (i+1) + ': ' + (isCorrect ? '✅ 正解' : '❌ 不正解') + '</div>';
                        if (!isCorrect) {
                            resultHtml += '<div style="font-size: 12px; color: #555; margin-top: 4px;">正解: ' + q.opts[q.ans] + '</div>';
                        }
                        resultHtml += '</div>';
                    });
                    const score = Math.round((correct / total) * 100);
                    const scoreColor = score >= 80 ? '#28A745' : score >= 50 ? '#FFC107' : '#DC3545';
                    document.getElementById('readingQuestions').innerHTML = '<div style="text-align: center; margin-bottom: 16px; padding: 16px; background: white; border: 2px solid ' + scoreColor + '; border-radius: 10px;"><div style="font-size: 14px; color: #666;">スコア</div><div style="font-size: 36px; font-weight: 700; color: ' + scoreColor + ';">' + correct + ' / ' + total + '</div><div style="font-size: 13px; color: #999;">' + score + '%</div></div>' + resultHtml;
                    document.getElementById('submitReadingWrap').style.display = 'none';
                }
            });

            // Auto-trigger first level
            populateTopics('level1');

            // Writing
            const writingContent = document.getElementById('weak-writing');
            writingContent.innerHTML = '<div class="card"><label style="display: block; margin-bottom: 12px; font-weight: 600;">カテゴリ選択</label><select id="writingCategory"><option value="">カテゴリ選択</option>' + Object.keys(writeTopics).map(cat => '<option value="' + cat + '">' + cat + '</option>').join('') + '</select><div id="writingTopicSelect" style="margin-bottom: 12px; display: none;"><select id="writingTopic"><option value="">トピック選択</option></select></div><div id="writingPrompt" style="background: var(--light); padding: 12px; border-radius: 6px; margin-bottom: 12px; display: none;"></div><div style="margin-bottom: 12px; display: none;" id="writingHelper"><button class="btn btn-secondary" id="randomTopic" style="width: 100%;">ランダムトピック選択</button></div><textarea id="writingText" placeholder="ここにエッセイを入力してください..." style="display: none;"></textarea><div id="wordCount" style="text-align: right; font-size: 12px; color: #999; margin-bottom: 8px; display: none;"></div><button class="btn btn-primary" id="analyzeWriting" style="display: none;">添削</button><div id="writingFeedback"></div></div>';

            document.getElementById('writingCategory').addEventListener('change', (e) => {
                const cat = e.target.value;
                if (cat && writeTopics[cat]) {
                    const topics = writeTopics[cat];
                    const select = document.getElementById('writingTopic');
                    select.innerHTML = '<option value="">トピック選択</option>' + topics.map((t, i) => '<option value="' + i + '">' + t.substring(0, 60) + '...</option>').join('');
                    document.getElementById('writingTopicSelect').style.display = 'block';
                    document.getElementById('writingHelper').style.display = 'block';

                    document.getElementById('randomTopic').onclick = () => {
                        const randomIdx = Math.floor(Math.random() * topics.length);
                        select.value = randomIdx;
                        select.dispatchEvent(new Event('change', {bubbles: true}));
                    };

                    select.addEventListener('change', (e2) => {
                        const idx = e2.target.value;
                        if (idx !== '') {
                            document.getElementById('writingPrompt').innerHTML = '<strong style="color: var(--primary);">トピック:</strong><br>' + topics[idx];
                            document.getElementById('writingPrompt').style.display = 'block';
                            document.getElementById('writingText').style.display = 'block';
                            document.getElementById('analyzeWriting').style.display = 'block';
                            document.getElementById('wordCount').style.display = 'block';
                            document.getElementById('wordCount').textContent = '単語数: 0';
                        }
                    });
                }
            });

            // Word count tracking for writing
            document.addEventListener('input', function(e) {
                if (e.target.id === 'writingText') {
                    const words = e.target.value.match(/\b\w+\b/g) || [];
                    document.getElementById('wordCount').textContent = '単語数: ' + words.length;
                }
            });

            // English Correction
            const correctionContent = document.getElementById('weak-correction');
            correctionContent.innerHTML = '<div class="card"><p style="font-size: 13px; color: #999; margin-bottom: 12px;">英文を入力して、文法やボキャブラリーの改善提案を受け取ります</p><textarea id="correctionText" placeholder="英文を入力してください..."></textarea><button class="btn btn-primary" id="analyzeCorrection">添削</button><div id="correctionResult"></div></div>';

            document.getElementById('analyzeCorrection').addEventListener('click', () => {
                const text = document.getElementById('correctionText').value;
                if (!text.trim()) return;

                const feedback = analyzeEnglish(text);
                document.getElementById('correctionResult').innerHTML = feedback;
            });
        }

        function analyzeEnglish(text) {
            let feedback = '<div class="card" style="background: #E8F5E9; border-color: #81C784; margin-top: 12px;">';
            const words = text.toLowerCase().match(/\b\w+\b/g) || [];
            const sentences = text.match(/[^.!?]+[.!?]/g) || [];

            feedback += '<div class="stat-box" style="background: linear-gradient(135deg, #4CAF50, #45a049);"><div class="stat-value">' + words.length + '</div><div class="stat-label">単語数</div></div>';

            feedback += '<div style="font-size: 13px; color: #333; margin: 12px 0;"><strong>文の数:</strong> ' + sentences.length + '<br><strong>平均単語数/文:</strong> ' + (words.length / Math.max(sentences.length, 1)).toFixed(1) + '</div>';

            feedback += '<div style="margin-top: 12px; padding-top: 12px; border-top: 1px solid rgba(0,0,0,0.1); font-size: 13px;"><strong style="color: var(--primary);">改善のヒント:</strong><br>• 複合文や複雑な構造を使用してください<br>• アカデミックな語彙を取り入れましょう<br>• つなぎ言葉(connectors)を活用しましょう</div>';

            feedback += '</div>';
            return feedback;
        }

        // ====================================================================
        // STATS TAB
        // ====================================================================

        function renderStatsTab() {
            const container = document.getElementById('statsContent');

            // 全体の完了タスク数を計算
            const completedTasksCount = Object.values(APP_STATE.completedTasks).filter(v => v).length;
            const totalTasks = CALENDAR_DATA.reduce((sum, day) => {
                if (!day.isRest) {
                    return sum + day.tasks.reduce((s, tb) => s + tb.detail.split('\n').filter(l => l.trim()).length, 0);
                }
                return sum;
            }, 0);
            const completionRate = totalTasks > 0 ? Math.round((completedTasksCount / totalTasks) * 100) : 0;

            // 暗記済み文数
            const memorizedCount = Object.values(APP_STATE.memorizedSentences || {}).filter(v => v).length;

            // 日別進捗を計算
            let dailyStats = [];
            let currentWeek = '';
            let weeklyData = {};

            CALENDAR_DATA.forEach((day, dayIdx) => {
                if (day.isRest) return;
                let dayTotal = 0;
                let dayCompleted = 0;
                day.tasks.forEach((tb, blockIdx) => {
                    tb.detail.split('\n').forEach((line, lineIdx) => {
                        if (line.trim()) {
                            dayTotal++;
                            const key = day.date + '-block-' + blockIdx + '-line-' + lineIdx;
                            if (APP_STATE.completedTasks[key]) dayCompleted++;
                        }
                    });
                });
                const pct = dayTotal > 0 ? Math.round((dayCompleted / dayTotal) * 100) : 0;
                dailyStats.push({ date: day.dateDisplay, dayName: day.dayName, week: day.week, total: dayTotal, done: dayCompleted, pct: pct });

                // 週別集計
                const weekKey = day.week;
                if (!weeklyData[weekKey]) weeklyData[weekKey] = { total: 0, done: 0 };
                weeklyData[weekKey].total += dayTotal;
                weeklyData[weekKey].done += dayCompleted;
            });

            let html = '';

            // 全体進捗カード
            html += '<div class="stat-box"><div class="stat-value">' + completionRate + '%</div><div class="stat-label">全体進捗</div></div>';
            html += '<div style="display: flex; gap: 8px; margin-bottom: 12px;">';
            html += '<div class="stat-box" style="flex: 1; background: linear-gradient(135deg, #FF9800, #F57C00);"><div class="stat-value" style="font-size: 24px;">' + completedTasksCount + '</div><div class="stat-label">完了タスク</div></div>';
            html += '<div class="stat-box" style="flex: 1; background: linear-gradient(135deg, #9C27B0, #7B1FA2);"><div class="stat-value" style="font-size: 24px;">' + memorizedCount + '</div><div class="stat-label">暗記済み文</div></div>';
            html += '</div>';

            // 週別進捗
            html += '<div class="card"><div style="font-weight: 600; color: var(--primary); margin-bottom: 12px;">週別進捗</div>';
            Object.entries(weeklyData).forEach(([weekName, data]) => {
                const weekPct = data.total > 0 ? Math.round((data.done / data.total) * 100) : 0;
                const barColor = weekPct >= 80 ? '#28A745' : weekPct >= 50 ? '#FFC107' : weekPct > 0 ? '#2E75B6' : '#E0E0E0';
                html += '<div style="margin-bottom: 10px;">';
                html += '<div style="display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 3px;"><span style="font-weight: 600;">' + weekName.replace(/ \(.*\)/, '') + '</span><span style="color: #666;">' + data.done + '/' + data.total + ' (' + weekPct + '%)</span></div>';
                html += '<div style="height: 8px; background: #f0f0f0; border-radius: 4px; overflow: hidden;"><div style="height: 100%; width: ' + weekPct + '%; background: ' + barColor + '; border-radius: 4px; transition: width 0.3s;"></div></div>';
                html += '</div>';
            });
            html += '</div>';

            // 日別カレンダービュー（直近14日）
            const todayStr = new Date().getFullYear() + '-' + String(new Date().getMonth()+1).padStart(2,'0') + '-' + String(new Date().getDate()).padStart(2,'0');
            const todayCalIdx = CALENDAR_DATA.findIndex(d => d.date === todayStr);
            const startShow = Math.max(0, todayCalIdx - 6);
            const endShow = Math.min(CALENDAR_DATA.length, todayCalIdx + 8);

            html += '<div class="card"><div style="font-weight: 600; color: var(--primary); margin-bottom: 12px;">日別進捗カレンダー</div>';
            html += '<div style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; text-align: center;">';

            for (let i = startShow; i < endShow; i++) {
                const day = CALENDAR_DATA[i];
                let cellColor = '#f5f5f5';
                let textColor = '#999';
                let label = day.dateDisplay.split('/')[1];

                if (day.isRest) {
                    cellColor = '#f0f0f0';
                    textColor = '#ccc';
                } else {
                    // Calculate this day's completion
                    let dt = 0, dc = 0;
                    day.tasks.forEach((tb, bi) => {
                        tb.detail.split('\n').forEach((line, li) => {
                            if (line.trim()) {
                                dt++;
                                if (APP_STATE.completedTasks[day.date + '-block-' + bi + '-line-' + li]) dc++;
                            }
                        });
                    });
                    const dp = dt > 0 ? dc / dt : 0;
                    if (dp >= 1) { cellColor = '#28A745'; textColor = 'white'; }
                    else if (dp >= 0.5) { cellColor = '#FFC107'; textColor = 'white'; }
                    else if (dp > 0) { cellColor = '#FFE0B2'; textColor = '#333'; }
                }

                const isToday = day.date === todayStr;
                const border = isToday ? 'border: 2px solid var(--primary);' : '';

                html += '<div style="padding: 6px 2px; border-radius: 6px; background: ' + cellColor + '; color: ' + textColor + '; font-size: 11px; font-weight: 600; ' + border + '">';
                html += '<div>' + day.dayName + '</div><div>' + label + '</div>';
                html += '</div>';
            }
            html += '</div>';
            html += '<div style="margin-top: 8px; display: flex; gap: 8px; justify-content: center; font-size: 10px; color: #999;">';
            html += '<span>⬜ 未着手</span><span style="color: #FFE0B2;">🟨 一部完了</span><span style="color: #FFC107;">🟡 50%+</span><span style="color: #28A745;">🟢 100%</span>';
            html += '</div></div>';

            // カレンダー情報
            html += '<div class="card"><div style="font-weight: 600; color: var(--primary); margin-bottom: 12px;">カレンダー情報</div>';
            html += '<div style="font-size: 13px; color: #666;">';
            html += '<div style="display: flex; justify-content: space-between; margin: 6px 0;"><span>期間:</span><strong>' + CALENDAR_DATA[0].date + ' ~ ' + CALENDAR_DATA[CALENDAR_DATA.length-1].date + '</strong></div>';
            html += '<div style="display: flex; justify-content: space-between; margin: 6px 0;"><span>総日数:</span><strong>' + CALENDAR_DATA.length + '日</strong></div>';
            html += '<div style="display: flex; justify-content: space-between; margin: 6px 0;"><span>稼働日:</span><strong>' + CALENDAR_DATA.filter(d => !d.isRest).length + '日</strong></div>';
            html += '<div style="display: flex; justify-content: space-between; margin: 6px 0;"><span>休息日:</span><strong>' + CALENDAR_DATA.filter(d => d.isRest).length + '日</strong></div>';
            html += '</div></div>';

            container.innerHTML = html;
        }

        // ====================================================================
        // SETTINGS TAB
        // ====================================================================

        function renderSettingsTab() {
            const container = document.getElementById('settingsContent');
            container.innerHTML = '<div class="card"><div style="font-weight: 600; color: var(--primary); margin-bottom: 12px;">データ管理</div><button class="btn btn-secondary" id="exportData">データをエクスポート</button><button class="btn btn-secondary" id="importData">データをインポート</button><button class="btn btn-danger" id="resetData">すべてリセット</button></div><div class="card"><div style="font-weight: 600; color: var(--primary); margin-bottom: 12px;">アプリ情報</div><div style="font-size: 13px; color: #666;"><div style="margin: 6px 0;"><strong>アプリ:</strong> IELTS 統合学習PWA</div><div style="margin: 6px 0;"><strong>バージョン:</strong> 1.0.0</div><div style="margin: 6px 0;"><strong>最終同期:</strong> ' + new Date(APP_STATE.lastSync).toLocaleString('ja-JP') + '</div><div style="margin: 6px 0;"><strong>ローカルストレージ:</strong> ' + (JSON.stringify(APP_STATE).length / 1024).toFixed(2) + ' KB</div></div></div>';

            document.getElementById('exportData').addEventListener('click', () => {
                const data = JSON.stringify(APP_STATE, null, 2);
                const blob = new Blob([data], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'ielts_data_' + new Date().toISOString().split('T')[0] + '.json';
                a.click();
                URL.revokeObjectURL(url);
            });

            document.getElementById('resetData').addEventListener('click', () => {
                if (confirm('すべてのデータをリセットしますか？')) {
                    APP_STATE.completedTasks = {};
                    APP_STATE.memorizedSentences = {};
                    APP_STATE.readingHistory = {};
                    APP_STATE.writingHistory = [];
                    APP_STATE.currentDateIndex = 0;
                    saveState();
                    renderTodayTab();
                    alert('リセット完了しました');
                }
            });
        }

        // ====================================================================
        // TAB NAVIGATION
        // ====================================================================

        function setupTabNavigation() {
            document.querySelectorAll('.nav-item').forEach(item => {
                item.addEventListener('click', (e) => {
                    const tabName = e.currentTarget.dataset.tab;

                    document.querySelectorAll('.tab-content').forEach(tab => {
                        tab.classList.remove('active');
                    });
                    document.getElementById(tabName).classList.add('active');

                    document.querySelectorAll('.nav-item').forEach(navItem => {
                        navItem.classList.remove('active');
                    });
                    e.currentTarget.classList.add('active');

                    if (tabName === 'today') {
                        renderTodayTab();
                    } else if (tabName === 'memorization') {
                        renderMemorizationTab();
                    } else if (tabName === 'weakness') {
                        renderWeaknessTab();
                    } else if (tabName === 'stats') {
                        renderStatsTab();
                    } else if (tabName === 'settings') {
                        renderSettingsTab();
                    }
                });
            });

            document.addEventListener('click', function(e) {
                const tab = e.target.closest('.sub-tab');
                if (!tab) return;
                const subName = tab.dataset.sub;
                if (!subName) return;

                const parent = tab.closest('.tab-content');
                if (!parent) return;
                parent.querySelectorAll('.sub-tab').forEach(st => st.classList.remove('active'));
                parent.querySelectorAll('.sub-content').forEach(sc => sc.classList.remove('active'));

                tab.classList.add('active');
                document.getElementById(subName).classList.add('active');

                // Re-trigger speed reading content load when switching to that sub-tab
                if (subName === 'weak-reading') {
                    const topicEl = document.getElementById('readingTopic');
                    if (topicEl && topicEl.value && !document.getElementById('readingContent').innerHTML.trim()) {
                        topicEl.dispatchEvent(new Event('change', {bubbles: true}));
                    }
                }
            });
        }

        // ====================================================================
        // INITIALIZATION
        // ====================================================================

        function init() {
            loadState();

            // 今日の日付をCALENDAR_DATAから自動検索してセット
            const now = new Date();
            const yyyy = now.getFullYear();
            const mm = String(now.getMonth() + 1).padStart(2, '0');
            const dd = String(now.getDate()).padStart(2, '0');
            const todayStr = yyyy + '-' + mm + '-' + dd;
            const todayIdx = CALENDAR_DATA.findIndex(d => d.date === todayStr);
            if (todayIdx >= 0) {
                APP_STATE.currentDateIndex = todayIdx;
            }

            // 起動時に状態を保存（日付更新を反映）
            saveState();

            setupTabNavigation();
            setupDayNavigation();
            renderTodayTab();
        }

        // 定期的に自動保存（30秒ごと）
        setInterval(saveState, 30000);

        document.addEventListener('DOMContentLoaded', init);
        window.addEventListener('beforeunload', saveState);
        // モバイルでバックグラウンドに入る時も保存
        document.addEventListener('visibilitychange', function() {
            if (document.visibilityState === 'hidden') {
                saveState();
            }
        });
    </script>
</body>
</html>
